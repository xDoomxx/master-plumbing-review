    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #2c3e50; --primary: #3498db; --primary-hover: #2980b9;
            --correct: #2ecc71; --correct-bg: #e8f8f5; --wrong: #e74c3c; --wrong-bg: #fdedec;
            --info-border: #f39c12; --info-bg: #fef9e7; --secondary: #95a5a6; --secondary-hover: #7f8c8d;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #app { background: var(--card-bg); width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 25px; color: #7f8c8d; }
        .score { color: var(--primary); }
        .question { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; text-align: left; background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s ease; outline: none; }
        .btn:hover:not(:disabled) { background: #e2e6ea; border-color: #dae0e5; transform: translateY(-1px); }
        .btn:disabled { cursor: default; opacity: 0.9; }
        .btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #1e8449; font-weight: 700; }
        .btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #922b21; text-decoration: line-through; opacity: 0.7; }
        .info-box { margin-top: 25px; padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.5; display: none; animation: fadeIn 0.4s ease; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .nav-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-align: center; transition: background 0.2s; display: none; }
        .nav-btn.prev { background: var(--secondary); color: white; }
        .nav-btn.next { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .home-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .result-screen { text-align: center; padding: 20px 0; }
        [data-theme="dark"] {
            --bg: #0d1117; --card-bg: #161b22; --text: #e6edf3;
            --primary: #58a6ff; --primary-hover: #79b8ff;
            --correct: #3fb950; --correct-bg: rgba(63,185,80,0.15);
            --wrong: #f85149; --wrong-bg: rgba(248,81,73,0.15);
            --info-border: #d29922; --info-bg: rgba(210,153,34,0.1);
            --secondary: #30363d; --secondary-hover: #3c444d;
        }
        [data-theme="dark"] .header { border-bottom-color: #30363d; color: #8b949e; }
        [data-theme="dark"] .btn { background: #1c2128; border-color: #30363d; }
        [data-theme="dark"] .btn:hover:not(:disabled) { background: #262c36; border-color: #484f58; }
        [data-theme="dark"] #app { box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

<script>
    const allQuestions = [{"q": "1. A common sewer directly controlled by a public authority to which all abutters have equal rights of connections.", "opts": ["Main Sewer", "Sanitary Sewer", "Public Sewer", "Private Sewer"], "ans": 2, "info": "Correct Answer: C. Public Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Main Sewer:</strong> A sewer line or system directly controlled by public authority.</li><li><strong>Sanitary Sewer:</strong> A sewer intended to receive sanitary sewage with or without pre-treated industrial wastes.</li><li><strong>Private Sewer:</strong> A building sewer which receives the discharge from more than one building drain and conveys it to a public sewer.</li></ul>"}, {"q": "2. In a classification of plumbing fixtures, \"______\" applies to plumbing fixtures in residences and apartments, to private bathrooms in hotels and hospitals, to restrooms in commercial establishments for restricted use, single fixture or group of single fixtures and to similar installations where the fixtures are intended for the use of a family or an individual.", "opts": ["Private", "Public", "Unit", "Confined Space"], "ans": 0, "info": "Correct Answer: A. Private", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Public:</strong> All buildings or structures that are not defined as private or private use.</li><li><strong>Unit:</strong> A standard quantity or a single component.</li><li><strong>Confined Space:</strong> A room or space having a volume less than 1.4 cu.m with 250 kilogram calorie of the aggregate input rating.</li></ul>"}, {"q": "3. Includes all potable water supply and distribution pipes, all plumbing fixtures and traps; all sanitary and storm drainage systems;<br><br>vent pipes, roof drains, leaders and downspouts; and all building drains and sewers, including their respective joints and connections;<br><br>devices, receptacles, and appurtenances within the property; water lines in the premises: potable, tap, hot and chilled water pipings;<br><br>potable water treating or using equipment; fuel gas piping; water heaters and vents for same.", "opts": ["Plumbing Fixtures", "Plumbing Appurtenance", "Plumbing System", "Plumbing Appliance"], "ans": 2, "info": "Correct Answer: C. Plumbing System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Fixtures:</strong> Approved type installed receptacles, devices, or appliances supplied with water or receive liquid wastes.</li><li><strong>Plumbing Appurtenance:</strong> A manufactured device or a prefabricated assembly or an on-the-job assembly of component parts.</li><li><strong>Plumbing Appliance:</strong> Any one of a special class of device or equipment intended to perform a special plumbing function.</li></ul>"}, {"q": "4. A pipe flange that is not drilled for bolt holes.", "opts": ["Blind Flange", "Socket Weld Flange", "Threaded Flange", "Blank Flange"], "ans": 3, "info": "Correct Answer: D. Blank Flange", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Blind Flange:</strong> A flange that closes the end of a pipe. There is no opening for the passage of liquid or gas.</li><li><strong>Socket Weld Flange:</strong> A flange that is welded to the end of a pipe using a socket fit.</li><li><strong>Threaded Flange:</strong> A flange with internal threads.</li></ul>"}, {"q": "5. A valve that automatically closes to prevent the flow of liquid or gas in a reverse direction.", "opts": ["Backwater Valve", "Backflow Valve", "Gate Valve", "Check Valve"], "ans": 3, "info": "Correct Answer: D. Check Valve", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backwater Valve:</strong> A device installed in a drainage system to prevent reverse flow.</li><li><strong>Backflow Valve:</strong> A check valve or backwater valve designed to prevent backflow.</li><li><strong>Gate Valve:</strong> A valve in which the flow of water is cut off by means of a circular disc fitted against machine-smoothed faces.</li></ul>"}, {"q": "6. A pipe joint obtained by joining metal parts with metallic mixtures or alloys which melt at a temperature below 427 degrees centigrade and above 149 degrees centigrade", "opts": ["Soldered Joint", "Brazed Joint", "Welded Joint", "Flared Joint"], "ans": 0, "info": "Correct Answer: A. Soldered Joint", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Brazed Joint:</strong> Any joint obtained by joining of metal parts with alloys which melt at temperatures higher than 449 degrees C.</li><li><strong>Welded Joint:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Flared Joint:</strong> A joint made by flaring the end of a copper tube and compressing it.</li></ul>"}, {"q": "7. An open, unoccupied space, bounded on two (2) or more sides by the walls of the building.<br><br>An inner court is a court entirely within the exterior walls of a building.", "opts": ["Atrium", "Yard", "Court", "Alley"], "ans": 2, "info": "Correct Answer: C. Court", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Atrium:</strong> An open-roofed courtyard.</li><li><strong>Yard:</strong> An open, unoccupied space, other than a court, unobstructed from the ground to the sky.</li><li><strong>Alley:</strong> Any public space, public park, or thoroughfare less than three (3) meters wide.</li></ul>"}, {"q": "8. Also known as Street Main", "opts": ["Service Pipe", "Water-distributing Pipe", "Main Line", "Water Main"], "ans": 3, "info": "Correct Answer: D. Water Main", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Service Pipe:</strong> The pipe from the water main or other source of potable water supply to the building.</li><li><strong>Water-distributing Pipe:</strong> A pipe which conveys potable water from the building supply pipe to the plumbing fixtures.</li><li><strong>Main Line:</strong> The principal artery of a continuous piping system.</li></ul>"}, {"q": "9. Any joint obtained by joining of metal parts with alloys which melt at temperatures higher than 449 degrees centigrade, but lower than the melting temperature of the parts to be joined.", "opts": ["Soldered Joint", "Slip Joint", "Brazed Joint", "Welded Joint"], "ans": 2, "info": "Correct Answer: C. Brazed Joint", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Soldered Joint:</strong> A pipe joint obtained by joining metal parts with metallic mixtures or alloys which melt at a temperature below 427 degrees C and above 149 degrees C.</li><li><strong>Slip Joint:</strong> An adjustable tubing connection, consisting of a compression nut, a friction ring, and a compression washer.</li><li><strong>Welded Joint:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "10. A valve opened and closed by the fall and rise, respectively, of an attached ball floating on the surface of the liquid.", "opts": ["Ball Joint", "Overflow", "Flush Valve", "Ball Cock"], "ans": 3, "info": "Correct Answer: D. Ball Cock", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Ball Joint:</strong> A type of pipe connection in which a ball-shaped end is held in a cuplike shell.</li><li><strong>Overflow:</strong> A pipe or opening that prevents flooding.</li><li><strong>Flush Valve:</strong> It is a device located at the bottom of the tank for the purpose of flushing water closet and similar fixtures.</li></ul>"}, {"q": "11. A physical separation, which may be a low inlet into the indirect waste receptor from the fixture, appliance, or device indirectly connected.", "opts": ["Air Gap, Drainage", "Air Break", "Air Gap, Water Distribution", "Air Gap"], "ans": 1, "info": "Correct Answer: B. Air Break", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Air Gap, Drainage:</strong> The unobstructed vertical distance between the lowest opening and the flood level rim of the receptor.</li><li><strong>Air Gap, Water Distribution:</strong> The unobstructed vertical distance between the lowest opening from any pipe conveying potable water to the flood-level rim.</li><li><strong>Air Gap:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "12. An outhouse or structure used for the deposition of excrement.", "opts": ["Privy", "Septic Vault", "Privy Vault", "Sump Pit"], "ans": 0, "info": "Correct Answer: A. Privy", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Septic Vault:</strong> A watertight receptacle that receives the discharge of a plumbing system (same as Septic Tank).</li><li><strong>Privy Vault:</strong> A pit beneath a privy where excrement collects.</li><li><strong>Sump Pit:</strong> A pit receiving liquid waste to be pumped.</li></ul>"}, {"q": "13. Unconfined Space - A room space having a volume equal to ________ of the aggregate input rating of the fuel-burning appliance installed in that space.<br><br>Rooms adjacent and open to the space where the appliance is installed, through openings not furnished with doors, are considered a part of the unconfined space.", "opts": ["at least 2.4 cu.m", "at least 1.4 cu. m.", "less than 1.4 cu. m.", "less than 2.4 cu.m"], "ans": 1, "info": "Correct Answer: B. at least 1.4 cu. m.", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>at least 2.4 cu.m:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>less than 1.4 cu. m.:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>less than 2.4 cu.m:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "14. A pipe, which carries ground and surface waters, storm water, or wastewater into a building drainage system.", "opts": ["Building Subdrain", "Subsoil Drain", "Drain", "Sump Pipe"], "ans": 2, "info": "Correct Answer: C. Drain", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building Subdrain:</strong> That portion of a drainage system which cannot drain by gravity into the building sewer.</li><li><strong>Subsoil Drain:</strong> An underground drainpipe that receives only subsurface or seepage water.</li><li><strong>Sump Pipe:</strong> A pipe connecting to a sump.</li></ul>"}, {"q": "15. A pipe fitting with adjacent reverse bends and shaped like the letter \"S''", "opts": ["Double-bend fitting", "Long Sweep", "S Trap", "Double Offset"], "ans": 0, "info": "Correct Answer: A. Double-bend fitting", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Long Sweep:</strong> A pipe fitting with a large radius curve to reduce friction.</li><li><strong>S Trap:</strong> A trap shaped like an S, generally prohibited in modern codes.</li><li><strong>Double Offset:</strong> Two offsets in series.</li></ul>"}, {"q": "16. That part of the horizontal piping of a sanitary drainage system which measures 0.6 meter downstream from the last mobile home site and conveys sewage to a public sewer, private sewer, individual sewage disposal system or other points of disposal.", "opts": ["Mobile Home Park Sewer", "Public Sewer", "Sewer", "House Drain / Building Drain"], "ans": 0, "info": "Correct Answer: A. Mobile Home Park Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Public Sewer:</strong> A common sewer directly controlled by a public authority.</li><li><strong>Sewer:</strong> A pipe or conduit for carrying sewage and wastewater.</li><li><strong>House Drain / Building Drain:</strong> That part of the lowest horizontal piping of a drainage system.</li></ul>"}, {"q": "17. In Plumbing Code, referred to as \"Pitch\".", "opts": ["Inclination", "%", "Grade", "Slope"], "ans": 2, "info": "Correct Answer: C. Grade", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Inclination:</strong> The pitch or slope of a line.</li><li><strong>%:</strong> Percentage of slope.</li><li><strong>Slope:</strong> The fall or pitch of a line of pipe.</li></ul>"}, {"q": "18. The wastewater containing human excrements and liquid household waste. Also called domestic sewage.", "opts": ["Sewage", "Sanitary Sewage", "Liquid Waste", "Solid Waste"], "ans": 1, "info": "Correct Answer: B. Sanitary Sewage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Sewage:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Liquid Waste:</strong> It is the discharge from any fixture, appliance, or appurtenance in connection with a plumbing system that does not receive fecal matter.</li><li><strong>Solid Waste:</strong> Solid refuse or matter.</li></ul>"}, {"q": "19. A tee with the branch tapped to receive a threaded pipe or fittings.", "opts": ["Threaded Tee", "Tee Wye", "Tapped Tee", "Tap"], "ans": 2, "info": "Correct Answer: C. Tapped Tee", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Threaded Tee:</strong> A tee fitting with threaded ends.</li><li><strong>Tee Wye:</strong> A fitting with a branch at a 45-degree angle.</li><li><strong>Tap:</strong> A faucet, spigot, or a connection to a main.</li></ul>"}, {"q": "20. A vertical vent connection on a horizontal soil or waste pipe branch at a point downstream of the last fixture correction and turning to a horizontal line above the highest overflow level of the highest fixture connected thereat;<br><br>the terminus connected to the stack vent in the case of loop venting or to the vent stack nearby in the case of circuit venting.", "opts": ["Relief Vent", "Loop or Circuit Vent", "Yoke Vent", "Group Vent"], "ans": 1, "info": "Correct Answer: B. Loop or Circuit Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Relief Vent:</strong> A vertical vent line, the primary function of which is to provide additional circulation of air.</li><li><strong>Yoke Vent:</strong> A pipe connecting upward from a soil or waste stack below the floor and below horizontal connection to an adjacent vent stack.</li><li><strong>Group Vent:</strong> A branch vent that performs its functions for two (2) or more traps.</li></ul>"}, {"q": "21. The extension of a soil or waste stack above the highest horizontal drain connected to the stack.<br><br>The uppermost end above the roof is called stack vent through roof (SVTR).", "opts": ["Stack Vent", "Stack", "Vent Stack", "Dry Vent"], "ans": 0, "info": "Correct Answer: A. Stack Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Stack:</strong> The vertical main of a system of soil, waste or vent piping extending through one or more stories.</li><li><strong>Vent Stack:</strong> A vertical vent pipe installed primarily for the purpose of providing circulation of air.</li><li><strong>Dry Vent:</strong> A vent that does not carry liquid or water-borne wastes.</li></ul>"}, {"q": "22. An impairment of the quality of the water to a degree which creates a hazard to public health and adversely affects the aesthetic and potable qualities of water for domestic use.", "opts": ["Insanitary", "Contamination", "Pollution", "Cross-connection"], "ans": 2, "info": "Correct Answer: C. Pollution", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Insanitary:</strong> A condition contrary to sanitary principles or injurious to health.</li><li><strong>Contamination:</strong> Also, defined as High Hazard. Impairment of potable water quality.</li><li><strong>Cross-connection:</strong> Any physical connection between a potable water system and any source of non-potable liquid.</li></ul>"}, {"q": "23. Any change, addition, or modification in construction or occupancy.", "opts": ["Alteration", "Rectification", "Revision", "Addition"], "ans": 0, "info": "Correct Answer: A. Alteration", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Rectification:</strong> Correction or repair.</li><li><strong>Revision:</strong> Alteration or modification.</li><li><strong>Addition:</strong> Extension or increase in floor area or height of a building or structure.</li></ul>"}, {"q": "24. A water closet consisting of a continuous trough containing water. The trough extends under two or more adjacent seats.<br><br>Prohibited by health authorities for permanent installations.", "opts": ["Public Water Closet", "Cesspool", "Privy", "Latrine"], "ans": 3, "info": "Correct Answer: D. Latrine", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Public Water Closet:</strong> A water closet for public use.</li><li><strong>Cesspool:</strong> A non-watertight lined excavation in the ground which receives the discharge of a sanitary drainage system.</li><li><strong>Privy:</strong> An outhouse or structure used for the deposition of excrement.</li></ul>"}, {"q": "25. An adjustable tubing connection, consisting of a compression nut, a friction ring, and a compression washer.<br><br>designed to fit a threaded adapter fitting or a standard taper pipe thread.", "opts": ["Threaded Joint", "Rubber Gasketed Joints", "Trap Arm", "Slip Joint"], "ans": 3, "info": "Correct Answer: D. Slip Joint", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Threaded Joint:</strong> A joint made with threaded pipes or fittings.</li><li><strong>Rubber Gasketed Joints:</strong> Joints sealed with rubber compression gaskets.</li><li><strong>Trap Arm:</strong> That portion of a fixture drain between a trap and its vent.</li></ul>"}, {"q": "26. 1 Fixture unit is equivalent to a rate of flow at ______", "opts": ["28.3 liters per minute ( 1 cu. ft./minute)", "23.5 liters per minute ( 1 cu. ft./minute)", "14.7 liters per minute ( 1 cu. ft./minute)", "20.8 liters per minute ( 1 cu. ft./minute)"], "ans": 0, "info": "Correct Answer: A. 28.3 liters per minute ( 1 cu. ft./minute)", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>23.5 liters per minute ( 1 cu. ft./minute):</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>14.7 liters per minute ( 1 cu. ft./minute):</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>20.8 liters per minute ( 1 cu. ft./minute):</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "27. It is the slope or fall of a line of pipe with reference to a horizontal plane.<br><br>In drainage, it is usually expressed as the fall in centimeters per meter or percentage slope of pipe.", "opts": ["Inclination", "Grade", "Slope/Fall", "Pitch"], "ans": 1, "info": "Correct Answer: B. Grade", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Inclination:</strong> The pitch or slope of a line.</li><li><strong>Slope/Fall:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Pitch:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "28. The drainpipe from the trap of a fixture to the junction of that drain with any other drainpipe.", "opts": ["Junction Drain", "Receptor", "Fixture Drain", "Drain Pipe"], "ans": 2, "info": "Correct Answer: C. Fixture Drain", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Junction Drain:</strong> A drain connecting different branches.</li><li><strong>Receptor:</strong> An approved plumbing fixture or device to adequately receive the discharge from indirect waste pipes.</li><li><strong>Drain Pipe:</strong> A pipe conveying liquid waste or sewage.</li></ul>"}, {"q": "29. A standpipe that operates automatically by opening a hose valve.", "opts": ["Wet Standpipe", "Manually-Operated Standpipe System", "Automatic Standpipe System", "Standpipe"], "ans": 2, "info": "Correct Answer: C. Automatic Standpipe System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Wet Standpipe:</strong> A standpipe with water pressure maintained at all times.</li><li><strong>Manually-Operated Standpipe System:</strong> A standpipe system relying on manual operation to supply water.</li><li><strong>Standpipe:</strong> A vertical pipe used for storage and distribution of water for fire extinguishing.</li></ul>"}, {"q": "30. Hemp or old hemp rope soaked in oil or tar to make it waterproof.", "opts": ["Plastic Seal", "Teflon Tape", "Lead", "Oakum"], "ans": 3, "info": "Correct Answer: D. Oakum", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plastic Seal:</strong> A plastic material or tape used for sealing threads.</li><li><strong>Teflon Tape:</strong> Polytetrafluoroethylene (PTFE) thread sealing tape.</li><li><strong>Lead:</strong> A heavy metal traditionally used for poured caulked pipe joints.</li></ul>"}, {"q": "31. A cesspool that is not watertight.", "opts": ["Absorption Field", "Privy Vault", "Leaching Cesspool", "Drainage Field"], "ans": 2, "info": "Correct Answer: C. Leaching Cesspool", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Absorption Field:</strong> A system of trenches with distribution piping for effluent.</li><li><strong>Privy Vault:</strong> A pit beneath a privy where excrement collects.</li><li><strong>Drainage Field:</strong> Same as absorption field or leaching field.</li></ul>"}, {"q": "32. The Administrative Authority under the Department of Health, the Department of Public Works & Highways, the Department of Interior and Local Government, the City Mayors of Chartered Cities, Environmental Management Bureau (D.E.N.R), and other government: entities that regulate the practice of Registered & Licensed Master Plumbers.", "opts": ["Board of Directors", "DPWH", "Jurisdiction", "NAMPAP"], "ans": 2, "info": "Correct Answer: C. Jurisdiction", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Board of Directors:</strong> The governing body of an organization.</li><li><strong>DPWH:</strong> Department of Public Works and Highways.</li><li><strong>NAMPAP:</strong> National Master Plumbers Association of the Philippines.</li></ul>"}, {"q": "33. The length of a pipe along its centerline and fittings.", "opts": ["Diameter of the Pipe", "Maximum Length", "Pipe Length", "Developed Length"], "ans": 3, "info": "Correct Answer: D. Developed Length", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Diameter of the Pipe:</strong> The nominal internal diameter of the pipe.</li><li><strong>Maximum Length:</strong> The maximum permitted length for a specific pipe or vent run.</li><li><strong>Pipe Length:</strong> The physical length of a pipe section.</li></ul>"}, {"q": "34. The vertical distance from the \"Grade Line\" to the highest point of the coping of a flat roof or to the top line of a measured roof or to the average height of the highest gable of a pitch or hip-roof.", "opts": ["Elevation", "Branch Interval", "Height of Building", "Building Height Limit"], "ans": 2, "info": "Correct Answer: C. Height of Building", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Elevation:</strong> Height above a given datum or reference point.</li><li><strong>Branch Interval:</strong> A length of soil or waste stack corresponding in general to a story height, but in no case less than 2.43 meters.</li><li><strong>Building Height Limit:</strong> The maximum permitted building height per zoning regulations.</li></ul>"}, {"q": "35. That portion of the rainfall or other precipitation which runs off over the earth surface after a storm.", "opts": ["Storm Water", "Aquifer", "Ground Water", "Surface Water"], "ans": 0, "info": "Correct Answer: A. Storm Water", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Aquifer:</strong> An underground layer of water-bearing permeable rock or gravel.</li><li><strong>Ground Water:</strong> Water found beneath the surface of the ground.</li><li><strong>Surface Water:</strong> That portion of rainfall or other precipitation which runs off over the surface of the ground.</li></ul>"}, {"q": "36. Confined Space - A room or space having a volume of _______ with 250 kilogram calorie of the aggregate input rating of all fuel-burning appliances installed in that space.", "opts": ["more than 1.4 cu. m", "less than 2.4 cu. m", "less than 1.4 cu. m", "more than 2.4 cu. m"], "ans": 2, "info": "Correct Answer: C. less than 1.4 cu. m", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>more than 1.4 cu. m:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>less than 2.4 cu. m:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>more than 2.4 cu. m:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "37. All plumbing fixtures and materials used in any discharge or plumbing system or parts thereof shall be free from defects.", "opts": ["Listed", "Quality of Materials", "Certified", "Quality Assured"], "ans": 1, "info": "Correct Answer: B. Quality of Materials", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Listed:</strong> Equipment or materials included in a list published by a listing agency.</li><li><strong>Certified:</strong> Documented as passing a specific test or standard.</li><li><strong>Quality Assured:</strong> Verified to meet specific quality standards.</li></ul>"}, {"q": "38. A hose connection with two-gated outlets permitting two connections of the same or smaller coupling diameter to be taken from a single supply line.<br><br>Also, a pipe fitting of three branches that form the letter \u201cWye\u201d", "opts": ["Ell", "Wye", "Siamese Connection", "Yoke"], "ans": 1, "info": "Correct Answer: B. Wye", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Ell:</strong> An elbow fitting used to change direction in a piping system.</li><li><strong>Siamese Connection:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Yoke:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "39. The normal force exerted by a homogeneous liquid or gas, per unit of area on the wall of the container", "opts": ["Residual Pressure", "Pressure", "Pressure Relief", "Static Pressure"], "ans": 1, "info": "Correct Answer: B. Pressure", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Residual Pressure:</strong> The pressure available in a pipe while water is flowing.</li><li><strong>Pressure Relief:</strong> A valve designed to relieve excess pressure from a system.</li><li><strong>Static Pressure:</strong> The pressure existing without any flow motion in the pipe.</li></ul>"}, {"q": "40. A suction created by the flow of liquids in pipes. A pressure less than atmospheric.", "opts": ["Backpressure", "Vacuum", "Siphonage", "Backflow"], "ans": 2, "info": "Correct Answer: C. Siphonage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backpressure:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Vacuum:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Backflow:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "41. The on-going installation of the plumbing system or any part thereof which has been installed prior to the effectivity of this Code.", "opts": ["As-built", "Construction", "Roughing-in", "Existing Work"], "ans": 3, "info": "Correct Answer: D. Existing Work", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>As-built:</strong> Final drawings showing the actual installation as constructed.</li><li><strong>Construction:</strong> The act of building or erecting a structure or system.</li><li><strong>Roughing-in:</strong> The installation of all parts of the plumbing system which can be completed prior to the installation of fixtures.</li></ul>"}, {"q": "42. Brazed Joint is any joint obtained by joining of metal parts with alloys which melt at temperatures ______ degrees centigrade, but lower than the melting temperature of the parts to be joined.", "opts": ["higher than 449 degrees", "higher than 459 degrees", "lower than 459 degrees", "lower than 449 degrees"], "ans": 0, "info": "Correct Answer: A. higher than 449 degrees", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>higher than 459 degrees:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>lower than 459 degrees:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>lower than 449 degrees:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "43. Condition or any arrangement whereby reverse flow can occur.", "opts": ["Backpressure Backflow", "Backflow", "Backflow Connection", "Vacuum"], "ans": 2, "info": "Correct Answer: C. Backflow Connection", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backpressure Backflow:</strong> Backflow due to an increased pressure in the downstream piping above the supply pressure.</li><li><strong>Backflow:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Vacuum:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "44. A water-tight receptacle which receives the discharge of a sanitary plumbing system or part thereof, designed and constructed to retain solids, digest organic matter through a period of detention and to allow the liquids to discharge into the soil outside of the tank through a system of open-jointed sub-surface pipings or a seepage pit meeting the requirements of this Code.", "opts": ["Privy Vault", "Septic Tank", "Seepage Pit", "Cesspool"], "ans": 1, "info": "Correct Answer: B. Septic Tank", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Privy Vault:</strong> A pit beneath a privy where excrement collects.</li><li><strong>Seepage Pit:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Cesspool:</strong> A non-watertight lined excavation in the ground which receives the discharge of a sanitary drainage system.</li></ul>"}, {"q": "45. The maximum vertical depth of liquid that a trap will retain, measured between the crown weir and the top of the dip of the trap.", "opts": ["Trap", "Trap Seal", "Seal", "Air Gap"], "ans": 1, "info": "Correct Answer: B. Trap Seal", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Trap:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Seal:</strong> The vertical distance between the dip and the crown weir of a trap.</li><li><strong>Air Gap:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "46. The flowing back of used, contaminated, or polluted water from a plumbing fixture or vessel into a water supply pipe due to a negative pressure in such pipe.", "opts": ["Backflow", "Siphonage", "Vacuum", "Back-Siphonage"], "ans": 3, "info": "Correct Answer: D. Back-Siphonage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backflow:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Siphonage:</strong> A suction created by the flow of liquids in pipes. A pressure less than atmospheric.</li><li><strong>Vacuum:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "47. Any connection or arrangement, physical or otherwise, between a potable water supply system and any plumbing fixture or any tank.<br><br>receptacle, equipment, or device, through which enables non-potable, used, unclean, polluted, contaminated water or other substances to enter into any part of such potable water system under any condition.", "opts": ["High Hazard", "Cross-Connection", "Contamination", "Backflow Connection"], "ans": 1, "info": "Correct Answer: B. Cross-Connection", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>High Hazard:</strong> Contamination that poses an actual hazard to public health.</li><li><strong>Contamination:</strong> Also, defined as High Hazard. Impairment of potable water quality.</li><li><strong>Backflow Connection:</strong> Condition or any arrangement whereby reverse flow can occur.</li></ul>"}, {"q": "48. That part of the horizontal piping of a drainage system that starts from the end of the building drain and which receives the discharge of the building drain and conveys it to a public sewer, private sewer, individual sewage disposal system, or other points of disposal.", "opts": ["Sewer", "Building Subdrain", "Building Sewer", "Building Drain"], "ans": 2, "info": "Correct Answer: C. Building Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Sewer:</strong> A pipe or conduit for carrying sewage and wastewater.</li><li><strong>Building Subdrain:</strong> That portion of a drainage system which cannot drain by gravity into the building sewer.</li><li><strong>Building Drain:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "49. Any of two or more similar adjacent fixtures that discharge into a common horizontal soil or waste branch.", "opts": ["Fixture Unit", "Plumbing Unit", "Bathroom", "Battery of Fixtures"], "ans": 3, "info": "Correct Answer: D. Battery of Fixtures", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Fixture Unit:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Plumbing Unit:</strong> A minimum standard quantity of plumbing fixtures.</li><li><strong>Bathroom:</strong> A room equipped with a shower stall or bathtub.</li></ul>"}, {"q": "50. A manufactured device or a prefabricated assembly or an on-the-job assembly of component parts, and serves as an adjunct to the basic piping system and plumbing fixtures.<br><br>An appurtenance demands no additional water supply nor does it add any discharge load to a fixture or the drainage system.<br><br>It performs some useful functions in the operation, maintenance, servicing, economy or safety of the plumbing system.", "opts": ["Plumbing Fixtures", "Plumbing Appliance", "Plumbing System", "Plumbing Appurtenance"], "ans": 3, "info": "Correct Answer: D. Plumbing Appurtenance", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Fixtures:</strong> Approved type installed receptacles, devices, or appliances supplied with water or receive liquid wastes.</li><li><strong>Plumbing Appliance:</strong> Any one of a special class of device or equipment intended to perform a special plumbing function.</li><li><strong>Plumbing System:</strong> Includes all potable water supply and distribution pipes, all plumbing fixtures and traps; all sanitary and storm drainage systems.</li></ul>"}, {"q": "51. It is the discharge from any fixture, appliance, or appurtenance in connection with a plumbing system that does not receive fecal matter.", "opts": ["Sanitary Sewage", "Liquid Waste", "Industrial Waste", "Sewage"], "ans": 1, "info": "Correct Answer: B. Liquid Waste", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Sanitary Sewage:</strong> The wastewater containing human excrements and liquid household waste. Also called domestic sewage.</li><li><strong>Industrial Waste:</strong> Any and all liquid or water-borne waste from industrial or commercial processes.</li><li><strong>Sewage:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "52. A device designed to retain grease from one to a maximum of four fixtures.", "opts": ["Grease Interceptor", "Holding Tank", "Sump Pit", "Grease Trap"], "ans": 3, "info": "Correct Answer: D. Grease Trap", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Grease Interceptor:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Holding Tank:</strong> A watertight receptacle for holding sewage until it can be pumped out.</li><li><strong>Sump Pit:</strong> A pit receiving liquid waste to be pumped.</li></ul>"}, {"q": "53. I.P.S.", "opts": ["Iron Pipe System", "Cast Iron Soil Pipe Size", "Iron Pipe Size", "Iron Piping Size"], "ans": 2, "info": "Correct Answer: C. Iron Pipe Size", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Iron Pipe System:</strong> A misnomer; usually refers to IPS (Iron Pipe Size).</li><li><strong>Cast Iron Soil Pipe Size:</strong> CISPI size; standard sizing for cast iron pipes.</li><li><strong>Iron Piping Size:</strong> Incorrect terminology for IPS.</li></ul>"}, {"q": "54. A length of soil or waste stack corresponding in general to a story height, but in no case less than 2.43 meters within which the horizontal branches from one floor or story of a building are connected to the stack", "opts": ["Branch Interval", "Storey", "Riser", "Soil Stack"], "ans": 0, "info": "Correct Answer: A. Branch Interval", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Storey:</strong> The portion of a building included between the upper surface of any floor and the upper surface of the floor next above.</li><li><strong>Riser:</strong> A water supply pipe, which extends vertically to one full story or more to convey water into pipe branches or plumbing fixtures.</li><li><strong>Soil Stack:</strong> A vertical soil pipe conveying fecal matter and wastewater.</li></ul>"}, {"q": "55. A specially designed system of waste piping embodying the horizontal wet venting of one or more sinks or floor drains by means of a common horizontal waste and vent pipe adequately sized to provide free movement of air above the flow line of the drain.", "opts": ["Sovent System", "Durham System", "Combination Waste and Vent System", "Wet Vent"], "ans": 2, "info": "Correct Answer: C. Combination Waste and Vent System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Sovent System:</strong> A specialized single-stack plumbing system with aerator and deaerator fittings.</li><li><strong>Durham System:</strong> A soil or waste system where all piping is of threaded pipe, tubing, or other such rigid construction.</li><li><strong>Wet Vent:</strong> That portion of a vent pipe through where wastewater also flows.</li></ul>"}, {"q": "56. Also, defined as High Hazard.", "opts": ["Cross-Connection", "Pollution", "Epidemic", "Contamination"], "ans": 3, "info": "Correct Answer: D. Contamination", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Cross-Connection:</strong> Any connection or arrangement, physical or otherwise, between a potable water supply system and any plumbing fixture or any tank.</li><li><strong>Pollution:</strong> An impairment of the quality of the water to a degree which creates a hazard to public health and adversely affects the aesthetic and potable qualities.</li><li><strong>Epidemic:</strong> A widespread occurrence of an infectious disease.</li></ul>"}, {"q": "57. Horizontal Pipe", "opts": ["angle of less than forty-five (45) degrees with the vertical plane.", "None of the choices", "angle of more than forty-five (45) degrees with the horizontal plane.", "angle of not more than forty-five (45) degrees with the horizontal plane."], "ans": 3, "info": "Correct Answer: D. angle of not more than forty-five (45) degrees with the horizontal plane.", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>angle of less than forty-five (45) degrees with the vertical plane.:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>None of the choices:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>angle of more than forty-five (45) degrees with the horizontal plane.:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "58. A fixture is flooded when the liquid therein rises to the flood-level rim.", "opts": ["Overflow", "Flooded", "Critical Level", "Flood Area"], "ans": 1, "info": "Correct Answer: B. Flooded", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Overflow:</strong> A pipe or opening that prevents flooding.</li><li><strong>Critical Level:</strong> C-L or C/L marking on a backflow prevention device or vacuum breaker.</li><li><strong>Flood Area:</strong> An area susceptible to flooding.</li></ul>"}, {"q": "59. It is a pipe that does not connect directly with the drainage system but conveys liquid wastes by discharging into a plumbing fixture, interceptor, or receptacle directly connected to the drainage system.", "opts": ["Air Break", "Air Gap", "Indirect Waste Pipe", "Receptor"], "ans": 2, "info": "Correct Answer: C. Indirect Waste Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Air Break:</strong> A physical separation, which may be a low inlet into the indirect waste receptor from the fixture.</li><li><strong>Air Gap:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Receptor:</strong> An approved plumbing fixture or device to adequately receive the discharge from indirect waste pipes.</li></ul>"}, {"q": "60. That portion of rainfall or other precipitation which runs off over the surface of the ground.", "opts": ["Aquifer", "Rain Water", "Ground Water", "Surface Water"], "ans": 3, "info": "Correct Answer: D. Surface Water", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Aquifer:</strong> An underground layer of water-bearing permeable rock or gravel.</li><li><strong>Rain Water:</strong> Precipitation that falls from the sky.</li><li><strong>Ground Water:</strong> Water found beneath the surface of the ground.</li></ul>"}, {"q": "61. The vertical distance between the dip and the crown weir of a trap.<br><br>Also, the water in the trap between the dip and the crown weir.", "opts": ["Seal", "Air Break", "Air Gap", "Air Gap, water distribution"], "ans": 0, "info": "Correct Answer: A. Seal", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Air Break:</strong> A physical separation, which may be a low inlet into the indirect waste receptor from the fixture.</li><li><strong>Air Gap:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Air Gap, water distribution:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "62. A metallic sleeve, caulked or joined to an opening in a pipe, into which a plug is screwed that can be removed for cleaning or examining the interior of the pipe.", "opts": ["Ring", "Ferrule", "Rim", "Turnpin"], "ans": 1, "info": "Correct Answer: B. Ferrule", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Ring:</strong> A circular band used in various pipe fittings.</li><li><strong>Rim:</strong> An unobstructed top open edge of a fixture.</li><li><strong>Turnpin:</strong> A conical wooden tool used for flaring lead pipes.</li></ul>"}, {"q": "63. Accepted or acceptable under an applicable specifications or standard stated or cited in this Code., or accepted as suitable for any proposed use under procedures and powers of the Administrative Authority.", "opts": ["Marked", "Approved", "Permitted", "Listed"], "ans": 1, "info": "Correct Answer: B. Approved", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Marked:</strong> Labeled or tagged with necessary identification.</li><li><strong>Permitted:</strong> Allowed by the code or the Administrative Authority.</li><li><strong>Listed:</strong> Equipment or materials included in a list published by a listing agency.</li></ul>"}, {"q": "64. A vertical vent line, the primary function of which is to provide additional circulation of air between the drainage and vent systems or to act as an auxiliary vent on a specially designed system such as a ''yoke vent\" connection between the soil and vent stacks.", "opts": ["VSTR", "SVTR", "Main Vent", "Relief Vent"], "ans": 3, "info": "Correct Answer: D. Relief Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>VSTR:</strong> Vent Stack Thru Roof.</li><li><strong>SVTR:</strong> Stack Vent Thru Roof.</li><li><strong>Main Vent:</strong> The principal artery of the venting system to which vent branches may be connected.</li></ul>"}, {"q": "65. The lowest portion of the interior part of any pipe or conduit that is not vertical.", "opts": ["Centerline", "Crown", "Invert", "Obvert"], "ans": 2, "info": "Correct Answer: C. Invert", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Centerline:</strong> The line that represents the central axis of a pipe.</li><li><strong>Crown:</strong> The top of the inside of a cross section of a pipe.</li><li><strong>Obvert:</strong> The top inner edge of a pipe or conduit.</li></ul>"}, {"q": "66. Confined Space - A room or space having a volume of less than 1.4 cu.<br><br>m with ____ kilogram calorie of the aggregate input rating of all fuel-burning appliances installed in that space.", "opts": ["230 kilogram calorie", "240 kilogram calorie", "250 kilogram calorie", "220 kilogram calorie"], "ans": 2, "info": "Correct Answer: C. 250 kilogram calorie", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>230 kilogram calorie:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>240 kilogram calorie:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>220 kilogram calorie:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "67. It is a device located at the bottom of the tank for the purpose of flushing water closet and similar fixtures.", "opts": ["Flush Tank", "Flush Valve", "Flushometer Tank", "Flushometer Valve"], "ans": 1, "info": "Correct Answer: B. Flush Valve", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flush Tank:</strong> A tank located above or integral with a water closet for flushing.</li><li><strong>Flushometer Tank:</strong> A tank integrated within an air accumulator vessel to release water by air pressure.</li><li><strong>Flushometer Valve:</strong> A device which discharges a predetermined quantity of water into fixtures for flushing.</li></ul>"}, {"q": "68. Any joint or seam obtained by the joining of metal parts in a plastic molten state.", "opts": ["Welded Joint or Seam", "Soldered Joint", "Brazed Joint", "Flared Joint"], "ans": 0, "info": "Correct Answer: A. Welded Joint or Seam", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Soldered Joint:</strong> A pipe joint obtained by joining metal parts with metallic mixtures or alloys which melt at a temperature below 427 degrees C and above 149 degrees C.</li><li><strong>Brazed Joint:</strong> Any joint obtained by joining of metal parts with alloys which melt at temperatures higher than 449 degrees C.</li><li><strong>Flared Joint:</strong> A joint made by flaring the end of a copper tube and compressing it.</li></ul>"}, {"q": "69. Gooseneck dimensions one end of which is about ___cm. long and the other end is about ___cm.", "opts": ["35 cm and 7.5 cm", "40 cm and 7.5 cm", "36 cm and 7.5 cm", "30 cm and 7.5 cm"], "ans": 3, "info": "Correct Answer: D. 30 cm and 7.5 cm", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>35 cm and 7.5 cm:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>40 cm and 7.5 cm:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>36 cm and 7.5 cm:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "70. A pipe or opening used for ensuring the circulation of air in a plumbing system and for relieving the negative pressure exerted on trap seals.", "opts": ["Vent Stack", "Vent", "Vent System", "Vent Pipe"], "ans": 3, "info": "Correct Answer: D. Vent Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Vent Stack:</strong> A vertical vent pipe installed primarily for the purpose of providing circulation of air.</li><li><strong>Vent:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Vent System:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "71. Unit Vent is synonymous to _____.", "opts": ["Group Vent", "Branch Vent", "Dual Vent", "Plumbing Unit"], "ans": 2, "info": "Correct Answer: C. Dual Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Group Vent:</strong> A branch vent that performs its functions for two (2) or more traps.</li><li><strong>Branch Vent:</strong> A horizontal vent connecting one or more individual vertical back vents with the vent stack or stack vent.</li><li><strong>Plumbing Unit:</strong> A minimum standard quantity of plumbing fixtures.</li></ul>"}, {"q": "72. A water supply pipe, which extends vertically to one full story or more to convey water into pipe branches or plumbing fixtures.", "opts": ["Water Distributing Pipe", "Riser", "Stack", "Main"], "ans": 1, "info": "Correct Answer: B. Riser", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Distributing Pipe:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Stack:</strong> The vertical main of a system of soil, waste or vent piping extending through one or more stories.</li><li><strong>Main:</strong> Any system of continuous piping, which is the principal artery of the system where branches are connected.</li></ul>"}, {"q": "73. Tube made of plastic material and colored black. The cross-sectional shape is circular and is denoted by its outside diameter or O.D.", "opts": ["cross linked polyethylene (PEX)", "Polyethylene (PE)", "Polyvinyl Chloride (PVC)", "Polybutylene (PB)"], "ans": 1, "info": "Correct Answer: B. Polyethylene (PE)", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>cross linked polyethylene (PEX):</strong> A type of plastic pipe used for water supply systems.</li><li><strong>Polyvinyl Chloride (PVC):</strong> A widely used plastic pipe for drainage and water supply.</li><li><strong>Polybutylene (PB):</strong> Tube made of plastic material and colored black, denoted by its O.D.</li></ul>"}, {"q": "74. Any system of continuous piping, which is the principal artery of the system where branches are connected.", "opts": ["Primary", "Plumbing System", "Principal", "Main"], "ans": 3, "info": "Correct Answer: D. Main", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Primary:</strong> Main piping.</li><li><strong>Plumbing System:</strong> Includes all potable water supply and distribution pipes, all plumbing fixtures and traps; all sanitary and storm drainage systems.</li><li><strong>Principal:</strong> Main or leading component.</li></ul>"}, {"q": "75. The vertical main of a system of soil, waste or vent piping extending through one or more stories and extended thru the roof.", "opts": ["Stack", "Vent Stack Thru Roof (VSTR)", "Soil Stack Pipe", "Riser"], "ans": 0, "info": "Correct Answer: A. Stack", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Vent Stack Thru Roof (VSTR):</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Soil Stack Pipe:</strong> A vertical soil pipe.</li><li><strong>Riser:</strong> A water supply pipe, which extends vertically to one full story or more to convey water into pipe branches or plumbing fixtures.</li></ul>"}, {"q": "76. A pipe connecting upward from a soil or waste stack below the floor and below horizontal connection to an adjacent vent stack at a point above the floor and higher than the highest spill level of fixtures for preventing pressure changes in the stacks.", "opts": ["Main Vent", "Circuit Vent", "Island Fixture Vent", "Yoke Vent"], "ans": 3, "info": "Correct Answer: D. Yoke Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Main Vent:</strong> The principal artery of the venting system to which vent branches may be connected.</li><li><strong>Circuit Vent:</strong> A branch vent that serves two or more traps and extends from in front of the last fixture connection to the vent stack.</li><li><strong>Island Fixture Vent:</strong> A specific vent configuration used for island sinks.</li></ul>"}, {"q": "77. Plugging an opening with oakum, lead, or other materials that are pounded into the annular space.<br><br>Also, the material pounded into the annular opening.", "opts": ["Caulking", "Welding", "Soldering", "Brazing"], "ans": 0, "info": "Correct Answer: A. Caulking", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Welding:</strong> Joining metals by melting the base metal and adding a filler.</li><li><strong>Soldering:</strong> Joining metals with solder melting below 427 degrees C.</li><li><strong>Brazing:</strong> Joining metals with hard solder melting above 449 degrees C.</li></ul>"}, {"q": "78. A vertical pipe to convey rainwater.", "opts": ["Leader", "Conductor", "Gutter", "Storm Drain"], "ans": 1, "info": "Correct Answer: B. Conductor", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Leader:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Gutter:</strong> A trough along the eaves of a roof to catch rain.</li><li><strong>Storm Drain:</strong> A drain used for conveying rainwater or surface water.</li></ul>"}, {"q": "79. Any pipe or fitting installed in a vertical position or which forms an angle of not more than forty-five (45) degrees with the vertical line.", "opts": ["Vertical Pipe", "None of the choices", "Diagonal Pipe", "Horizontal Pipe"], "ans": 0, "info": "Correct Answer: A. Vertical Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>None of the choices:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Diagonal Pipe:</strong> A pipe not installed perfectly horizontal or vertical.</li><li><strong>Horizontal Pipe:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "80. Referred to as the \"Commission\"", "opts": ["NAMPAP", "Board", "Board of Master Plumbers", "PRC"], "ans": 3, "info": "Correct Answer: D. PRC", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>NAMPAP:</strong> National Master Plumbers Association of the Philippines.</li><li><strong>Board:</strong> Licensure Board for Master Plumbers.</li><li><strong>Board of Master Plumbers:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "81. A natural person, his heirs, executors, administrators or assigns;<br><br>and also includes a firm, partnership or corporation, its or their successors or assigns or agents of any of the aforesaid", "opts": ["Plumbing Firm", "Person", "Unit", "Family Unit"], "ans": 1, "info": "Correct Answer: B. Person", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Firm:</strong> A registered plumbing business entity.</li><li><strong>Unit:</strong> A standard quantity or a single component.</li><li><strong>Family Unit:</strong> A household or family residing together.</li></ul>"}, {"q": "82. A structure built, erected, and framed of component structural parts designed for the housing, shelter, enclosure, or support of persons, animals, or property of any kind.", "opts": ["Scaffolding", "Building", "Assembly", "Structure"], "ans": 1, "info": "Correct Answer: B. Building", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Scaffolding:</strong> Temporary structure used to support workers and materials.</li><li><strong>Assembly:</strong> A complete unit composed of interconnected parts.</li><li><strong>Structure:</strong> That which is built or constructed.</li></ul>"}, {"q": "83. A person who has shown competence to test and maintain backflow assemblies to the satisfaction of the Administrative Authority having jurisdiction.", "opts": ["Backflow Assembly Tester", "Certified Backflow Assembly Tester", "Listed Tester", "Master Plumber"], "ans": 1, "info": "Correct Answer: B. Certified Backflow Assembly Tester", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backflow Assembly Tester:</strong> A person trained to test backflow preventers.</li><li><strong>Listed Tester:</strong> A recognized or certified tester.</li><li><strong>Master Plumber:</strong> A professional licensed to practice master plumbing.</li></ul>"}, {"q": "84. Licensure Board for Master Plumbers", "opts": ["PRC", "Board", "Commission", "NAMPAP"], "ans": 1, "info": "Correct Answer: B. Board", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>PRC:</strong> Referred to as the 'Commission'.</li><li><strong>Commission:</strong> Professional Regulation Commission (PRC).</li><li><strong>NAMPAP:</strong> National Master Plumbers Association of the Philippines.</li></ul>"}, {"q": "85. A pipe or conduit for carrying sewage and wastewater.", "opts": ["Waste Pipe", "Sewer", "Soil Pipe", "Drain"], "ans": 1, "info": "Correct Answer: B. Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Waste Pipe:</strong> A pipe, which conveys only wastewater or liquid waste, free of fecal matter.</li><li><strong>Soil Pipe:</strong> Any pipe, which conveys the discharge of water closet, urinal or fixtures having similar functions.</li><li><strong>Drain:</strong> A pipe, which carries ground and surface waters, storm water, or wastewater into a building drainage system.</li></ul>"}, {"q": "86. Synonymous with faucet, cock, tap, plug, etc. The word \"faucet\" is preferred.", "opts": ["Bibb", "Nozzle", "Spigot", "Spout"], "ans": 0, "info": "Correct Answer: A. Bibb", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Nozzle:</strong> A spout or terminal end of a pipe/hose.</li><li><strong>Spigot:</strong> The end of a pipe that fits into a bell; also a synonym for faucet.</li><li><strong>Spout:</strong> A projecting tube or lip for pouring liquids.</li></ul>"}, {"q": "87. A valve in which the flow of water is cut off by means of a circular disc fitted against machine-smoothed faces, at right angles to the direction of flow.<br><br>The disk is raised or lowered by means of a threaded stern connected to the handle of the valve.<br><br>The opening in the valve is usually as large as the full bore of the pipe.", "opts": ["Butterfly Valve", "Globe Valve", "Angle Valve", "Gate Valve"], "ans": 3, "info": "Correct Answer: D. Gate Valve", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Butterfly Valve:</strong> A valve with a rotating disk that regulates flow.</li><li><strong>Globe Valve:</strong> A valve with a spherical body used for throttling flow.</li><li><strong>Angle Valve:</strong> A valve with an outlet at right angles to the inlet.</li></ul>"}, {"q": "88. An open return bend usually made up two 90\u00b0 bends with inside and outside threads, flanged or welded fittings;<br><br>and applied also to a one hundred eighty degrees bend in copper tubings.", "opts": ["Bend", "Return Bend", "Double-Offset", "Offset"], "ans": 1, "info": "Correct Answer: B. Return Bend", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Bend:</strong> A pipe fitting used to change the direction of piping.</li><li><strong>Double-Offset:</strong> Two offsets installed in sequence.</li><li><strong>Offset:</strong> A combination of elbows or bends that brings a pipe out of line and then parallel again.</li></ul>"}, {"q": "89. This term means the flexible tubing connection between a service pipe and a water main.", "opts": ["Gooseneck", "Corporation Cock", "Fixture Supply", "Curb Stop"], "ans": 0, "info": "Correct Answer: A. Gooseneck", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Corporation Cock:</strong> A stop valve placed at the connection of the water service pipe to the water main.</li><li><strong>Fixture Supply:</strong> The water supply pipe connecting a fixture to a branch water supply pipe.</li><li><strong>Curb Stop:</strong> A control valve for the water supply of a building, usually located near the curb.</li></ul>"}, {"q": "90. A device which conditions or treats water supply to improve water quality, remove suspended solids by filtration.", "opts": ["Water Treatment", "Chlorination", "Filter", "Treatment Machine"], "ans": 0, "info": "Correct Answer: A. Water Treatment", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Chlorination:</strong> The process of adding chlorine to water for disinfection.</li><li><strong>Filter:</strong> A device to remove solid particles from water.</li><li><strong>Treatment Machine:</strong> Equipment used for treating or conditioning water.</li></ul>"}];
    let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let timerInterval = null;
    let timeLeft = 0;
    let isReviewMode = false;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');
    
    const startMenuHTML = `
        <div id="start-menu" style="text-align: center; padding: 20px 0;">
            <h2 style="color: var(--primary); margin-bottom: 30px;">Mastery Test 2 - Definition of Terms</h2>
            <button class="nav-btn" style="display:block; width:100%; margin-bottom:15px; background: var(--secondary); color:white; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer;" onclick="goBackToPortal()">&#8592; Back to Portal</button>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: #e67e22;" onclick="startQuiz(true)">Start Exam Mode (60 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none; width:100%; margin-bottom:15px; background: #27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('masteryTest2_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    const header = document.querySelector('.header');
    header.insertAdjacentHTML('afterend', '<div id="timer-display" style="display:none; text-align:center; font-size:1.5rem; font-weight:bold; color:#e74c3c; margin-bottom:15px;"></div>');

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode; isReviewMode = false;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0; userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
            startTimer(60 * 60); 
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('masteryTest2_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ; userAnswers = state.userAnswers;
            isExamMode = false; isReviewMode = false;
            updateScore(); loadQuestion();
        }
    }

    function startReviewMode() {
        isReviewMode = true;
        let reviewHTML = '<div class="result-screen" style="text-align:left;"><h2 style="color: var(--primary); text-align:center;">Exam Review</h2><p style="text-align:center; margin-bottom:20px;">Review your answers below. Correct answers are highlighted in green, and your incorrect choices in red.</p>';
        
        questionsList.forEach((q, i) => {
            let uAns = userAnswers[i];
