<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekly Test 8 - Practical Problems</title>
    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #2c3e50; --primary: #3498db;
            --correct: #2ecc71; --correct-bg: #e8f8f5; --wrong: #e74c3c; --wrong-bg: #fdedec;
            --info-border: #f39c12; --info-bg: #fef9e7; --secondary: #95a5a6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #app { background: var(--card-bg); width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 25px; color: #7f8c8d; }
        .score { color: var(--primary); }
        .question { font-size: 1.2rem; font-weight: 600; line-height: 1.55; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; text-align: left; background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s ease; outline: none; }
        .btn:hover:not(:disabled) { background: #e2e6ea; border-color: #dae0e5; transform: translateY(-1px); }
        .btn:disabled { cursor: default; opacity: 0.9; }
        .btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #1e8449; font-weight: 700; }
        .btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #922b21; text-decoration: line-through; opacity: 0.7; }
        .info-box { margin-top: 25px; padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.6; display: none; animation: fadeIn 0.4s ease; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .nav-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-align: center; transition: background 0.2s; display: none; }
        .nav-btn.prev { background: var(--secondary); color: white; }
        .nav-btn.next { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(52,152,219,0.3); }
        .home-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .result-screen { text-align: center; padding: 20px 0; }
        [data-theme="dark"] {
            --bg: #0d1117; --card-bg: #161b22; --text: #e6edf3;
            --primary: #58a6ff; --primary-hover: #79b8ff;
            --correct: #3fb950; --correct-bg: #1a2e1a; --wrong: #f85149; --wrong-bg: #2e1a1a;
            --info-border: #d29922; --info-bg: #2e2a1a;
            --secondary: #30363d; --secondary-hover: #3c444d;
        }
        [data-theme="dark"] .header { border-bottom-color: #30363d; color: #8b949e; }
        [data-theme="dark"] .btn { background: #1c2128; border-color: #30363d; }
        [data-theme="dark"] .btn:hover:not(:disabled) { background: #262c36; border-color: #484f58; }
        [data-theme="dark"] #app { box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>

        </div>
    </div>

<script>
    const allQuestions = [{"q": "1. In pipes, the higher the SDR, the _____.", "opts": ["smaller the OD of the pipe", "thicker the wall of the pipe", "larger the OD of the pipe", "thinner the wall of the pipe"], "ans": 3, "info": "Correct Answer: thinner the wall of the pipe. SDR (Standard Dimension Ratio) = OD ÷ wall thickness. For a given outside diameter, a higher SDR number means a thinner wall (and a lower pressure rating).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>smaller the OD of the pipe:</strong> SDR relates wall thickness to OD; a higher SDR doesn't shrink the OD, it thins the wall.</li><li><strong>thicker the wall of the pipe:</strong> Backwards — a higher SDR gives a THINNER wall. A LOW SDR means a thick wall.</li><li><strong>larger the OD of the pipe:</strong> SDR is a ratio, not a measure of OD; raising it doesn't enlarge the pipe.</li></ul>"}, {"q": "2. A hanger used to support a vertical pipe that traverses multiple floors", "opts": ["Vertical pipe supporter", "Riser clamp", "Trapeze", "Clevis"], "ans": 1, "info": "Correct Answer: Riser clamp. A riser clamp bolts around a vertical pipe and rests its arms on the floor slab, supporting the pipe's weight as it passes through multiple floors.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Vertical pipe supporter:</strong> Not a standard hanger name; the specific device is the riser clamp.</li><li><strong>Trapeze:</strong> A horizontal support hung from two rods — used to carry one or more HORIZONTAL pipes, not a vertical riser.</li><li><strong>Clevis:</strong> A hanger for individual HORIZONTAL pipes (a U-shaped shackle with a pin), not for vertical risers.</li></ul>"}, {"q": "3. Identify the tool:<img alt='refere gin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>3 lavatories, and 2 water closets:</strong> Mixed fixture types — not all similar, so it doesn't fit 'battery of fixtures.'</li><li><strong>2 lavatories, 2 urinals, and 1 water closet:</strong> Three different fixture types together — not a battery of similar fixtures.</li><li><strong>1 water closet, 1 lavatory, and 1 shower:</strong> All different single fixtures — neither similar nor multiple of the same kind.</li></ul>"}, {"q": "6. Identify the figure:<img alt='reference diagram' src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAq8AAAKXCAIAAAAjKjQKAAAAA3NCSVQICAjb4U/gAAAgAElEQVR4nOy9WZMcyXkletxjy8zKqgIKaPQGoJvNGbJHolEkZZIeZHqTXbv3H8yvnPumN82baCbdMaMojihxaQ6b3UBjR1XlFrvfhxPxpadHZlVhbXTVd8y6LTPKMxaPQPi3nO98xjkHxbsKvTsKheItwxjzbZ+C4luA/bZPQKFQKBQKxbcMtQYUCoVCobjqUGtAoVAoFIqrDrUGFAqFQqG46lBrQKFQKBSKqw61BhQKhUKhuOpQa0ChUCgUiqsOtQYUCoVCobjqUGtAoVAoFIqrDrUGFAqFQqG46lBrQKFQKBSKqw61BhQKhUKhuOpQa0ChUCgUiqsOtQYUCoVCobjqUGtAoVAoFIqrDrUGFAqFQqG46lBrQKFQKBSKqw61BhQKhUKhuOpQa0ChUCgUiqsOtQYUCoVCobjqUGtAoVAoFIqrjvjbPgGFQvGuo21bfnDOAbDWGmO+1TNSKBSvGWoNKBSK7ZAlv65r55xzjmZBkiRpmm79CQcYY16XuUD7Q6FQvGlopkChUCgUiqsOjQ0oFIpzEEURffSmaQBYG3oRQSoBXlxhq3MvG+WHAv5Qfq4pCYXi7UCtAYVCcQ64/A9XeoH8iR/OMAW4hXkHAG3byhZ4KQahJqg1oFC8HWimQKFQKBSKqw6NDSgUinMgqYFhjoDYRR4cevbcIjGDKIpe76kqFIqXg1oDCoXiojg7bu+cu2Bg/+Lxf60pUCjeDtQaUCgUbwq7qAbDNV75AQrFtwu1BhQKxUtCyIDC+AtSCWVZikSBv71pGm7neGPMLgEDhULxdqAsQoVCoVAorjo0NqBQKF4Vu0QC8jyv61q2tG3Lr3Vd80OSJIwo7O/vA7DWShRBSg3f8rUoFFcTag0oFIqXx9lr9unp6Wq1AlAUBYCqqhaLBb9WdQVgb7JnrY2i6OOPPwaQZdl0OoVXnpBlmVIKFIq3ALW7FQqFQqG46tDYgEKh2I6LiA9uLRao67qqKgDz+Xy5XAI4PT0FkBf5k8dPAOR5XpYlgBs3byRxEkXR0dERNnMNmiNQKN4m1BpQKBTbcYY1sGu7tDOgNVCWZVEUzjkmCJbL5bNnzwCsVivmDuI4TpIkSRKOZx8EvNYuiAqF4iJQ61uhUCgUiqsOjQ0oFIrteNFYfdM0eZ4DWCwWDAacnJyQRXh8fAxgtVoxZVDXNcMAaZqOxqMszW7cuAFgPB5PJpPXfR0KheJ8qDWgUCheG6QhIcWFXKdPtKVjYSdbZJkTWLMEzlUtVCgUbwJqDSgUitcGWfXp+jMG4Jxr2gaeNSDLf2Q r: 4-wheel pipe cutter. 📷 A 4-wheel cutter has four cutting wheels around the pipe, letting it cut with only a small back-and-forth swing — ideal where there's no room to rotate the tool fully around the pipe.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>3-wheel pipe cutter:</strong> Has three wheels — needs slightly more swing clearance and is a different configuration.</li><li><strong>Hinged Pipe Cutter:</strong> Opens on a hinge to wrap around large pipe; uses multiple wheels but is the hinged frame type.</li><li><strong>Wide-Roll Pipe Cutter:</strong> Has wide rollers to prevent pipe distortion; a different design from the 4-wheel cutter.</li></ul>"}, {"q": "9. Features a jaw opening parallel to the handle and a narrower hook jaw head. Provides easy entry into tight spots.", "opts": ["Spud Wrench", "End Pipe Wrench", "Hex Wrench", "Offset Pipe Wrench"], "ans": 3, "info": "Correct Answer: Offset Pipe Wrench. Its jaw opening runs parallel to the handle with a narrower hook jaw, so it slips into tight spots and grips pipe running close to walls.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Spud Wrench:</strong> A smooth-jaw wrench for large packing/slip nuts (like on closet spuds) — not an angled pipe gripper.</li><li><strong>End Pipe Wrench:</strong> Has jaws at the END of the handle at a slight angle, but its opening is not the parallel-to-handle design described.</li><li><strong>Hex Wrench:</strong> An L-shaped Allen key for hex-socket screws — unrelated to pipe gripping.</li></ul>"}, {"q": "10. In installing a leak-proof connection using copper tubing without soldering, what will be the most appropriate tool or method to use?", "opts": ["flaring tool", "shielded coupling", "wiping", "striker"], "ans": 0, "info": "Correct Answer: flaring tool. A flaring tool widens (flares) the end of soft copper tubing into a cone so it seals against a flare fitting — a leak-proof mechanical connection with no soldering required.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>shielded coupling:</strong> A no-hub/banded coupling for joining drainage pipe — not for leak-proof copper supply joints.</li><li><strong>wiping:</strong> A lead-joint technique using molten solder wiped by hand — that IS soldering/heat, which the question excludes.</li><li><strong>striker:</strong> A spark igniter for a torch — a soldering accessory, not a no-solder joining method.</li></ul>"}, {"q": "11. Identify the tool:<img alt='reference diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAMCAggICAgICAgIBggICAgICAYICAgHBwYIBgYICAgGCAgICAgICAgICAgICAoICAgICQkJBggLDQoIDQYICQgBAwQEBgUGCAYGCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICP/AABEIAfQB9AMBIgACEQEDEQH/xAAdAAEAAQUBAQEAAAAAAAAAAAAABwEFBggJBAID/8QATBAAAQQAAwQGBwQGBwYGAwAAAAECAwQFERIGEyEiBwgUMTJBIzNCUVJhcQkkYnIVQ1NjgZI0RFSCg6GiRWRzdJG0k7Gys8LwFiU1/8QAHAEBAAIDAQEBAAAAAAAAAAAAAAIDAQQFBwYI/8QAPREBAAECAwUFBQYDCAMAAAAAAAIBAwQREgUhMUFRBhMiMmFCUnGBkWKhosHR8AeC4SNDU5KywtLxJHKx/9oADAMBAAIRAxEAPwDqmAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA qAPnQnuKohUAChUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB/9k=' style='display:block;margin:14px auto 4px;max-width:100%;width:300px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;padding:6px'>", "opts": ["Drain Auger", "Closet Snake", "Closet Auger", "Snake Auger"], "ans": 2, "info": "Correct Answer: Closet Auger. 📷 A closet (toilet) auger has a curved, vinyl-coated guide tube and a crank-fed cable shaped to reach through a toilet's trap and clear clogs without scratching the bowl.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Drain Auger:</strong> A general hand auger/snake for sinks and small drains — straight housing, not shaped for a toilet trap.</li><li><strong>Closet Snake:</strong> Not the standard tool name; the correct term is closet auger.</li><li><strong>Snake Auger:</strong> Not a standard tool name.</li></ul>"}, {"q": "12. Piping color codes are used when utility companies stake out piping locations. A yellow flag generally indicates _____.", "opts": ["Hot Water", "Gas", "Chilled Water", "Storm"], "ans": 1, "info": "Correct Answer: Gas. In utility locating color codes, a YELLOW flag/paint marks gas, oil, steam, petroleum, or other flammable/gaseous lines.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Hot Water:</strong> Not gas-coded yellow; reclaimed/irrigation water is purple, potable water is blue.</li><li><strong>Chilled Water:</strong> Water lines are marked blue (potable) — not yellow.</li><li><strong>Storm:</strong> Storm/sewer/drain lines are marked green, not yellow.</li></ul>"}, {"q": "13. Excavated spoils must be kept _____ from trench edges.", "opts": ["4'", "3'", "2'", "1'"], "ans": 2, "info": "Correct Answer: 2'. Excavated spoils must be kept at least 2 feet (0.6 m) back from the trench edge so the material doesn't fall back in or surcharge the trench wall and cause collapse.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>4':</strong> More than the required minimum; 2' is the code/OSHA minimum setback.</li><li><strong>3':</strong> More than the required minimum; the standard is at least 2'.</li><li><strong>1':</strong> Too close — it would surcharge the trench wall and risk cave-in.</li></ul>"}, {"q": "14. Identify this type of plier.:<img alt='reference diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAMCAggIBgUICAgFBQUGBwYHBwYGBwcFBQgGBgYGBQUHBQUFBgYFBQUGBQUFBgoFBgcICQkJBQULDQoIDQYICQgBAwQEBgUGCAYGCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICP/AABEIAlgCWAMBIgACEQEDEQH/xAAeAAEAAQUBAQEBAAAAAAAAAAAACAQFBgcJAgMBCv/EAGEQAAIBAgIECAcLBgsEBwYHAAACAwEEBRIGBxETCBQhIiMyM0IxQ1JTY3ODFSQ0QVFhYnKTo7MJRGRxkdNUdIGChJKhw8Tj8JSisdQlRVWksrTCGLXB5PLzFhdlddHS8f/EABwBAQABBQEBAAAAAAAAAAAAAAACAwQFBgcBCP/EAEIRAQACAQMBBAcEBAsJAAAAAAACAwQBBRITBiIjMhEUITEzQlNBQ1JjYXFzowcWNESRk7HC0dPiFSRRVGJygYOh/9oADAMBAAIRAxEAPwDqmAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB//Z' style='display:block;margin:14px auto 4px;max-width:100%;width:300px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;padding:6px'>", "opts": ["Diagonal Pliers", "Bolt Cutter", "End Cutting Pliers", "Chain Cutter"], "ans": 2, "info": "Correct Answer: End Cutting Pliers. 📷 End cutting pliers (end nippers) have cutting jaws at the very end, perpendicular to the handles, for snipping wire, nails, or rivets flush to a surface.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Diagonal Pliers:</strong> Have angled cutting edges for snipping wire at an angle — the jaws are diagonal, not square at the end.</li><li><strong>Bolt Cutter:</strong> Long-handled heavy cutters for bolts/rods — much larger leverage tool.</li><li><strong>Chain Cutter:</strong> Specialized for cutting chain — different jaw form.</li></ul>"}, {"q": "15. The following are grounds for non-issuance of the certificate of registration by the Board of Master Plumbers except for _____.", "opts": ["guilty of immoral or dishonorable conduct", "convicted by court for any criminal offense", "failure to pay the required fees", "unsound mind"], "ans": 2, "info": "Correct Answer: failure to pay the required fees. All the other listed items are moral/legal grounds to refuse registration; non-payment of fees is an administrative matter, not a ground for non-issuance of the certificate.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>guilty of immoral or dishonorable conduct:</strong> A genuine ground for non-issuance — it speaks to fitness to practice.</li><li><strong>convicted by court for any criminal offense:</strong> A genuine legal ground for non-issuance.</li><li><strong>unsound mind:</strong> A genuine ground — mental fitness is required to be registered.</li></ul>"}, {"q": "16. For trenching, vertical braces should be located every _____.", "opts": ["6'", "8'", "2'", "4'"], "ans": 1, "info": "Correct Answer: 8'. In trench shoring, vertical braces (uprights) should be spaced no more than about 8 feet apart to hold the sheeting/shoring against the trench walls.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>6':</strong> Closer than required; 8' is the standard maximum spacing.</li><li><strong>2':</strong> Far closer than necessary for vertical brace spacing.</li><li><strong>4':</strong> Closer than the standard 8' spacing.</li></ul>"}, {"q": "17. A drainage cleaner that uses high-pressure to remove clogs", "opts": ["high-pressure force cup", "plunger", "snake", "jetter"], "ans": 3, "info": "Correct Answer: jetter. A jetter (hydro-jetter) uses high-pressure water through a nozzle to scour and flush clogs and buildup from drain lines.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>high-pressure force cup:</strong> A heavy-duty plunger — it uses manual air/water pressure surges, not continuous high-pressure water.</li><li><strong>plunger:</strong> Clears clogs with manual suction/pressure — low pressure, not a jetter.</li><li><strong>snake:</strong> A mechanical cable that bores/cuts through clogs — not a high-pressure water tool.</li></ul>"}, {"q": "18. Identify the symbol.:<img alt='reference diagram' src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEMAAAA/CAIAAAA0SOKeAAAAA3NCSVQICAjb4U/gAAAE7ElEQVRoge1avUvzXBTPV9MkjU2trVi1IFJEKIUOdRNBwcHF an's Plier. 📷 Lineman's pliers have flat gripping jaws plus a side cutter near the pivot, built for heavy gripping, twisting, and cutting of wire.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Slip Joint:</strong> General-purpose pliers with an adjustable pivot for two jaw widths — lighter duty.</li><li><strong>Locking Pliers:</strong> Clamp and lock onto a workpiece (e.g., Vise-Grips) — different mechanism.</li><li><strong>Longnose Plier:</strong> Long tapered jaws for reaching into tight spaces and fine work — not heavy lineman's work.</li></ul>"}, {"q": "21. Minimum and maximum safe space level of oxygen in a confined space.", "opts": ["19.5% to 23.5%", "20% to 23.5%", "19% to 22.5%", "21% to 22%"], "ans": 0, "info": "Correct Answer: 19.5% to 23.5%. A confined space is considered safe when oxygen is between 19.5% (minimum) and 23.5% (maximum). Below 19.5% is oxygen-deficient; above 23.5% is oxygen-enriched (fire risk).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>20% to 23.5%:</strong> The lower limit is 19.5%, not 20%.</li><li><strong>19% to 22.5%:</strong> Both bounds are off — the accepted range is 19.5% to 23.5%.</li><li><strong>21% to 22%:</strong> Far too narrow; 21% is normal air, but the safe working range is 19.5%–23.5%.</li></ul>"}, {"q": "📷 22. Identify the hanger. <span style='font-weight:400;color:#7f8c8d;font-size:0.9rem;'>(reference image not available in source &mdash; tap an answer to study it)</span>", "opts": ["Adjustable Coach Screw Clip for Branch Lines", "Adjustable Clip for Branch Lines", "Center I-beam Clamp for Branch Lines", "Wrap-around U Hook"], "ans": 1, "info": "Correct Answer: Adjustable Clip for Branch Lines. 📷 This hanger is an adjustable clip that grips a branch line and allows height/position adjustment, without the coach-screw mounting feature.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Adjustable Coach Screw Clip for Branch Lines:</strong> Similar clip but mounted with a coach (lag) screw into wood/structure — the screw feature distinguishes it.</li><li><strong>Center I-beam Clamp for Branch Lines:</strong> Clamps onto the center of an I-beam flange — a beam-mounted hanger, not a clip.</li><li><strong>Wrap-around U Hook:</strong> A U-shaped hook that wraps the pipe — a different hanger form.</li></ul>"}, {"q": "23. An auger bit is used for drilling _____.", "opts": ["Wood", "Metal", "Plastic", "Soft metals"], "ans": 0, "info": "Correct Answer: Wood. An auger bit has a screw tip and spiraled flutes designed to pull into and clear chips from WOOD when drilling.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Metal:</strong> Metal is drilled with twist/HSS bits, not wood auger bits.</li><li><strong>Plastic:</strong> Plastics use twist or spur bits; an aggressive auger tends to grab and crack plastic.</li><li><strong>Soft metals:</strong> Still drilled with metal-rated bits, not wood augers.</li></ul>"}, {"q": "24. Identify the tool.:<img alt='reference diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAMCAggICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAoICAgICQkJCAgLDQoIDQgICQgBAwQEBgUGCgYGCgoNCg0ICAoNCgoNCAoKDQ0NCAgICA0ICAgICAgIDQgICAgICAgICAgICAgICAgICAgICAgICP/AABEIAisC5AMBIgACEQEDEQH/xAAeAAEAAQQDAQEAAAAAAAAAAAAABgUHCAkBAwQCCv/EAEkQAAICAQMCBQEGAwUGBQMBCQECAAMRBBIhBTEGBxMiQVEIFCMyYYFCcZEJM1KhsRUkQ2LB8DRTY3LhgtHxcxYXRGSDkqOywv/EABoBAQACAwEAAAAAAAAAAAAAAAACAwEEBQb/xAA2EQEAAgECAwUGBgEEAwE rgin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Clevis hanger:</strong> A complete pipe hanger that USES a clevis plus a band/strap to carry a horizontal pipe — the question describes the clevis shackle itself.</li><li><strong>Center beam clamp:</strong> Clamps to the center of a beam to hang a rod — not a drilled shackle.</li><li><strong>Channel clamp:</strong> Secures pipe to strut channel — a different fastening device.</li></ul>"}, {"q": "28. If you do find algae in your reservoir, you can combat them by ____ in your reservoir water.", "opts": ["increasing the pH", "increasing the air concentration", "lowering the pH", "increasing the oxygen levels"], "ans": 2, "info": "Correct Answer: lowering the pH. Making reservoir water more acidic (lower pH) suppresses algae growth, which thrives in neutral-to-alkaline water.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>increasing the pH:</strong> Higher (more alkaline) pH tends to ENCOURAGE algae, not combat it.</li><li><strong>increasing the air concentration:</strong> Aeration doesn't directly kill algae; it can even help some species.</li><li><strong>increasing the oxygen levels:</strong> More oxygen doesn't suppress algae — algae themselves produce oxygen.</li></ul>"}, {"q": "29. A heavy sprocket chain that is slipped around a pipe, then attached to wrench handled and used on piping work especially large size pipe metal pipes and in areas that is not easily accessible", "opts": ["offset pipe wrench", "adjustable spud wrench", "chain wrench", "compound leverage wrench"], "ans": 2, "info": "Correct Answer: chain wrench. A chain wrench wraps a heavy sprocket chain around the pipe and tightens via the handle — ideal for very large pipe and tight, awkward spots where a fixed-jaw wrench won't fit.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>offset pipe wrench:</strong> Has angled jaws for pipe near walls, but limited by jaw capacity on very large pipe.</li><li><strong>adjustable spud wrench:</strong> Smooth jaws for large nuts — not a chain-gripping tool.</li><li><strong>compound leverage wrench:</strong> Multiplies force for stubborn joints, but uses jaws, not a wrap-around chain.</li></ul>"}, {"q": "30. For use in cleaning pipes of general material clinging to pipe walls.", "opts": ["Spade Cutter", "Four Blade Saw Tooth Cutter", "Sharktooth Cutter", "Spiral Bar Cutter"], "ans": 2, "info": "Correct Answer: Sharktooth Cutter. 📷 The sharktooth cutter head scrapes general clinging material (grease, scale, sludge) off the pipe walls as it's pulled through on a drain machine.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Spade Cutter:</strong> A flat blade for cutting through soft obstructions/roots — not for wall scraping.</li><li><strong>Four Blade Saw Tooth Cutter:</strong> An aggressive cutting head for roots/heavy obstructions, not general wall cleaning.</li><li><strong>Spiral Bar Cutter:</strong> Spiraled bars that scrape walls too, but the tool specified for general clinging material is the sharktooth cutter.</li></ul>"}, {"q": "31. TPI of hacksaw blade used for general work shops", "opts": ["14 TPI", "18 TPI", "32 TPI", "24 TPI"], "ans": 1, "info": "Correct Answer: 18 TPI. A general-purpose hacksaw blade for shop work commonly uses 18 teeth per inch — a balance between cutting speed and tooth strength.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>14 TPI:</strong> Coarser — for thicker, softer materials; fewer teeth per inch.</li><li><strong>32 TPI:</strong> Very fine — for thin sheet/tubing; too fine for general shop work.</li><li><strong>24 TPI:</strong> Finer than general work; used for thinner metals.</li></ul>"}, {"q": "32. Copper piping used for medical gas systems should only be cut with a _____.", "opts": ["Hacksaw", "Reciprocating Saw", "Copper tubing cutter", "Band saw"], "ans": 2, "info": "Correct Answer: Copper tubing cutter. Medical-gas copper must be cut with a tubing cutter (not sawed) so no filings, oil, or heat contaminate the line — cleanliness is critical for medical gas systems.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Hacksaw:</strong> Leaves metal filings and burrs that can contaminate a medical-gas line — prohibited.</li><li><strong>Reciprocating Saw:</strong> Generates debris and heat — unacceptable for clean medical-gas tubing.</li><li><strong>Band saw:</strong> Also produces chips/filings — not allowed for medical-gas copper.</li></ul>"}, {"q": "33. Brass pipe is one of the approved materials for water service piping. On what standard is it based?", "opts": ["ASTM D2846", "ASTM B302", "ASTM A53", "ASTM B43"], "ans": 3, "info": "Correct Answer: ASTM B43. ASTM B43 is the standard specification for seamless red brass pipe, an approved material for water service piping.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>ASTM D2846:</strong> Covers CPVC hot/cold water distribution pipe — a plastic standard, not brass.</li><li><strong>ASTM B302:</strong> Covers threadless copper pipe — copper, not brass.</li><li><strong>ASTM A53:</strong> Covers welded/seamless steel pipe — not brass.</li></ul>"}, {"q": "34. What is the material applied to a thread of a pipe to compensate for workmanship in a screw joint?", "opts": ["Pipe Dope", "Teflon Tape", "Motor Oil", "Oil"], "ans": 1, "info": "Correct Answer: Teflon Tape. PTFE (Teflon) thread-seal tape is wrapped on pipe threads to fill minor imperfections and lubricate the joint, compensating for workmanship in a screwed joint.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Pipe Dope:</strong> Pipe-joint compound also seals threads, but the answer specified here is Teflon tape.</li><li><strong>Motor Oil:</strong> A lubricant, not a thread sealant — won't seal a joint.</li><li><strong>Oil:</strong> Same — provides no sealing of the thread joint.</li></ul>"}, {"q": "35. Identify the tool:<img alt='reference diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAMCAggICAgICAgGCAgJCAkGBggIBgcICAcFBwYHBwcGBgYHBwYHBwYFBQYGBgoGBQcICQkJBgULDQoIDQYICQgBAwQEBgUGCgYGCAgHBwgQDQgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICP/AABEIAScAbQMBIgACEQEDEQH/xAAdAAEAAgIDAQEAAAAAAAAAAAAACAkGBwEDBQIE/8QARhAAAgECAgQJCAcHAgcAAAAAAQIAAxEEEgUGByEIEyIxMkJicXIjQVFSgpKisgkkJTNhgcIUNHN0obHBk9JDVGSD0eHw/8QAGwEBAAIDAQEAAAAAAAAAAAAAAAUHAwQGAgH/xAAoEQACAQMDAwQDAQEAAAAAAAAAAQIDETMEBXESITETI0FRMmGBIhT/2gAMAwEAAhEDEQA/ALU4iIBwRPNxWrlCo4qPSpNUHRdkBYdzT04gHnV9C0mUoadMqxzOuQZWb1mXzzqbVyganGmlS4wCwqFBn96fsxVYKLk2ABZidwAHOTIway8MOlX45NEvhK5pu1Il6oDFkbKzLR6TLnXpzFUqKnG7PcIOclFfJJGjq5h1dqi0aIdrh3CAM3pu050fq3QpEmlSpUyxu5RQpbxZZExdsekaty+KNIZc26men51y9WeedpumFdWo4lmW4DiqUCDwtI1a+MpWUZMkP+BpXc4kzKWj6YBUKoU3uoAAObn3dufhw+p+FS5XD4dSdxtSQX/pNbbONu1CqHp4upTpVqYBJPJV0y5syzVe3fh0YXC06lLRhFbEAENVdStJPTlzfeNJaN2k7eSMlaLaJT1ND0ipU06ZQkOVyjKXGXK3i5K8qfVbH06Y3vTUW33cC0qUrcNnTOLdqX7ZWdyeSlIJT93L0p209KabxYu9WsLnrVXY5fem5HTO12+k11WT8Itb0frRh6jZEr0HfnyrUBOXwz2gZWDs+2eaVp4iliKdesKiMrqb2DZW6Ldl5ZT Lifeline. A lifeline is the flexible line of a fall-protection system, anchored at one end so it hangs vertically or stretches horizontally, to which a worker connects.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Rope Grab:</strong> A device that grips the lifeline and locks under a fall — it rides ON the lifeline, it isn't the line.</li><li><strong>Body Belt:</strong> Worn around the waist for positioning — a body component, not the line.</li><li><strong>Lanyard:</strong> The shorter connecting line between the harness and the anchor/lifeline — not the lifeline itself.</li></ul>"}, {"q": "38. Identify the drawing.:<img alt='reference diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAMCAggJCggICAgKCAgICAUICAgJCAYICAcJBwcHBwYHBwYHCAYHBQcFBwYHBQoHBgcICQkJBQcLDQoIDQYICQgBAwQEAgICCQICCQgCAgIICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICP/AABEIADoAngMBIgACEQEDEQH/xAAdAAABBAMBAQAAAAAAAAAAAAAAAgcICQEDBgQF/8QAOhAAAQMCAwQFCgUFAQAAAAAAAgABAwQRBQgSBxMhIgYJMTKSFEFCUVJhYoLS4hhykaKyU1RxgcIZ/8QAFAEBAAAAAAAAAAAAAAAAAAAAAP/EABQRAQAAAAAAAAAAAAAAAAAAAAD/2gAMAwEAAhEDEQA/ALU0IQgEJDmtDVwX06hv6r8UHqQks6UgEIQgEJBn/peaPEQd7MYu/quN0HsQsMsoBCFh3QZQtZyW4vwZaoKwX7CZ/wDD3QelCSxJSAQhCBOpa6ioYWcn4MzXd/MyiN0w6wehpaiSmOCVyB7O7Pwf9q4TaT1jVGdJUhFDKMhREwE78Ge4/Cg6DMrnvjoJXpKQTkm1OF4+dmf8oiotQZuOkkc/lZtJuNWvRuT1afEmE2f7a6Uairr60CmlJxOKz9wuXvCQn8S0S51a06hwImejc7NHo5mD1akFneVrPTBi0nkswlFPqYG3j6bv7hIfephRys7XbsfiyoIn2v0lLX0WIUQFGTajl431lq7RERD2VYf0R6yCjaCJpIJXJgBne/a/hQTq1Lz1tYICRE9mZid+NuDMoa/+k2H/ANvN+v2rhts3WPUhUkgRQyiZCQs9+HMxD7KD6mZrPtuJzocNE5JbW1RtrFn7voqN3R7NV0lppfKKjeFDe7s0Js7NfV7Xspieg21+lpwmrTjIqopKjSd7szE5EPLp+Jbej2dStlkKKrdpKYmIWAQs7MXL3kFtWWPNrTYxGIk7hMzXITexeFSP1KhPoXt2iw3FBqqYTCEihYgvd7XIi/krFqfrJ6BxZ/J5uz1/agmtqXzOkfSGOnjOaQmYQa73e3BQ/frJqD+3l/X7UyOa7P5FVURwUoSRvJGQu5Pw/iCDottvWHzFNLRYaEhExEGsRIxv8qanornR usually constructed in a cantilevered manner, with or without additional diagonal structural members for load stability.", "opts": ["Cable Sway Brace", "Cable", "Bracket", "Axial Brace"], "ans": 2, "info": "Correct Answer: Bracket. A bracket is a preformed support/fastener, often cantilevered (projecting from a wall), sometimes with diagonal members for stability, used to carry pipe or equipment.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Cable Sway Brace:</strong> A cable used to restrain pipe against seismic sway — a brace, not a cantilevered support bracket.</li><li><strong>Cable:</strong> Just the wire rope element — not a preformed cantilevered support.</li><li><strong>Axial Brace:</strong> Resists movement along the pipe axis (seismic) — not a wall bracket.</li></ul>"}, {"q": "40. A wrench with one fixed and one adjustable jaw at right angles to a straight handle", "opts": ["Spud Wrench", "Monkey Wrench", "Compound Leverage Wrench", "Pipe Wrench"], "ans": 1, "info": "Correct Answer: Monkey Wrench. A monkey wrench has one fixed and one adjustable jaw, both set at right angles to a straight handle, for gripping flat-sided nuts and fittings.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Spud Wrench:</strong> Has smooth jaws sized for large slip/packing nuts — not the right-angle adjustable-jaw design.</li><li><strong>Compound Leverage Wrench:</strong> A force-multiplying pipe wrench for stubborn joints — different mechanism.</li><li><strong>Pipe Wrench:</strong> Has serrated, slightly angled jaws to bite ROUND pipe; the monkey wrench's flat jaws are at a true right angle for nuts.</li></ul>"}, {"q": "41. Hanger rod size for 4\" pipe size", "opts": ["1/2\"", "5/8\"", "3/4\"", "3/8\""], "ans": 3, "info": "Correct Answer: 3/8\". For a 4-inch pipe, the standard minimum hanger rod size is 3/8 inch.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>1/2\":</strong> Used for larger pipe sizes (about 5\"–8\"); larger than needed for 4\" pipe.</li><li><strong>5/8\":</strong> For still larger pipe (around 10\"–12\").</li><li><strong>3/4\":</strong> For very large pipe (about 14\" and up) — far heavier than a 4\" line requires.</li></ul>"}, {"q": "42. A galvanized steel pipe can be cut with a ____ and ____.", "opts": ["Pipe cutter and a knife", "Pipe cutter and hacksaw", "Reamer and knife", "Reamer and pipe cutter"], "ans": 1, "info": "Correct Answer: Pipe cutter and hacksaw. Galvanized steel pipe is commonly cut either with a pipe cutter (clean square cut) or a hacksaw (where a cutter won't fit).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Pipe cutter and a knife:</strong> A knife can't cut steel pipe.</li><li><strong>Reamer and knife:</strong> A reamer only removes the inside burr after cutting — and a knife can't cut steel.</li><li><strong>Reamer and pipe cutter:</strong> The reamer deburrs; it doesn't cut. The cutting pair is pipe cutter and hacksaw.</li></ul>"}, {"q": "43. A simple tool used for opening up the end of a lead pipe in preparation for making a wiped joint.", "opts": ["Flaring Tool", "Pipe Expander", "Turnpin", "Fusion Welder"], "ans": 2, "info": "Correct Answer: Turnpin. A turnpin (tan pin) is a tapered tool driven into the end of a lead pipe to open/round it out in preparation for making a wiped joint.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Flaring Tool:</strong> Flares soft COPPER tubing for flare fittings — not for opening lead pipe.</li><li><strong>Pipe Expander:</strong> Expands tubing ends generally, but the traditional lead-pipe tool for a wiped joint is the turnpin.</li><li><strong>Fusion Welder:</strong> Heat-fuses thermoplastic pipe (PPR/PE) — unrelated to lead wiped joints.</li></ul>"}, {"q": "44. How many turns does it take to operate a 6” double-disk valve?", "opts": ["18.5", "20.5", "16.5", "17.5"], "ans": 1, "info": "Correct Answer: 20.5. Operating a 6-inch double-disk gate valve from fully closed to fully open takes about 20.5 turns of the handwheel.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>18.5:</strong> Too few turns for a 6\" double-disk valve.</li><li><strong>16.5:</strong> Too few — corresponds to a smaller valve.</li><li><strong>17.5:</strong> Still short of the ~20.5 turns required for this valve size.</li></ul>"}, {"q": "45. LEL means _____.", "opts": ["Limited Explosive Level", "Lower Explosive Level", "Lower Explosive Limit", "Last Explosive Limit"], "ans": 2, "info": "Correct Answer: Lower Explosive Limit. LEL is the Lower Explosive Limit — the minimum concentration of a gas/vapor in air that can ignite. Below the LEL the mixture is too lean to burn.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Limited Explosive Level:</strong> Not the correct expansion of the acronym.</li><li><strong>Lower Explosive Level:</strong> Close, but the standard term is 'Limit,' not 'Level.'</li><li><strong>Last Explosive Limit:</strong> Not a real term.</li></ul>"}, {"q": "46. What should be the distance of the base of the ladder if it's working length is 15ft?", "opts": ["7.5 ft", "4.25 ft", "3.75 ft", "3 ft"], "ans": 2, "info": "Correct Answer: 3.75 ft. Ladders follow the 4:1 rule — the base sits out 1 unit for every 4 units of working length. 15 ft ÷ 4 = 3.75 ft.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>7.5 ft:</strong> That's half the length (a 2:1 ratio) — far too far out and unstable.</li><li><strong>4.25 ft:</strong> Doesn't match the 4:1 rule for a 15-ft working length.</li><li><strong>3 ft:</strong> Would be a 5:1 ratio — too steep (base too close to the wall).</li></ul>"}, {"q": "47. Trenches shall be back-filled in thin layers of _____ above the top of the pipe with clean earth.", "opts": ["0.2 m", "0.3 m", "1.2 m", "0.6 m"], "ans": 1, "info": "Correct Answer: 0.3 m. Backfill should be placed and compacted in thin layers of about 0.3 m (one foot) of clean earth above the top of the pipe to protect it and avoid voids.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>0.2 m:</strong> Thinner than the specified 0.3 m layer.</li><li><strong>1.2 m:</strong> Far too thick — heavy lifts can damage the pipe and won't compact properly.</li><li><strong>0.6 m:</strong> Thicker than the recommended 0.3 m layer.</li></ul>"}, {"q": "48. This describes the putting of pipe and fittings together without making a permanent joint for the purpose of checking the feasibility of an installation.", "opts": ["Roughing-in", "Dry fitting", "Trial Installation", "Mock-up installation"], "ans": 1, "info": "Correct Answer: Dry fitting. Dry fitting is assembling pipe and fittings WITHOUT cement/permanent joints, just to check that the layout fits and works before final assembly.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Roughing-in:</strong> Installing the concealed piping (in walls/floors) up to the fixture stub-outs — actual permanent work, not a trial.</li><li><strong>Trial Installation:</strong> Not the standard term; the recognized term is dry fitting.</li><li><strong>Mock-up installation:</strong> A full-scale model/sample, broader than simply dry-fitting pipe to check feasibility.</li></ul>"}, {"q": "49. A hot water return line is drawn with _____.", "opts": ["Solid line with three dashes", "Solid line with two dashes", "Broken lines", "Solid line with one dash"], "ans": 0, "info": "Correct Answer: Solid line with three dashes. On plumbing drawings, a hot-water RETURN line is drawn as a solid line interrupted by three dashes, distinguishing it from the hot-water supply line.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Solid line with two dashes:</strong> Convention for the hot-water SUPPLY line, not the return.</li><li><strong>Broken lines:</strong> Generally indicate other services (or future/existing work), not the hot-water return.</li><li><strong>Solid line with one dash:</strong> Not the standard hot-water return convention.</li></ul>"}, {"q": "50. Pipe longer than 12 inches is regarded as _____.", "opts": ["Cut Pipe", "Coupling", "Extra-long nipple", "Nipple"], "ans": 0, "info": "Correct Answer: Cut Pipe. A length of pipe over 12 inches long is classified as 'cut pipe.' (At or under 12 inches with threads it would be a nipple.)", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Coupling:</strong> A fitting that joins two pipes — not a length of pipe.</li><li><strong>Extra-long nipple:</strong> Nipples are 12 inches or shorter; beyond that it's cut pipe, not a nipple.</li><li><strong>Nipple:</strong> A short pipe piece up to 12 inches with threads — anything longer is cut pipe.</li></ul>"}];

    let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let timerInterval = null;
    let timeLeft = 0;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');

    const startMenuHTML = `
        <div id="start-menu" style="text-align:center;padding:20px 0;">
            <h2 style="color:var(--primary);margin-bottom:10px;">Weekly Test 8</h2>
            <p style="color:#7f8c8d;margin-bottom:30px;font-size:0.95rem;">Practical Problems &mdash; Tools, Materials &amp; Field Practice</p>
            <button class="nav-btn" style="display:block;width:100%;margin-bottom:15px;background:var(--secondary);color:white;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;" onclick="goBackToPortal()">&#8592; Back to Portal</button>
            <button class="nav-btn next" style="display:block;width:100%;margin-bottom:15px;background:var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block;width:100%;margin-bottom:15px;background:#e67e22;" onclick="startQuiz(true)">Start Exam Mode (50 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none;width:100%;margin-bottom:15px;background:#27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('weeklyTest8_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    const header = document.querySelector('.header');
    header.insertAdjacentHTML('afterend', '<div id="timer-display" style="display:none;text-align:center;font-size:1.5rem;font-weight:bold;color:#e74c3c;margin-bottom:15px;"></div>');

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0;
        userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
            startTimer(50 * 60);
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('weeklyTest8_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ;
            userAnswers = state.userAnswers;
            isExamMode = false;
            updateScore(); loadQuestion();
        }
    }

    function startTimer(seconds) {
        timeLeft = seconds;
        document.getElementById('timer-display').style.display = 'block';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); showResults(true); }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = 'Time: ' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
    }

    function saveState() {
        if (isExamMode) return;
        localStorage.setItem('weeklyTest8_state', JSON.stringify({ currentQ, userAnswers }));
    }

    function updateScore() {
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const scoreSpan = document.querySelector('.score');
        if (isExamMode) scoreSpan.style.display = 'none';
        else { scoreSpan.style.display = 'inline'; document.getElementById('score-val').innerText = s; }
    }

    function loadQuestion() {
        const q = questionsList[currentQ];
        document.getElementById('q-counter').innerText = 'Q: ' + (currentQ+1) + ' / ' + questionsList.length;
        let qText = q.q;
        if (isExamMode) qText = qText.replace(/^\d+\.\s*/, '');
        document.getElementById('question-text').innerHTML = qText;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        let displayOpts = q.opts.map((text, index) => ({ text, index }));
        if (isExamMode) {
            if (!q.shuffledOrder) {
                for (let i = displayOpts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [displayOpts[i], displayOpts[j]] = [displayOpts[j], displayOpts[i]];
                }
                q.shuffledOrder = displayOpts.map(o => o.index);
            } else {
                displayOpts = q.shuffledOrder.map(idx => ({ text: q.opts[idx], index: idx }));
            }
        }
        displayOpts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = String.fromCharCode(65+i) + '. ' + opt.text;
            btn.onclick = () => checkAnswer(opt.index, btn, displayOpts);
            optsContainer.appendChild(btn);
        });
        document.getElementById('info-box').style.display = 'none';
        document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (userAnswers[currentQ] !== null) {
            const buttons = document.querySelectorAll('.btn');
            const selectedIdx = userAnswers[currentQ];
            displayOpts.forEach((opt, btnIdx) => {
                const btn = buttons[btnIdx];
                if (isExamMode) {
                    if (opt.index === selectedIdx) { btn.style.border='2px solid var(--primary)'; btn.style.background='#eef7fd'; }
                } else {
                    btn.disabled = true;
                    if (opt.index === selectedIdx) btn.classList.add(opt.index === q.ans ? 'correct' : 'wrong');
                    if (opt.index === q.ans) btn.classList.add('correct');
                }
            });
            if (!isExamMode) {
                document.getElementById('info-box').innerHTML = '<strong>Review Note:</strong> ' + q.info + (q.other_defs || '');
                document.getElementById('info-box').style.display = 'block';
            }
            showNextButton();
        }
    }

    function checkAnswer(idx, btn, displayOpts) {
        if (!isExamMode && userAnswers[currentQ] !== null) return;
        userAnswers[currentQ] = idx;
        updateScore(); saveState();
        const buttons = document.querySelectorAll('.btn');
        const q = questionsList[currentQ];
        if (!isExamMode) {
            buttons.forEach(b => b.disabled = true);
            btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
            if (idx !== q.ans) {
                displayOpts.forEach((opt, bi) => {
                    if (opt.index === q.ans) buttons[bi].classList.add('correct');
                });
            }
            document.getElementById('info-box').innerHTML = '<strong>Review Note:</strong> ' + q.info + (q.other_defs || '');
            document.getElementById('info-box').style.display = 'block';
        } else {
            buttons.forEach(b => { b.style.border='2px solid #e9ecef'; b.style.background='#f8f9fa'; });
            btn.style.border='2px solid var(--primary)'; btn.style.background='#eef7fd';
        }
        showNextButton();
    }

    function showNextButton() {
        const btn = document.getElementById('next-btn');
        btn.innerText = currentQ < questionsList.length-1 ? 'Next \u27a1' : 'Finish \ud83c\udfc6';
        btn.style.display = 'block';
    }

    function prevQuestion() { if (currentQ > 0) { currentQ--; loadQuestion(); window.scrollTo(0,0); } }
    function nextQuestion() {
        if (currentQ < questionsList.length-1) { currentQ++; loadQuestion(); window.scrollTo(0,0); }
        else showResults();
    }

    function showResults(timesUp) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer-display').style.display = 'none';
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const p = Math.round((s/questionsList.length)*100);
        let msg = p >= 80 ? 'Excellent work!' : (p >= 60 ? 'Good job! Keep it up.' : 'Keep studying! You got this.');
        if (timesUp) msg = "Time's up! " + msg;
        quizContainer.innerHTML =
            '<div class="result-screen">' +
            '<h2 style="color:var(--primary);">Quiz Complete!</h2>' +
            '<p style="font-size:1.2rem;">You scored <strong>' + s + '</strong> out of <strong>' + questionsList.length + '</strong> (' + p + '%).</p>' +
            '<p>' + msg + '</p>' +
            '<button class="nav-btn next" style="display:block;width:100%;margin-top:15px;background:#f39c12;" onclick="showReview()">Review All Answers</button>' +
            '<button class="nav-btn next" style="display:block;width:100%;margin-top:15px;" onclick="location.reload()">Return to Main Menu</button>' +
            '</div>';
    }

    function showReview() {
        let reviewHTML = '<div style="text-align:left;"><h2 style="color:var(--primary);text-align:center;">Exam Review</h2><p style="text-align:center;margin-bottom:20px;">Correct answers in green. Your wrong choices in red.</p>';
        questionsList.forEach(function(q, i) {
            var uAns = userAnswers[i];
            var isCorrect = uAns === q.ans;
            var unanswered = uAns === null || uAns === undefined;
            var qStatus = isCorrect
                ? '<span style="color:var(--correct);font-weight:bold;float:right;">Correct</span>'
                : (unanswered ? '<span style="color:#f39c12;font-weight:bold;float:right;">Unanswered</span>'
                              : '<span style="color:var(--wrong);font-weight:bold;float:right;">Incorrect</span>');
            var borderColor = isCorrect ? 'var(--correct)' : (unanswered ? '#f39c12' : 'var(--wrong)');
            var qTextClean = q.q.replace(/^\d+\.\s*/, '');
            reviewHTML += '<div style="margin-bottom:30px;padding:20px;border:2px solid ' + borderColor + ';border-radius:12px;background:#fff;box-shadow:0 4px 6px rgba(0,0,0,0.05);">';
            reviewHTML += '<div style="font-weight:600;font-size:1.05rem;margin-bottom:15px;color:var(--text);">' + qStatus + (i+1) + '. ' + qTextClean + '</div>';
            reviewHTML += '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:15px;">';
            q.opts.forEach(function(opt, optIdx) {
                var style = 'padding:12px;border-radius:8px;border:1px solid #e9ecef;background:#f8f9fa;color:var(--text);';
                var label = String.fromCharCode(65+optIdx) + '. ' + opt;
                if (optIdx === q.ans) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--correct);background:var(--correct-bg);color:#1e8449;font-weight:700;';
                    label += ' (Correct Answer)';
                } else if (optIdx === uAns && !isCorrect) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--wrong);background:var(--wrong-bg);color:#922b21;text-decoration:line-through;opacity:0.8;';
                    label += ' (Your Choice)';
                } else if (optIdx === uAns && isCorrect) {
                    label += ' (Your Choice)';
                }
                reviewHTML += '<div style="' + style + '">' + label + '</div>';
            });
            reviewHTML += '</div>';
            reviewHTML += '<div style="padding:15px;background:var(--info-bg);border-left:5px solid var(--info-border);border-radius:6px;font-size:0.9rem;line-height:1.6;"><strong>Review Note:</strong> ' + q.info + (q.other_defs||'') + '</div>';
            reviewHTML += '</div>';
        });
        reviewHTML += '<button class="nav-btn next" style="display:block;width:100%;margin-top:25px;background:var(--primary);" onclick="location.reload()">Return to Main Menu</button></div>';
        quizContainer.innerHTML = reviewHTML;
        window.scrollTo(0,0);
    }

    /* ── Dark mode & portal navigation ── */
    (function() {
        var THEME_KEY = 'mp_portal_theme';
        function applyTheme(isDark) {
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            var btn = document.getElementById('themeBtn');
            if (btn) btn.innerHTML = isDark ? '&#9728;&#65039;' : '&#127769;';
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        }
        window.toggleTheme = function() { applyTheme(document.body.getAttribute('data-theme') !== 'dark'); };
        window.goBackToPortal = function() { window.location.href = 'Review Portal.html'; };
        var saved = localStorage.getItem(THEME_KEY);
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(saved ? saved === 'dark' : prefersDark);
    })();
</script>
</body>
</html>
