pts": ["A. 18.9 LpD per lane", "B. 283.9 LpD per lane", "C. 56.8 LpD per lane", "D. 132.5 LpD per lane"], "ans": 1, "info": "Correct Answer: B<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Standard estimated sewage flow rate for bowling alleys with snack bar.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>18.9 LpD per lane:</strong> <em>This choice has no definition and was added as a distractor.</em></li><li><strong>56.8 LpD per lane:</strong> <em>This choice has no definition and was added as a distractor.</em></li><li><strong>132.5 LpD per lane:</strong> <em>This choice has no definition and was added as a distractor.</em></li></ul>", "raw_add_info": []}, {"q": "4. In a granule test of a water closet, the initial flush of three different flushes must result in no more than _____ on average remaining in the bowl.", "opts": ["A. 75", "B. 2,500", "C. 125", "D. 500"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Initial flush limit for WC granule test average.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>75:</strong> <em>This choice has no definition and was added as a distractor.</em></li><li><strong>2,500:</strong> The granule test utilizes approximately 2,500 disc-shaped granules of polyethylene.</li><li><strong>500:</strong> <em>This choice has no definition and was added as a distractor.</em></li></ul>", "raw_add_info": []}, {"q": "5. Minimum water seal of a grease trap", "opts": ["A. 152 mm", "B. 51 mm", "C. 102 mm", "D. 76 mm"], "ans": 1, "info": "Correct Answer: B<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Minimum water seal of a grease trap or standard p-trap.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>152 mm:</strong> Specified downspout size for a 800 sqm roof at 152.4 mm/hr intensity.</li><li><strong>102 mm:</strong> Standard rainfall intensity used for Manila area computations.</li><li><strong>76 mm:</strong> Minimum size for sewer pipe serving water closets.</li></ul>", "raw_add_info": []}, {"q": "6. What is the sewage that turns dark and smell unpleasantly due to anaerobic decomposition?", "opts": ["A. septic", "B. scum", "C. sludge", "D. anaerobic"], "ans": 0, "info": "Correct Answer: A<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Sewage undergoing anaerobic decomposition, turning dark and foul-smelling.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>scum:</strong> The floating parts in a septic tank.</li><li><strong>sludge:</strong> The semi-liquid substance that accumulates at the bottom.</li><li><strong>anaerobic:</strong> A type of decomposition occurring in the absence of free oxygen.</li></ul>", "raw_add_info": []}, {"q": "7. Maximum number of slip joint fitting that may be used on the outlet side of a trap", "opts": ["A. 4", "B. 2", "C. 1", "D. 3"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Maximum number of slip joint fitting allowed on the outlet side of a trap.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>4:</strong> The limit of wet venting for fixtures (maximum trap arm FU).</li><li><strong>2:</strong> Standard number of fixtures for specific venting.</li><li><strong>3:</strong> Standard number of fixtures for specific venting.</li></ul>", "raw_add_info": []}, {"q": "8. Normally in Manila, the rainfall intensity used is _____.", "opts": ["A. 178 mm", "B. 127 mm", "C. 102 mm", "D. 152 mm"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Standard rainfall intensity used for Manila area computations.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>178 mm:</strong> Circular bottom gutter size for 180 sqm roof area at 76 mm/hr intensity.</li><li><strong>127 mm:</strong> Standard size for gutters or downspouts.</li><li><strong>152 mm:</strong> Specified downspout size for a 800 sqm roof at 152.4 mm/hr intensity.</li></ul>", "raw_add_info": []}, {"q": "9. When the first compartment exceeds 3.7 m in length, an additional ____ shall be provided.", "opts": ["A. compartment", "B. return bend acting as a vent", "C. baffle wall", "D. manhole"], "ans": 3, "info": "Correct Answer: D<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Required additional opening when the first compartment exceeds 3.7 m in length.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>compartment:</strong> A division within a septic tank.</li><li><strong>return bend acting as a vent:</strong> Used for specific loop or circuit venting configurations.</li><li><strong>baffle wall:</strong> A partition in a septic tank to slow flow and allow settling.</li></ul>", "raw_add_info": []}, {"q": "10. Water closets that are made to accommodate overweight and obese people", "opts": ["A. Two-Piece Water Closet", "B. Double-Cylone Water Closet", "C. Trough Water Closet", "D. Bariatric Water Closet"], "ans": 3, "info": "Correct Answer: D<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Water closets specifically designed to accommodate overweight and obese individuals.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Two-Piece Water Closet:</strong> a.k.a Close-coupled toilet - the bowl and cistern are closely coupled together.</li><li><strong>Double-Cylone Water Closet:</strong> Uses two jet streams to clean out the bowl with as little water as possible.</li><li><strong>Trough Water Closet:</strong> A continuous trough containing water, used as a latrine.</li></ul>", "raw_add_info": []}, {"q": "11. A water that stands in or passes through the ground", "opts": ["A. Surface water", "B. Rain water", "C. Ground water", "D. Storm water"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Water that stands in or passes through the ground (sub-surface water).</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Surface water:</strong> Runs off over the surface of the ground.</li><li><strong>Rain water:</strong> Precipitation from the sky.</li><li><strong>Storm water:</strong> Runs off over the earth surface after a storm.</li></ul>", "raw_add_info": []}, {"q": "12. Rainwater piping located within a medium height building basement area shall be of Galvanized Iron, _____.", "opts": ["A. Schedule 10", "B. Schedule 30", "C. Schedule 80", "D. Schedule 40"], "ans": 1, "info": "Correct Answer: B<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Specified Schedule for Galvanized Iron rainwater piping in medium height building basements.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Schedule 10:</strong> A thin-walled pipe specification.</li><li><strong>Schedule 80:</strong> A thick-walled pipe specification.</li><li><strong>Schedule 40:</strong> Standard-walled pipe specification.</li></ul>", "raw_add_info": []}, {"q": "13. The maximum trap loading of a pipe size 76 mm", "opts": ["A. 3", "B. 6", "C. 8", "D. 4"], "ans": 1, "info": "Correct Answer: B<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Maximum trap loading fixture units for a 76 mm pipe.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>3:</strong> Standard number of fixtures for specific venting.</li><li><strong>8:</strong> Max FU for 102 mm pipe size.</li><li><strong>4:</strong> The limit of wet venting for fixtures (maximum trap arm FU).</li></ul>", "raw_add_info": []}, {"q": "14. Which of the following may be true about the sovent system?", "opts": ["A. it needs more space for installation", "B. it lessens the air pressure within the stack", "C. it uses more pipe system", "D. it has lesser maintenance cost"], "ans": 3, "info": "Correct Answer: D<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>One of the advantages of using a single-stack sovent system.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>it needs more space for installation:</strong> Distractor for sovent system questions.</li><li><strong>it lessens the air pressure within the stack:</strong> Distractor for sovent system questions.</li><li><strong>it uses more pipe system:</strong> Distractor for sovent system questions.</li></ul>", "raw_add_info": []}, {"q": "15. The principal artery of the venting system to which vent branches are connected.", "opts": ["A. Primary Vent", "B. Main Vent", "C. Stack Vent", "D. Vent Stack"], "ans": 1, "info": "Correct Answer: B<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>The principal artery of the venting system.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Primary Vent:</strong> Main vent for a drainage system.</li><li><strong>Stack Vent:</strong> The extension of a soil or waste stack above the highest horizontal drain.</li><li><strong>Vent Stack:</strong> The vertical vent pipe installed primarily for providing circulation of air to and from any part of the drainage system.</li></ul>", "raw_add_info": []}, {"q": "16. Which is the best location for vent termination?", "opts": ["A. away from doors", "B. inside ceiling space", "C. above the roof", "D. to the exterior walls"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Best location for vent termination to discharge sewer gases away from occupants.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>away from doors:</strong> Secondary consideration for vent termination location.</li><li><strong>inside ceiling space:</strong> Prohibited location for vent termination.</li><li><strong>to the exterior walls:</strong> Alternative vent termination, strictly regulated.</li></ul>", "raw_add_info": []}, {"q": "17. Connects directly with an individual trap underneath or behind the fixture", "opts": ["A. Individual Vent", "B. Revent Pipe", "C. Backvent Pipe", "D. Local Vent"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Connects directly with an individual trap underneath or behind a fixture.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Individual Vent:</strong> Vents a fixture trap and connects above the fixture served or terminates in the open air.</li><li><strong>Revent Pipe:</strong> A part of the vent system that connects directly with an individual trap.</li><li><strong>Local Vent:</strong> A pipe or shaft to convey foul air from a plumbing fixture or a room to the outer air.</li></ul>", "raw_add_info": []}, {"q": "18. If an air test for a plumbing system fails, what is the best solution?", "opts": ["A. Replace the entire plumbing system", "B. Accept small amount of leak", "C. Locate and replace pipe joints or sections that cause leaks", "D. Request for consideration from the inspector"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Correct procedure when an air test fails.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Replace the entire plumbing system:</strong> Impractical solution for air test failure.</li><li><strong>Accept small amount of leak:</strong> Prohibited under plumbing safety standards.</li><li><strong>Request for consideration from the inspector:</strong> Improper protocol for leak inspection.</li></ul>", "raw_add_info": []}, {"q": "19. Which is incorrect about water pipe testing?", "opts": ["A. It detects leaks.", "B. Water supply pipes can also be tested using air.", "C. It determines pressure capacity of the pipe.", "D. Smoke test is not preferable for water supply piping."], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Incorrect statement; pressure rating is a factory test, not a system leakage test.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>It detects leaks.:</strong> Function of water pipe testing.</li><li><strong>Water supply pipes can also be tested using air.:</strong> Permissible testing method for supply pipes.</li><li><strong>Smoke test is not preferable for water supply piping.:</strong> Smoke test is used for drainage and venting systems, not water supply.</li></ul>", "raw_add_info": []}, {"q": "20. What is the minimum distance from disposal field to another disposal field?", "opts": ["A. 2.4 m", "B. 1.5 m", "C. 1.2 m", "D. 1.8 m"], "ans": 2, "info": "Correct Answer: C<br><br><strong>Definition:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li>Minimum spacing between trenches or leaching beds.</li></ul>", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15     let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let timerInterval = null;
    let timeLeft = 0;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');

    const startMenuHTML = `
        <div id="start-menu" style="text-align: center; padding: 20px 0;">
            <h2 style="color: var(--primary); margin-bottom: 30px;">Weekly Test 3 - Plumbing Code</h2>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: #e67e22;" onclick="startQuiz(true)">Start Exam Mode (60 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none; width:100%; margin-bottom:15px; background: #27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('weeklyTest3_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    const header = document.querySelector('.header');
    header.insertAdjacentHTML('afterend', '<div id="timer-display" style="display:none; text-align:center; font-size:1.5rem; font-weight:bold; color:#e74c3c; margin-bottom:15px;"></div>');

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0;
        userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
            startTimer(60 * 60);
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('weeklyTest3_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ;
            userAnswers = state.userAnswers;
            isExamMode = false;
            updateScore(); loadQuestion();
        }
    }

    function startTimer(seconds) {
        timeLeft = seconds;
        document.getElementById('timer-display').style.display = 'block';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); showResults(true); }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = 'Time: ' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
    }

    function saveState() {
        if (isExamMode) return;
        localStorage.setItem('weeklyTest3_state', JSON.stringify({ currentQ, userAnswers }));
    }

    function updateScore() {
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const scoreSpan = document.querySelector('.score');
        if (isExamMode) scoreSpan.style.display = 'none';
        else { scoreSpan.style.display = 'inline'; document.getElementById('score-val').innerText = s; }
    }

    function loadQuestion() {
        const q = questionsList[currentQ];
        document.getElementById('q-counter').innerText = 'Q: ' + (currentQ + 1) + ' / ' + questionsList.length;
        let qText = q.q;
        if (isExamMode) qText = qText.replace(/^\d+\.\s*/, '');
        document.getElementById('question-text').innerHTML = qText;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        let displayOpts = q.opts.map((text, index) => ({ text, index }));
        if (isExamMode) {
            if (!q.shuffledOrder) {
                for (let i = displayOpts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [displayOpts[i], displayOpts[j]] = [displayOpts[j], displayOpts[i]];
                }
                q.shuffledOrder = displayOpts.map(o => o.index);
            } else {
                displayOpts = q.shuffledOrder.map(idx => ({ text: q.opts[idx], index: idx }));
            }
        }
        displayOpts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = String.fromCharCode(65 + i) + '. ' + opt.text.replace(/^[A-D]\.\s*/, '');
            btn.onclick = () => checkAnswer(opt.index, btn, displayOpts);
            optsContainer.appendChild(btn);
        });
        document.getElementById('info-box').style.display = 'none';
        document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (userAnswers[currentQ] !== null) {
            const buttons = document.querySelectorAll('.btn');
            const selectedIdx = userAnswers[currentQ];
            displayOpts.forEach((opt, btnIdx) => {
                const btn = buttons[btnIdx];
                if (isExamMode) {
                    if (opt.index === selectedIdx) { btn.style.border = '2px solid var(--primary)'; btn.style.background = '#eef7fd'; }
                } else {
                    btn.disabled = true;
                    if (opt.index === selectedIdx) btn.classList.add(opt.index === q.ans ? 'correct' : 'wrong');
                    if (opt.index === q.ans) btn.classList.add('correct');
                }
            });
            if (!isExamMode) {
                document.getElementById('info-box').innerHTML = '<strong>Review Note:</strong> ' + q.info + (q.other_defs || '');
                document.getElementById('info-box').style.display = 'block';
            }
            showNextButton();
        }
    }

    function checkAnswer(idx, btn, displayOpts) {
        if (!isExamMode && userAnswers[currentQ] !== null) return;
        userAnswers[currentQ] = idx;
        updateScore(); saveState();
        const buttons = document.querySelectorAll('.btn');
        const q = questionsList[currentQ];
        if (!isExamMode) {
            buttons.forEach(b => b.disabled = true);
            btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
            if (idx !== q.ans) {
                displayOpts.forEach((opt, bi) => {
                    if (opt.index === q.ans) buttons[bi].classList.add('correct');
                });
            }
            document.getElementById('info-box').innerHTML = '<strong>Review Note:</strong> ' + q.info + (q.other_defs || '');
            document.getElementById('info-box').style.display = 'block';
        } else {
            buttons.forEach(b => { b.style.border = '2px solid #e9ecef'; b.style.background = '#f8f9fa'; });
            btn.style.border = '2px solid var(--primary)'; btn.style.background = '#eef7fd';
        }
        showNextButton();
    }

    function showNextButton() {
        const btn = document.getElementById('next-btn');
        btn.innerText = currentQ < questionsList.length - 1 ? 'Next \u27a1' : 'Finish \ud83c\udfc6';
        btn.style.display = 'block';
    }

    function prevQuestion() { if (currentQ > 0) { currentQ--; loadQuestion(); window.scrollTo(0, 0); } }
    function nextQuestion() {
        if (currentQ < questionsList.length - 1) { currentQ++; loadQuestion(); window.scrollTo(0, 0); }
        else showResults();
    }

    function showResults(timesUp) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer-display').style.display = 'none';
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const p = Math.round((s / questionsList.length) * 100);
        let msg = p >= 80 ? 'Excellent work!' : (p >= 60 ? 'Good job!' : 'Keep studying!');
        if (timesUp) msg = "Time's up! " + msg;
        quizContainer.innerHTML =
            '<div class="result-screen">' +
            '<h2 style="color: var(--primary);">Quiz Complete!</h2>' +
            '<p style="font-size: 1.2rem;">You scored <strong>' + s + '</strong> out of <strong>' + questionsList.length + '</strong> (' + p + '%).</p>' +
            '<p>' + msg + '</p>' +
            '<button class="nav-btn next" style="display:block; width:100%; margin-top:15px; background: #f39c12;" onclick="showReview()">Review All Answers</button>' +
            '<button class="nav-btn next" style="display:block; width:100%; margin-top:15px;" onclick="location.reload()">Return to Main Menu</button>' +
            '</div>';
    }

    function showReview() {
        let reviewHTML = '<div style="text-align:left;"><h2 style="color:var(--primary);text-align:center;">Exam Review</h2><p style="text-align:center;margin-bottom:20px;">Correct answers highlighted in green. Your incorrect choices shown in red.</p>';
        questionsList.forEach(function(q, i) {
            var uAns = userAnswers[i];
            var isCorrect = uAns === q.ans;
            var unanswered = uAns === null || uAns === undefined;
            var qStatus = isCorrect
                ? '<span style="color:var(--correct);font-weight:bold;float:right;">Correct</span>'
                : (unanswered ? '<span style="color:#f39c12;font-weight:bold;float:right;">Unanswered</span>'
                              : '<span style="color:var(--wrong);font-weight:bold;float:right;">Incorrect</span>');
            var borderColor = isCorrect ? 'var(--correct)' : (unanswered ? '#f39c12' : 'var(--wrong)');
            var qTextClean = q.q.replace(/^\d+\.\s*/, '');
            reviewHTML += '<div style="margin-bottom:30px;padding:20px;border:2px solid ' + borderColor + ';border-radius:12px;background:#fff;box-shadow:0 4px 6px rgba(0,0,0,0.05);">';
            reviewHTML += '<div style="font-weight:600;font-size:1.1rem;margin-bottom:15px;color:var(--text);">' + qStatus + (i+1) + '. ' + qTextClean + '</div>';
            reviewHTML += '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:15px;">';
            q.opts.forEach(function(opt, optIdx) {
                var cleanOpt = opt.replace(/^[A-D]\.\s*/, '');
                var style = 'padding:12px;border-radius:8px;border:1px solid #e9ecef;background:#f8f9fa;color:var(--text);';
                var label = String.fromCharCode(65 + optIdx) + '. ' + cleanOpt;
                if (optIdx === q.ans) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--correct);background:var(--correct-bg);color:#1e8449;font-weight:700;';
                    label += ' (Correct Answer)';
                } else if (optIdx === uAns && !isCorrect) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--wrong);background:var(--wrong-bg);color:#922b21;text-decoration:line-through;opacity:0.8;';
                    label += ' (Your Choice)';
                } else if (optIdx === uAns && isCorrect) {
                    label += ' (Your Choice)';
                }
                reviewHTML += '<div style="' + style + '">' + label + '</div>';
            });
            reviewHTML += '</div>';
            var infoContent = '';
            if (q.info) infoContent += '<strong>Review Note:</strong> ' + q.info + '<br>';
            if (q.other_defs) infoContent += q.other_defs;
            if (infoContent) {
                reviewHTML += '<div style="padding:15px;background:var(--info-bg);border-left:5px solid var(--info-border);border-radius:6px;font-size:0.95rem;line-height:1.5;">' + infoContent + '</div>';
            }
            reviewHTML += '</div>';
        });
        reviewHTML += '<button class="nav-btn next" style="display:block;width:100%;margin-top:25px;background:var(--primary);" onclick="location.reload()">Return to Main Menu</button></div>';
        quizContainer.innerHTML = reviewHTML;
        window.scrollTo(0, 0);
    }

</script>
</body>
</html>
