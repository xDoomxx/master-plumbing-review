<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastery Test 1 - Definition of Terms</title>
    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #2c3e50; --primary: #3498db; --primary-hover: #2980b9;
            --correct: #2ecc71; --correct-bg: #e8f8f5; --wrong: #e74c3c; --wrong-bg: #fdedec;
            --info-border: #f39c12; --info-bg: #fef9e7; --secondary: #95a5a6; --secondary-hover: #7f8c8d;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #app { background: var(--card-bg); width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 25px; color: #7f8c8d; }
        .score { color: var(--primary); }
        .question { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; text-align: left; background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s ease; outline: none; }
        .btn:hover:not(:disabled) { background: #e2e6ea; border-color: #dae0e5; transform: translateY(-1px); }
        .btn:disabled { cursor: default; opacity: 0.9; }
        .btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #1e8449; font-weight: 700; }
        .btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #922b21; text-decoration: line-through; opacity: 0.7; }
        .info-box { margin-top: 25px; padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.5; display: none; animation: fadeIn 0.4s ease; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .nav-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-align: center; transition: background 0.2s; display: none; }
        .nav-btn.prev { background: var(--secondary); color: white; }
        .nav-btn.next { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .home-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .result-screen { text-align: center; padding: 20px 0; }
        [data-theme="dark"] {
            --bg: #0d1117; --card-bg: #161b22; --text: #e6edf3;
            --primary: #58a6ff; --primary-hover: #79b8ff;
            --correct: #3fb950; --correct-bg: rgba(63,185,80,0.15);
            --wrong: #f85149; --wrong-bg: rgba(248,81,73,0.15);
            --info-border: #d29922; --info-bg: rgba(210,153,34,0.1);
            --secondary: #30363d; --secondary-hover: #3c444d;
        }
        [data-theme="dark"] .header { border-bottom-color: #30363d; color: #8b949e; }
        [data-theme="dark"] .btn { background: #1c2128; border-color: #30363d; }
        [data-theme="dark"] .btn:hover:not(:disabled) { background: #262c36; border-color: #484f58; }
        [data-theme="dark"] #app { box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>

<script>
    const allQuestions = [{"q": "1. Any and all liquid or water-borne waste from industrial or commercial processes, except domestic sewage.", "opts": ["Chemical Waste", "Industrial Waste", "Liquid Waste", "Sanitary Waste"], "ans": 1, "info": "Correct Answer: B. Industrial Waste", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Chemical Waste:</strong> Waste containing chemical substances which may cause harm to the plumbing system.</li><li><strong>Liquid Waste:</strong> Discharge from any fixture, appliance, or appurtenance that does not contain fecal matter.</li><li><strong>Sanitary Waste:</strong> Wastewater containing human excrement and liquid household waste.</li></ul>"}, {"q": "2. Whenever any work regulated by this Code is dangerous to human life or detrimental to health and property and Inadequate or unsafe water supply and or sewage disposal system.", "opts": ["Contamination", "Cross-connection", "Nuisance", "Insanitary"], "ans": 2, "info": "Correct Answer: C. Nuisance", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Contamination:</strong> High Hazard. Impairment of potable water quality creating an actual hazard to public health.</li><li><strong>Cross-connection:</strong> Any physical connection between a potable water system and any source of non-potable liquid or contamination.</li><li><strong>Insanitary:</strong> A condition contrary to sanitary principles or injurious to health.</li></ul>"}, {"q": "3. It is a device designed and installed to separate and retain deleterious, hazardous, or undesirable matters from normal wastes and permits normal sewage or liquid wastes to discharge into the disposal terminal by gravity.", "opts": ["Drainfield", "Septic Tank", "Interceptor (clarifier)", "Catch Basin"], "ans": 2, "info": "Correct Answer: C. Interceptor (clarifier)", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Drainfield:</strong> An area containing a series of trenches with piping used to distribute septic tank effluent into the soil.</li><li><strong>Septic Tank:</strong> A watertight receptacle that receives sewage, allows solids to settle, and discharges effluent.</li><li><strong>Catch Basin:</strong> A receptacle designed to retain solids/debris from wastewater.</li></ul>"}, {"q": "4. Includes all the pipings within public or private premises which convey sewage or other liquid wastes to a legal point of disposal but does not include the mains of a public sewer system or a public sewage treatment or disposal plant.", "opts": ["Plumbing System", "Drainage System", "Combination Waste and Vent System", "Durham System"], "ans": 1, "info": "Correct Answer: B. Drainage System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing System:</strong> Includes all water supply, drainage, and venting systems and their fixtures.</li><li><strong>Combination Waste and Vent System:</strong> A specially designed system of waste piping embodying the horizontal wet venting of one or more floor drains or sinks.</li><li><strong>Durham System:</strong> A soil or waste system where all piping is threaded pipe, tubing, or other rigid construction.</li></ul>"}, {"q": "5. The vertical portion of a rainwater conductor.", "opts": ["Drain Pipe", "Gutter", "Downspout", "Leader"], "ans": 2, "info": "Correct Answer: C. Downspout", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Drain Pipe:</strong> A pipe that conveys liquid waste or sewage.</li><li><strong>Gutter:</strong> A trough along the eaves of a roof to catch rain.</li><li><strong>Leader:</strong> An exterior drainage pipe for conveying storm water from roof or gutter drains.</li></ul>"}, {"q": "6. Also called a \"sitz\" bath.", "opts": ["Water Closet", "Handheld Spray", "Bidet", "Bathtub"], "ans": 2, "info": "Correct Answer: C. Bidet", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Closet:</strong> A plumbing fixture used to receive human excreta.</li><li><strong>Handheld Spray:</strong> A flexible shower head attachment.</li><li><strong>Bathtub:</strong> A plumbing fixture for bathing.</li></ul>"}, {"q": "7. A branch vent that performs its functions for two (2) or more traps.", "opts": ["Group Vent", "Dual Vent", "Branch Vent", "Unit Vent"], "ans": 0, "info": "Correct Answer: A. Group Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Dual Vent:</strong> A vent connecting at the junction of two fixture drains (Common Vent).</li><li><strong>Branch Vent:</strong> A horizontal vent connecting one or more individual vents with a vent stack or stack vent.</li><li><strong>Unit Vent:</strong> A vent for a single fixture.</li></ul>"}, {"q": "8. The pipe carrying potable water from the water meter or other source of water supply to a building or other point of use or distribution on the lot.<br><br>_____ shall also mean water service connection.", "opts": ["Building Supply", "Water Main", "Service Pipe", "Water Distributing Pipe"], "ans": 0, "info": "Correct Answer: A. Building Supply", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Main:</strong> A water-supply pipe for public or community use.</li><li><strong>Service Pipe:</strong> The pipe from the water main or other source of potable water supply to the building.</li><li><strong>Water Distributing Pipe:</strong> Pipes conveying water from the service pipe to the plumbing fixtures.</li></ul>"}, {"q": "9. Pipes installed to provide flow of air to or from a drainage system or to provide a circulation of air within such system to protect traps seals from siphonage and back pressure.", "opts": ["Water Supply System", "Vent System", "Vent Pipe", "Plumbing System"], "ans": 1, "info": "Correct Answer: B. Vent System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Supply System:</strong> Consists of the water service pipe, the water-distributing pipes, and necessary appurtenances.</li><li><strong>Vent Pipe:</strong> A pipe attached to the drainage system to provide air circulation.</li><li><strong>Plumbing System:</strong> Includes all water supply, drainage, and venting systems and their fixtures.</li></ul>"}, {"q": "10. Per Plumbing Code, PVC Drainpipes with toxic components are colored _____.", "opts": ["Brown", "Orange", "Grey", "All of these"], "ans": 3, "info": "Correct Answer: D. All of these", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Brown:</strong> <em>This is a distractor related to color coding of pipes.</em></li><li><strong>Orange:</strong> <em>This is a distractor related to color coding of pipes.</em></li><li><strong>Grey:</strong> <em>This is a distractor related to color coding of pipes.</em></li></ul>"}, {"q": "11. The pressure existing without any flow motion.", "opts": ["Pressure", "Residual Pressure", "Pressure Relief", "Static Pressure"], "ans": 3, "info": "Correct Answer: D. Static Pressure", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Pressure:</strong> The normal force exerted by a fluid on a surface.</li><li><strong>Residual Pressure:</strong> The pressure available in a pipe while water is flowing.</li><li><strong>Pressure Relief:</strong> A valve designed to relieve excess pressure.</li></ul>"}, {"q": "12. An impairment of the quality of potable water which creates an actual hazard to public health through poisoning or spread of disease by sewage, industrial fluids or waste.<br><br>Also, defined as High Hazard.", "opts": ["Pollution", "Epidemic", "Cross-Connection", "Contamination"], "ans": 3, "info": "Correct Answer: D. Contamination", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Pollution:</strong> Low Hazard. An impairment of water quality that does not create a hazard to public health but affects domestic use.</li><li><strong>Epidemic:</strong> Widespread occurrence of an infectious disease.</li><li><strong>Cross-Connection:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "13. A valve located at the end of a water pipe through of which water can be drawn from or held within the pipe.", "opts": ["Spigot", "Faucet", "Fixture Supply", "Fixture"], "ans": 1, "info": "Correct Answer: B. Faucet", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Spigot:</strong> The end of a pipe that fits into a bell. Also a synonym for faucet.</li><li><strong>Fixture Supply:</strong> The water supply pipe connecting a fixture to a branch water supply pipe.</li><li><strong>Fixture:</strong> A receptacle attached to a plumbing system.</li></ul>"}, {"q": "14. A building designed as a home by the owner of such building, and shall be the only dwelling located on a parcel of ground with the usual accessory building.", "opts": ["Building", "Multi Family Dwelling", "Single Family Dwelling", "Structure"], "ans": 2, "info": "Correct Answer: C. Single Family Dwelling", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building:</strong> A structure built for the support, shelter, or enclosure of persons, animals, or property.</li><li><strong>Multi Family Dwelling:</strong> A building containing three or more dwelling units.</li><li><strong>Structure:</strong> That which is built or constructed.</li></ul>"}, {"q": "15. Sometimes called a wash basin.", "opts": ["Font", "Kitchen Sink", "Basin", "Lavatory"], "ans": 3, "info": "Correct Answer: D. Lavatory", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Font:</strong> A receptacle for water (often religious).</li><li><strong>Kitchen Sink:</strong> A fixture for washing dishes/food.</li><li><strong>Basin:</strong> A shallow vessel for holding water.</li></ul>"}, {"q": "16. It is a device, which discharges a predetermined quantity of water into fixtures for flushing purposes and is actuated by direct water pressure.", "opts": ["Flush Tank", "Flushometer Valve", "Flush Valve", "Flushometer Tank"], "ans": 1, "info": "Correct Answer: B. Flushometer Valve", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flush Tank:</strong> A tank for flushing a water closet or urinal.</li><li><strong>Flush Valve:</strong> A valve located at the bottom of a flush tank.</li><li><strong>Flushometer Tank:</strong> A tank integrated within an air accumulator vessel.</li></ul>"}, {"q": "17. A return bend of a small-sized pipe, one end of which is about 30 cm.<br><br>long and the other end is about 7.5 cm. long.<br><br>It is commonly used as a faucet for a pantry sink.<br><br>Also, the term means the flexible tubing connection between a service pipe and a water main.", "opts": ["Faucet", "Bibb", "Gooseneck", "Offset"], "ans": 2, "info": "Correct Answer: C. Gooseneck", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Faucet:</strong> A valve on a water pipe by means of which water can be drawn from or held within the pipe.</li><li><strong>Bibb:</strong> Synonymous with faucet, cock, tap, spigot.</li><li><strong>Offset:</strong> A combination of elbows/bends bringing a pipe out of line and back parallel.</li></ul>"}, {"q": "18. That portion of a fixture drain between a trap and the vent.", "opts": ["Tailpiece", "Trap Seal", "Bend", "Trap Arm"], "ans": 3, "info": "Correct Answer: D. Trap Arm", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Tailpiece:</strong> The pipe or tubing that connects the outlet of a plumbing fixture to the trap.</li><li><strong>Trap Seal:</strong> The vertical distance between the crown weir and top of the dip of the trap.</li><li><strong>Bend:</strong> A pipe fitting used to change direction.</li></ul>"}, {"q": "19. That portion of a vent pipe through where wastewater also flows through.", "opts": ["Revent Pipe", "Bypass Vent", "Wet Vent", "Dry Vent"], "ans": 2, "info": "Correct Answer: C. Wet Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Revent Pipe:</strong> A vent connecting directly with an individual trap.</li><li><strong>Bypass Vent:</strong> A vent used in specific trap configurations.</li><li><strong>Dry Vent:</strong> A vent that does not carry liquid or water-borne wastes.</li></ul>"}, {"q": "20. The water supply pipe between the fixture supply pipe and the water-distributing pipe.", "opts": ["Fixture Branch", "Faucet", "Service Pipe", "Branch"], "ans": 0, "info": "Correct Answer: A. Fixture Branch", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Faucet:</strong> A valve on a water pipe by means of which water can be drawn from or held within the pipe.</li><li><strong>Service Pipe:</strong> The pipe from the water main or other source of potable water supply to the building.</li><li><strong>Branch:</strong> Any part of the piping system other than a main, riser, or stack.</li></ul>"}, {"q": "21. Building sewer begins ____ meters outside the building wall.", "opts": ["0.6", "0.5", "0.3", "0.4"], "ans": 0, "info": "Correct Answer: A. 0.6", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>0.5:</strong> <em>A numerical distractor.</em></li><li><strong>0.3:</strong> <em>A numerical distractor.</em></li><li><strong>0.4:</strong> <em>A numerical distractor.</em></li></ul>"}, {"q": "22. An air pressure less than atmospheric. Also, implies siphonage in piping system.", "opts": ["Negative Pressure", "Backpressure", "Backflow", "Vacuum"], "ans": 3, "info": "Correct Answer: D. Vacuum", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Negative Pressure:</strong> Pressure less than atmospheric pressure.</li><li><strong>Backpressure:</strong> Air pressure in drainage pipes greater than atmospheric pressure.</li><li><strong>Backflow:</strong> The reverse flow of water or other liquids into the distributing pipes.</li></ul>"}, {"q": "23. Any wastewater containing animal or vegetable matter in suspension or solution and may include liquids containing chemicals in solution.", "opts": ["Sewage", "Domestic Sewage", "Liquid Waste", "Waste"], "ans": 0, "info": "Correct Answer: A. Sewage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Domestic Sewage:</strong> Liquid and water-borne wastes derived from ordinary living processes.</li><li><strong>Liquid Waste:</strong> Discharge from any fixture, appliance, or appurtenance that does not contain fecal matter.</li><li><strong>Waste:</strong> General term for liquid discharge.</li></ul>"}, {"q": "24. ________ is the minimum cross-sectional area at the point of water supply discharge measured or expressed in terms of: (1) the diameter of a circle;<br><br>(2) if the opening is not circular, the diameter of a circle of equivalent cross-sectional area.", "opts": ["Diameter", "Effective Opening", "Orifice", "Centerline"], "ans": 1, "info": "Correct Answer: B. Effective Opening", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Diameter:</strong> The nominal commercial designation, normally the inside diameter of the pipe.</li><li><strong>Orifice:</strong> An opening.</li><li><strong>Centerline:</strong> A line that represents the center of a pipe or structure.</li></ul>"}, {"q": "25. A hose fitting with clapper valves for combining the flow from two or more lines of hose into a single stream.<br><br>The inlet fitting of a fire standpipe located above ground level.", "opts": ["Wye", "Siamese Connection", "Tee", "Check Valve"], "ans": 1, "info": "Correct Answer: B. Siamese Connection", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Wye:</strong> A pipe fitting with a branch intersecting the main pipe at an angle.</li><li><strong>Tee:</strong> A pipe fitting with a branch intersecting the main pipe at 90 degrees.</li><li><strong>Check Valve:</strong> A valve that automatically closes to prevent the reverse flow of liquid or gas.</li></ul>"}, {"q": "26. In sewerage, a common sewer to which no other branch sewer is connected.<br><br>It receives sewage from building sewer service connections only.", "opts": ["Branch", "Lateral", "Branch Pipe", "Secondary"], "ans": 1, "info": "Correct Answer: B. Lateral", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Branch:</strong> Any part of the piping system other than a main, riser, or stack.</li><li><strong>Branch Pipe:</strong> A pipe connecting a branch to a main.</li><li><strong>Secondary:</strong> Subordinate or secondary pipeline.</li></ul>"}, {"q": "27. A loosely lined excavation in the ground which receives the discharge of a septic tank and designed to permit the effluent from the septic tank to seep through pit bottom and sides.", "opts": ["Privy Vault", "Cesspool", "Seepage Pit", "Leaching Cesspool"], "ans": 2, "info": "Correct Answer: C. Seepage Pit", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Privy Vault:</strong> A pit beneath a privy where excrement collects.</li><li><strong>Cesspool:</strong> A lined and covered excavation which receives the discharge of domestic sewage, retains solid matter, and allows liquid to seep into the soil.</li><li><strong>Leaching Cesspool:</strong> A cesspool that is not watertight.</li></ul>"}, {"q": "28. A vertical opening through a building for elevators, dumbwaiters, lights, ventilation or similar purposes.", "opts": ["Stack", "Chase", "Standpipe", "Shaft"], "ans": 3, "info": "Correct Answer: D. Shaft", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Stack:</strong> The vertical main of a system of soil, waste, or vent piping.</li><li><strong>Chase:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Standpipe:</strong> A vertical pipe generally used for the storage and distribution of water for fire extinguishing.</li></ul>"}, {"q": "29. A horizontal vent connecting one or more individual vertical back vents with the vent stack or stack vent.", "opts": ["Branch Vent", "Loop Vent", "Group Vent", "Circuit Vent"], "ans": 0, "info": "Correct Answer: A. Branch Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Loop Vent:</strong> A vent circuiting the plumbing system.</li><li><strong>Group Vent:</strong> A branch vent that performs its functions for two or more traps.</li><li><strong>Circuit Vent:</strong> A branch vent that serves two or more traps and extends from in front of the last fixture connection to the vent stack.</li></ul>"}, {"q": "30. A pipe, which conveys only wastewater or liquid waste, free of fecal matter.", "opts": ["Drain Pipe", "Waste Pipe", "Subsoil Drain", "Sewer Pipe"], "ans": 1, "info": "Correct Answer: B. Waste Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Drain Pipe:</strong> A pipe that conveys liquid waste or sewage.</li><li><strong>Subsoil Drain:</strong> An underground drainpipe that receives only subsurface or seepage water.</li><li><strong>Sewer Pipe:</strong> Pipe conveying sewage.</li></ul>"}, {"q": "31. Device or means to prevent the flow of liquid from returning to the source of supply.<br><br>Also called a vacuum breaker.", "opts": ["Backwater Valve", "Pressure Relief Valve", "Check Valve", "Backflow Preventer"], "ans": 3, "info": "Correct Answer: D. Backflow Preventer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backwater Valve:</strong> A device installed in a drainage system to prevent reverse flow.</li><li><strong>Pressure Relief Valve:</strong> A valve to relieve pressure.</li><li><strong>Check Valve:</strong> A valve that automatically closes to prevent the reverse flow of liquid or gas.</li></ul>"}, {"q": "32. ______ are in-ground tanks designed to capture dirt, sand, to keep these substances out of our wastewater system.", "opts": ["Sand Interceptor", "Grease Interceptor", "Catch Basin", "Grease Trap"], "ans": 0, "info": "Correct Answer: A. Sand Interceptor", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Grease Interceptor:</strong> An interceptor of at least 3 cubic meters capacity to serve one or more fixtures.</li><li><strong>Catch Basin:</strong> A receptacle designed to retain solids/debris from wastewater.</li><li><strong>Grease Trap:</strong> A device designed to retain grease from 1 to a maximum of 4 fixtures.</li></ul>"}, {"q": "33. A standpipe where water pressure is maintained at all times.", "opts": ["Wet Standpipe", "Automatic Standpipe System", "Manually-Operated Standpipe System", "Standpipe"], "ans": 0, "info": "Correct Answer: A. Wet Standpipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Automatic Standpipe System:</strong> A standpipe system attached to a water supply capable of supplying the system demand automatically.</li><li><strong>Manually-Operated Standpipe System:</strong> A standpipe requiring manual intervention to supply water.</li><li><strong>Standpipe:</strong> A vertical pipe generally used for the storage and distribution of water for fire extinguishing.</li></ul>"}, {"q": "34. The top edge of a receptacle from where water overflows.", "opts": ["Flood Level Rim", "Flood Area", "Critical Level", "Flood Level"], "ans": 0, "info": "Correct Answer: A. Flood Level Rim", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flood Area:</strong> Area susceptible to flooding.</li><li><strong>Critical Level:</strong> C-L or C/L marking on a backflow prevention device or vacuum breaker is a point conforming to approved standards.</li><li><strong>Flood Level:</strong> The level in a receptacle over which water would overflow to the outside.</li></ul>"}, {"q": "35. It is any pipe or fitting installed in a horizontal position or which forms an angle of not more than forty-five (45) degrees with the horizontal plane.", "opts": ["Horizontal Branch", "Vertical Pipe", "Lateral", "Horizontal Pipe"], "ans": 3, "info": "Correct Answer: D. Horizontal Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Horizontal Branch:</strong> A drain pipe extending laterally from a soil or waste stack or building drain.</li><li><strong>Vertical Pipe:</strong> Any pipe or fitting installed in a vertical position or forming an angle of not more than 45 degrees with the vertical plane.</li><li><strong>Lateral:</strong> In plumbing, a secondary pipeline. In sewerage, a common sewer to which no other common sewer is tributary.</li></ul>"}, {"q": "36. B&S means Brown and Sharpe (Specification) or ____ (Ends of Pipes).", "opts": ["Bell and Sink", "Board and Sink", "None of the choices", "Bell and Spigot"], "ans": 3, "info": "Correct Answer: D. Bell and Spigot", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Bell and Sink:</strong> <em>This is a distractor. The correct plumbing term is 'Bell and Spigot'.</em></li><li><strong>Board and Sink:</strong> <em>This is a distractor with no specific plumbing definition.</em></li><li><strong>None of the choices:</strong> <em>This option is a distractor.</em></li></ul>"}, {"q": "37. In a line of piping is a combination of elbows or bends, which brings one section of the pipe out of line but into a line parallel with the original section.", "opts": ["Centerline", "Offset", "Eccentric", "Parallel"], "ans": 1, "info": "Correct Answer: B. Offset", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Centerline:</strong> A line that represents the center of a pipe or structure.</li><li><strong>Eccentric:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Parallel:</strong> Extending in the same direction, equidistant at all points, and never converging or diverging.</li></ul>"}, {"q": "38. It is an agency accepted by the Administrative Authority in the business of listing or labelling and which maintains a periodic inspection program...", "opts": ["Listed Agency", "Listing Agency", "Listed", "Certified"], "ans": 1, "info": "Correct Answer: B. Listing Agency", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Listed Agency:</strong> Agency listed for standards and periodic inspection.</li><li><strong>Listed:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Certified:</strong> Officially recognized.</li></ul>"}, {"q": "39. Supports, hangers, anchors, brackets, cradles are devices for holding and securing pipes and fixtures to walls, ceiling, floors or structural members.", "opts": ["Supports", "Accessories", "Appurtenances", "Appliances"], "ans": 0, "info": "Correct Answer: A. Supports", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Accessories:</strong> Supplementary items.</li><li><strong>Appurtenances:</strong> A manufactured device or a prefabricated assembly of component parts.</li><li><strong>Appliances:</strong> A receptacle or equipment.</li></ul>"}, {"q": "40. An unobstructed top open edge of a fixture.", "opts": ["Flood Level Rim", "Critical Level Marking", "Overflow", "Rim"], "ans": 3, "info": "Correct Answer: D. Rim", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flood Level Rim:</strong> The top edge of a receptacle from which water overflows.</li><li><strong>Critical Level Marking:</strong> C-L or C/L marking on a backflow prevention device or vacuum breaker is a point conforming to approved standards and established by the testing laboratory which determines the minimum elevation above the flood level rim of the fixture or receptacle served at which the device may be installed.</li><li><strong>Overflow:</strong> An outlet for excess water.</li></ul>"}, {"q": "41. It is the pipeline from the building to the public or street storm drainage system.", "opts": ["House Storm Sewer", "Combination Sewer", "Storm Sewer", "Sewer"], "ans": 0, "info": "Correct Answer: A. House Storm Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Combination Sewer:</strong> A sewer receiving both surface runoff and sewage.</li><li><strong>Storm Sewer:</strong> A sewer used for conveying rain water, surface water, cooling water, and similar liquid wastes.</li><li><strong>Sewer:</strong> A pipe for sewage.</li></ul>"}, {"q": "42. A standpipe having no permanent water inside the pipe.", "opts": ["Dry Standpipe", "Standpipe", "Automatic Standpipe System", "Wet Standpipe"], "ans": 0, "info": "Correct Answer: A. Dry Standpipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Standpipe:</strong> A vertical pipe generally used for the storage and distribution of water for fire extinguishing.</li><li><strong>Automatic Standpipe System:</strong> A standpipe system attached to a water supply capable of supplying the system demand automatically.</li><li><strong>Wet Standpipe:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "43. A drain connecting the compartments of a set of fixtures to a trap or connecting other permitted fixtures to a common trap.", "opts": ["Combination Waste & Vent System", "Wet Vent", "Continuous Vent", "Continuous Waste"], "ans": 3, "info": "Correct Answer: D. Continuous Waste", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Combination Waste & Vent System:</strong> A specially designed system of waste piping embodying the horizontal wet venting of one or more sinks or floor drains by means of a common waste and vent pipe adequately sized to provide free movement of air above the flow line of the drain.</li><li><strong>Wet Vent:</strong> That portion of a vent pipe through which liquid waste flow.</li><li><strong>Continuous Vent:</strong> A vertical vent that is a continuation of the drain to which it connects.</li></ul>"}, {"q": "44. Any pipe, which conveys the discharge of water closet, urinal or fixtures having similar functions, with or without the discharges from other fixtures to the building drain or building sewer.", "opts": ["Waste Pipe", "Soil Pipe", "Drain Pipe", "Soil Stack Pipe"], "ans": 1, "info": "Correct Answer: B. Soil Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Waste Pipe:</strong> A pipe which conveys only liquid waste, free of fecal matter.</li><li><strong>Drain Pipe:</strong> A pipe that conveys liquid waste or sewage.</li><li><strong>Soil Stack Pipe:</strong> A vertical soil pipe.</li></ul>"}, {"q": "45. In Plumbing Code, referred to as \"Low Hazard\".", "opts": ["Pollution", "Insanitary", "Contamination", "Nuisance"], "ans": 0, "info": "Correct Answer: A. Pollution", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Insanitary:</strong> A condition contrary to sanitary principles or injurious to health.</li><li><strong>Contamination:</strong> High Hazard. Impairment of potable water quality creating an actual hazard to public health.</li><li><strong>Nuisance:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "46. In plumbing, a secondary pipeline. In sewerage, a common sewer to which no other branch sewer is connected.", "opts": ["Branch", "Lateral", "Branch Pipe", "Secondary"], "ans": 1, "info": "Correct Answer: B. Lateral", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Branch:</strong> Any part of the piping system other than a main, riser, or stack.</li><li><strong>Branch Pipe:</strong> A pipe connecting a branch to a main.</li><li><strong>Secondary:</strong> Subordinate or secondary pipeline.</li></ul>"}, {"q": "47. A vertical shaft for the installation of different pipe stacks.", "opts": ["Pipe Shaft", "Group Vent", "Waste Stack", "Chase"], "ans": 3, "info": "Correct Answer: D. Chase", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Pipe Shaft:</strong> An enclosed vertical space, like a chase, extending through one or more stories of a building for enclosing plumbing pipes.</li><li><strong>Group Vent:</strong> A branch vent that performs its functions for two or more traps.</li><li><strong>Waste Stack:</strong> A vertical waste pipe.</li></ul>"}, {"q": "48. Are approved-type installed receptacles, devices, or appliances supplied with water or receive liquid or liquid-borne wastes and discharge such wastes into the drainage system.", "opts": ["Plumbing System", "Plumbing Fixtures", "Plumbing Appliance", "Plumbing Appurtenance"], "ans": 1, "info": "Correct Answer: B. Plumbing Fixtures", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing System:</strong> Includes all water supply, drainage, and venting systems and their fixtures.</li><li><strong>Plumbing Appliance:</strong> Any one of a special class of device or equipment intended to perform a special plumbing function.</li><li><strong>Plumbing Appurtenance:</strong> A manufactured device to perform a special plumbing function.</li></ul>"}, {"q": "49. Combustible Construction is any structure which any part of its structural framework will ignite and burn at a temperature of _______", "opts": ["756 degrees centigrade or more.", "339 degrees centigrade or more.", "756 degrees centigrade or less.", "339 degrees centigrade or less."], "ans": 2, "info": "Correct Answer: C. 756 degrees centigrade or less.", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>756 degrees centigrade or more.:</strong> <em>A temperature limit used as a distractor.</em></li><li><strong>339 degrees centigrade or more.:</strong> <em>A temperature limit used as a distractor.</em></li><li><strong>339 degrees centigrade or less.:</strong> <em>A temperature limit used as a distractor.</em></li></ul>"}, {"q": "50. A cylindrical conduit or conductor conforming to the particular dimensions commonly known as \u201cpipe size\u201d and is denoted by its interior diameter or l.D.", "opts": ["Drain", "Tube", "Pipe", "Sewer"], "ans": 2, "info": "Correct Answer: C. Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Drain:</strong> Any pipe that carries wastewater or water-borne wastes in a building drainage system.</li><li><strong>Tube:</strong> A cylindrical conduit.</li><li><strong>Sewer:</strong> A pipe for sewage.</li></ul>"}, {"q": "51. Any part of the piping system other than a main, riser, or stack.", "opts": ["Lateral", "Drain", "Primary", "Branch"], "ans": 3, "info": "Correct Answer: D. Branch", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Lateral:</strong> In plumbing, a secondary pipeline. In sewerage, a common sewer to which no other common sewer is tributary.</li><li><strong>Drain:</strong> Any pipe that carries wastewater or water-borne wastes in a building drainage system.</li><li><strong>Primary:</strong> Main piping.</li></ul>"}, {"q": "52. A room or space having a volume of less than 1.4 cu.<br><br>m with 250 kilogram calorie of the aggregate input rating of all fuel-burning appliances installed in that space.", "opts": ["Unconfined Space", "Chase", "Confined Space", "Shaft"], "ans": 2, "info": "Correct Answer: C. Confined Space", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Unconfined Space:</strong> A space with adequate volume for fuel-burning appliances.</li><li><strong>Chase:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Shaft:</strong> A vertical opening through a building for elevators, dumbwaiters, light, ventilation or similar purposes.</li></ul>"}, {"q": "53. Part of the building drain that is the single sloping drain from the base of a stack to its junction with the main building drain.", "opts": ["Primary Branch", "Primary", "Branch Drain", "Lateral"], "ans": 0, "info": "Correct Answer: A. Primary Branch", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Primary:</strong> Main piping.</li><li><strong>Branch Drain:</strong> A drain connecting to a main.</li><li><strong>Lateral:</strong> In plumbing, a secondary pipeline. In sewerage, a common sewer to which no other common sewer is tributary.</li></ul>"}, {"q": "54. Any public space, public park, or thoroughfare less than three (3) meters but not less than two (2) meters in width dedicated or deeded for public use.", "opts": ["Alley", "Park", "Corridor", "Street"], "ans": 0, "info": "Correct Answer: A. Alley", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Park:</strong> A public green space.</li><li><strong>Corridor:</strong> A hallway.</li><li><strong>Street:</strong> A public road.</li></ul>"}, {"q": "55. Who establishes the Critical Level Marking on Backflow Prevention devices.", "opts": ["NAMPAP", "Testing Laboratory", "Administrative Authority", "Manufacturer"], "ans": 1, "info": "Correct Answer: B. Testing Laboratory", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>NAMPAP:</strong> National Master Plumbers Association of the Philippines.</li><li><strong>Administrative Authority:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Manufacturer:</strong> The maker of the device.</li></ul>"}, {"q": "56. Shall mean direct access without the necessity of removing any panel, door or similar obstruction.", "opts": ["Approved", "Common", "Readily Accessible", "Accessible"], "ans": 2, "info": "Correct Answer: C. Readily Accessible", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Approved:</strong> Accepted or acceptable under an applicable specification or standard stated or cited in this Code.</li><li><strong>Common:</strong> Shared element.</li><li><strong>Accessible:</strong> Having access thereto but which first may require the removal of an access panel, door, or similar obstruction.</li></ul>"}, {"q": "57. An open, unoccupied space, bounded on two (2) or more sides by the walls of the building.<br><br>An inner court is a court entirely within the exterior walls of a building.", "opts": ["Atrium", "Alley", "Court", "Yard"], "ans": 2, "info": "Correct Answer: C. Court", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Atrium:</strong> An open-roofed courtyard.</li><li><strong>Alley:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Yard:</strong> An open, unoccupied space, other than a court, unobstructed from the ground to the sky.</li></ul>"}, {"q": "58. A tank located above or integral with a water closet, urinal, or similar fixtures for flushing or removing excrement in the fixture.", "opts": ["Flush Valve", "Flushometer Tank", "Flushometer Valve", "Flush Tank"], "ans": 3, "info": "Correct Answer: D. Flush Tank", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flush Valve:</strong> A valve located at the bottom of a flush tank.</li><li><strong>Flushometer Tank:</strong> A tank integrated within an air accumulator vessel.</li><li><strong>Flushometer Valve:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "59. The flow of water or other liquids, mixtures, or substances into the distributing pipes of a potable supply of water from any source other than from its intended source.", "opts": ["Vacuum", "Backpressure Backflow", "Back-Siphonage", "Backflow"], "ans": 3, "info": "Correct Answer: D. Backflow", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Vacuum:</strong> Any pressure less than that exerted by the atmosphere.</li><li><strong>Backpressure Backflow:</strong> Backflow due to an increased pressure above the supply pressure, which may be due to pumps, boilers, gravity or other sources of pressure.</li><li><strong>Back-Siphonage:</strong> The flowing back of used, contaminated, or polluted water from a plumbing fixture into a water supply pipe due to a negative pressure in such pipe.</li></ul>"}, {"q": "60. Minimum Branch Interval", "opts": ["2.41", "2.42", "2.43", "2.40"], "ans": 2, "info": "Correct Answer: C. 2.43", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>2.41:</strong> <em>A numerical distractor.</em></li><li><strong>2.42:</strong> <em>A numerical distractor.</em></li><li><strong>2.40:</strong> <em>A numerical distractor.</em></li></ul>"}, {"q": "61. A tool for straightening or bending lead pipe.", "opts": ["Spring Bender", "Propane", "Tube Bender", "Bending Pin (or Iron)"], "ans": 3, "info": "Correct Answer: D. Bending Pin (or Iron)", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Spring Bender:</strong> A tool used to bend soft copper or aluminum tubing without kinking.</li><li><strong>Propane:</strong> A flammable hydrocarbon gas commonly used as fuel.</li><li><strong>Tube Bender:</strong> A tool used for bending rigid tubing.</li></ul>"}, {"q": "62. It is an arbitrary quantity in terms of which the load-producing effects or water requirements on the plumbing system of different kinds of plumbing fixtures are expressed in some arbitrarily chosen scale.", "opts": ["Fixture Unit", "Plumbing Unit", "PSI", "Demand Load"], "ans": 0, "info": "Correct Answer: A. Fixture Unit", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Unit:</strong> A minimum standard quantity of plumbing fixtures that discharges wastes into a plumbing installation.</li><li><strong>PSI:</strong> Pounds per square inch, a unit of pressure.</li><li><strong>Demand Load:</strong> The maximum expected requirement for water (or power) of a plumbing system or a portion thereof.</li></ul>"}, {"q": "63. A sewer intended to receive sanitary sewage with or without pre-treated industrial wastes and without the admixture of rain or ground water.", "opts": ["Domestic Sewer", "Public Sewer", "Sewer", "Sanitary Sewer"], "ans": 3, "info": "Correct Answer: D. Sanitary Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Domestic Sewer:</strong> A sewer that receives the discharge from domestic/sanitary plumbing fixtures.</li><li><strong>Public Sewer:</strong> A common sewer directly controlled by public authority.</li><li><strong>Sewer:</strong> A pipe for sewage.</li></ul>"}, {"q": "64. Any one of a special class of device or equipment intended to perform a special plumbing function.<br><br>Its operation and/or control may be dependent upon one or more energized components...", "opts": ["Plumbing Appliance", "Plumbing System", "Plumbing Appurtenance", "Plumbing Fixtures"], "ans": 0, "info": "Correct Answer: A. Plumbing Appliance", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing System:</strong> Includes all water supply, drainage, and venting systems and their fixtures.</li><li><strong>Plumbing Appurtenance:</strong> A manufactured device to perform a special plumbing function.</li><li><strong>Plumbing Fixtures:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "65. An unobstructed vertical distance through the free atmosphere between the lowest opening from any pipe or faucet conveying potable water to the flood-level rim of any tank, vat, or fixture.", "opts": ["Air Gap, Water Distribution", "Air Break", "Air Gap", "Air Gap, Drainage"], "ans": 0, "info": "Correct Answer: A. Air Gap, Water Distribution", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Air Break:</strong> A physical separation which may be a low inlet into the indirect waste receptor from the fixture.</li><li><strong>Air Gap:</strong> The unobstructed vertical distance through the free atmosphere.</li><li><strong>Air Gap, Drainage:</strong> Air gap in a drainage system.</li></ul>"}, {"q": "66. Wastes which require some special methods of handling such as the use of indirect waste piping and receptors;<br><br>corrosion-resistant piping, sand, oil or grease interceptors...", "opts": ["Special Wastes", "Industrial Waste", "Domestic Waste", "Chemical Waste"], "ans": 0, "info": "Correct Answer: A. Special Wastes", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Industrial Waste:</strong> Liquid or water-borne waste from industrial or commercial processes, except domestic sewage.</li><li><strong>Domestic Waste:</strong> Wastes from ordinary living processes.</li><li><strong>Chemical Waste:</strong> Waste containing chemical substances which may cause harm to the plumbing system.</li></ul>"}, {"q": "67. This word, when used alone, shall mean these regulations, subsequent amendments thereto or any emergency rule or regulation which the Administrative Authority having jurisdiction may lawfully adopt.", "opts": ["Law", "Rule", "Board", "Code"], "ans": 3, "info": "Correct Answer: D. Code", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Law:</strong> A binding custom or practice of a community: a rule of conduct or action prescribed or formally recognized as binding or enforced by a controlling authority.</li><li><strong>Rule:</strong> A prescribed guide for conduct or action.</li><li><strong>Board:</strong> Board of Master Plumbing.</li></ul>"}, {"q": "68. Not included in a Plumbing Unit", "opts": ["(1) water closet", "(4) faucets/hose bibb", "(3) floor drains", "(1) septic tank"], "ans": 3, "info": "Correct Answer: D. (1) septic tank", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>(1) water closet:</strong> <em>A specific fixture quantity used as a distractor for defining a Plumbing Unit.</em></li><li><strong>(4) faucets/hose bibb:</strong> <em>A specific fixture quantity used as a distractor for defining a Plumbing Unit.</em></li><li><strong>(3) floor drains:</strong> <em>A specific fixture quantity used as a distractor for defining a Plumbing Unit.</em></li></ul>"}, {"q": "69. The part of a vent line, which connects directly with an individual trap underneath or behind the fixture and extends to the branch or main vent pipe at any point higher than the fixture or fixture traps it serves.", "opts": ["Backvent Pipe", "Tailpiece", "Dry Vent", "Main Vent"], "ans": 0, "info": "Correct Answer: A. Backvent Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Tailpiece:</strong> The pipe or tubing that connects the outlet of a plumbing fixture to the trap.</li><li><strong>Dry Vent:</strong> A vent that does not carry liquid or water-borne wastes.</li><li><strong>Main Vent:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "70. Colored black. The cross-sectional shape is normally OVAL and is denoted by its O.D.", "opts": ["Polyethylene (PE)", "Polybutylene (PB)", "cross linked polyethylene (PEX)", "Polyvinyl Chloride (PVC)"], "ans": 1, "info": "Correct Answer: B. Polybutylene (PB)", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Polyethylene (PE):</strong> A type of plastic pipe.</li><li><strong>cross linked polyethylene (PEX):</strong> A type of plastic pipe used for water supply systems.</li><li><strong>Polyvinyl Chloride (PVC):</strong> A widely used plastic pipe.</li></ul>"}, {"q": "71. This term means the flexible tubing connection between a service pipe and a water main.", "opts": ["Gooseneck", "Curb Stop", "Corporation Cock", "Fixture Supply"], "ans": 0, "info": "Correct Answer: A. Gooseneck", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Curb Stop:</strong> A control valve for the water supply of a building.</li><li><strong>Corporation Cock:</strong> A stop valve placed at the connection of the water service pipe to the water main.</li><li><strong>Fixture Supply:</strong> The water supply pipe connecting a fixture to a branch water supply pipe.</li></ul>"}, {"q": "72. _______ shall mean all buildings or structures that are not defined as private or private use.", "opts": ["Public", "Public Space", "Confined Space", "Private"], "ans": 0, "info": "Correct Answer: A. Public", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Public Space:</strong> A space open to the public.</li><li><strong>Confined Space:</strong> A room or space having a volume less than 1.4 cu. m with 250 kilogram calorie of the aggregate input rating of all fuel-burning appliances installed in that space.</li><li><strong>Private:</strong> Restricted space.</li></ul>"}, {"q": "73. A person who specializes in the welding of pipes and holds a valid certificate of competency from a recognized testing agency...", "opts": ["Steamfitter", "Pipeline Welder", "Pipefitter", "Journeyman"], "ans": 1, "info": "Correct Answer: B. Pipeline Welder", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Steamfitter:</strong> A person who installs piping for heating and cooling systems.</li><li><strong>Pipefitter:</strong> A person who installs and repairs piping systems.</li><li><strong>Journeyman:</strong> A qualified tradesperson who has completed an apprenticeship.</li></ul>"}, {"q": "74. The Administrative Authority and includes any other law enforcement agency concerned by any provision of this Code, whether such agency is specifically named or not.", "opts": ["Department Having Jurisdiction", "NAMPAP", "Commission", "Board"], "ans": 0, "info": "Correct Answer: A. Department Having Jurisdiction", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>NAMPAP:</strong> National Master Plumbers Association of the Philippines.</li><li><strong>Commission:</strong> Professional Regulation Commission (PRC).</li><li><strong>Board:</strong> Board of Master Plumbing.</li></ul>"}, {"q": "75. A person technically and legally qualified and licensed to practice the profession of Master Plumbing without limitations in accordance with Republic Act 1378...", "opts": ["Apprentice", "Plumber", "Journeyman", "Master Plumber"], "ans": 3, "info": "Correct Answer: D. Master Plumber", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Apprentice:</strong> A person learning the trade.</li><li><strong>Plumber:</strong> A person who installs and repairs plumbing systems.</li><li><strong>Journeyman:</strong> A qualified tradesperson who has completed an apprenticeship.</li></ul>"}, {"q": "76. Grease interceptor min. capacity", "opts": ["5 cu. m", "3 cu. m", "1 cu. m", "4 cu. m"], "ans": 1, "info": "Correct Answer: B. 3 cu. m", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>5 cu. m:</strong> <em>A volume measurement used as a distractor.</em></li><li><strong>1 cu. m:</strong> <em>A volume measurement used as a distractor.</em></li><li><strong>4 cu. m:</strong> <em>A volume measurement used as a distractor.</em></li></ul>"}, {"q": "77. An open, unoccupied space, other than a court, unobstructed from the ground to the sky, except where specifically provided in this Code.", "opts": ["Setback", "Atrium", "Court", "Yard"], "ans": 3, "info": "Correct Answer: D. Yard", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Setback:</strong> Distance from property line.</li><li><strong>Atrium:</strong> An open-roofed courtyard.</li><li><strong>Court:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "78. The liquid and water-borne wastes derived from ordinary living processes, free from industrial wastes and of such character that permit satisfactory disposal without special treatment.<br><br>It is discharged into the public sewer or into a private sewage disposal system.", "opts": ["Domestic Sewage", "Liquid Waste", "Sanitary Sewage", "Sewage"], "ans": 0, "info": "Correct Answer: A. Domestic Sewage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Liquid Waste:</strong> Discharge from any fixture, appliance, or appurtenance that does not contain fecal matter.</li><li><strong>Sanitary Sewage:</strong> Definition derived from the National Plumbing Code of the Philippines.</li><li><strong>Sewage:</strong> Any liquid waste containing animal or vegetable matter in suspension or solution.</li></ul>"}, {"q": "79. The reconstruction or renewal of any part of an existing building for its maintenance.", "opts": ["Alteration", "Renovation", "Repair", "Maintenance"], "ans": 2, "info": "Correct Answer: C. Repair", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Alteration:</strong> A change or modification.</li><li><strong>Renovation:</strong> Restoring to a good state of repair.</li><li><strong>Maintenance:</strong> Upkeep of the system.</li></ul>"}, {"q": "80. A room space having a volume equal to at least 1.4 c.u. m.<br><br>of the aggregate input rating of the fuel-burning appliance installed in that space.<br><br>Rooms adjacent and open to the space where the appliance is installed, through openings not furnished with doors, are considered a part of the unconfined space.", "opts": ["Confined Space", "Interior room", "Unconfined Space", "Sump"], "ans": 2, "info": "Correct Answer: C. Unconfined Space", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Confined Space:</strong> A room or space having a volume less than 1.4 cu. m with 250 kilogram calorie of the aggregate input rating of all fuel-burning appliances installed in that space.</li><li><strong>Interior room:</strong> A room inside a building without exterior ventilation.</li><li><strong>Sump:</strong> An approved tank or pit which receives sewage or liquid waste.</li></ul>"}, {"q": "81. The pipe or tubing that connects the outlet of a plumbing fixture to the trap.", "opts": ["Tapped Tap", "Fixture Drain", "Trap Arm", "Tailpiece"], "ans": 3, "info": "Correct Answer: D. Tailpiece", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Tapped Tap:</strong> <em>This is a fabricated distractor term; a real fitting might be a 'Tapped Tee'.</em></li><li><strong>Fixture Drain:</strong> The drain from the trap of a fixture to the junction of that drain with any other drain pipe.</li><li><strong>Trap Arm:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "82. _____ are cast iron soil pipes with plain ends connected together with bolted stainless steel bands and neoprene gaskets.", "opts": ["Flanged Pipes", "Hubless Pipes", "Threaded Pipes", "Welded Pipes"], "ans": 1, "info": "Correct Answer: B. Hubless Pipes", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flanged Pipes:</strong> Pipes joined by bolted flanges.</li><li><strong>Threaded Pipes:</strong> Pipes joined by threaded connections.</li><li><strong>Welded Pipes:</strong> Pipes joined by welding.</li></ul>"}, {"q": "83. A receptacle in which liquids are retained for a sufficient period of time to allow settleable material to deposit.", "opts": ["Catch Basin", "Scupper Drain", "Sump Pit", "Septic Tank"], "ans": 0, "info": "Correct Answer: A. Catch Basin", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Scupper Drain:</strong> A drain on a roof or deck.</li><li><strong>Sump Pit:</strong> A pit for a sump pump.</li><li><strong>Septic Tank:</strong> A watertight receptacle that receives sewage, allows solids to settle, and discharges effluent.</li></ul>"}, {"q": "84. Includes all valves and controls used in plumbing systems which are accessible.", "opts": ["Regulating Equipment", "Plumbing Appliance", "Readily Accessible", "Pressure Reducing Equipments"], "ans": 0, "info": "Correct Answer: A. Regulating Equipment", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Appliance:</strong> Any one of a special class of device or equipment intended to perform a special plumbing function.</li><li><strong>Readily Accessible:</strong> Having direct access without the necessity of removing any panel, door or similar obstruction.</li><li><strong>Pressure Reducing Equipments:</strong> Valves or devices used to lower the pressure of water or gas in a system.</li></ul>"}, {"q": "85. An underground drainpipe that receives only subsurface or seepage water and convey it to a sump for disposal by gravity flow or by lift pump.", "opts": ["Building Drain", "Building Sewer", "Subsoil Drain", "Building Subdrain"], "ans": 2, "info": "Correct Answer: C. Subsoil Drain", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building Drain:</strong> The lowest piping of a drainage system which receives the discharge from soil, waste, and other drainage pipes.</li><li><strong>Building Sewer:</strong> That part of the horizontal piping of a drainage system which extends from the end of the building drain.</li><li><strong>Building Subdrain:</strong> That portion of a drainage system which cannot drain by gravity into the building sewer.</li></ul>"}, {"q": "86. A building sewer, which receives the discharge from more than one building drain and conveys it to a public sewer, private sewage disposal system, or other points of disposal.", "opts": ["Mobile Home Park Sewer", "Private Sewer", "Public Sewer", "House Sewer"], "ans": 1, "info": "Correct Answer: B. Private Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Mobile Home Park Sewer:</strong> Sewer system for a mobile home park.</li><li><strong>Public Sewer:</strong> A common sewer directly controlled by public authority.</li><li><strong>House Sewer:</strong> Building sewer conveying sewage to the public sewer.</li></ul>"}, {"q": "87. A room equipped with a shower stall or bathtub.", "opts": ["Bathroom", "Restroom", "Powder Room", "Comfort Room"], "ans": 0, "info": "Correct Answer: A. Bathroom", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Restroom:</strong> A public bathroom.</li><li><strong>Powder Room:</strong> A small bathroom with just a toilet and sink.</li><li><strong>Comfort Room:</strong> Philippine term for restroom/bathroom.</li></ul>"}, {"q": "88. A controlled outlet of a pipeline to discharge liquid or detritus.", "opts": ["Outlet", "Drain", "Vent", "Blow-off"], "ans": 3, "info": "Correct Answer: D. Blow-off", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Outlet:</strong> Exit point of a system.</li><li><strong>Drain:</strong> Any pipe that carries wastewater or water-borne wastes in a building drainage system.</li><li><strong>Vent:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "89. _________ or street main is the water-supply pipe for public or community use.", "opts": ["Main Line", "Water-distributing Pipe", "Service Pipe", "Water Main"], "ans": 3, "info": "Correct Answer: D. Water Main", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Main Line:</strong> The principal pipe artery to which branches may be connected.</li><li><strong>Water-distributing Pipe:</strong> In a building or premises, a pipe which conveys potable water from the building supply pipe to the plumbing fixtures and other water outlets.</li><li><strong>Service Pipe:</strong> The pipe from the water main or other source of potable water supply to the building.</li></ul>"}, {"q": "90. _____  is measured along its centerline.", "opts": ["Developed Length", "Thickness of Pipe", "Diameter of Pipe", "Length of Pipe"], "ans": 3, "info": "Correct Answer: D. Length of Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Developed Length:</strong> The length of a pipeline measured along the center line of the pipe and fittings.</li><li><strong>Thickness of Pipe:</strong> Wall thickness.</li><li><strong>Diameter of Pipe:</strong> Definition derived from the National Plumbing Code of the Philippines.</li></ul>"}];
