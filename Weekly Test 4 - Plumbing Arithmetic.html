    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #2c3e50; --primary: #3498db; --primary-hover: #2980b9;

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #app { background: var(--card-bg); width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 25px; color: #7f8c8d; }
        .score { color: var(--primary); }
        .question { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; text-align: left; background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s ease; outline: none; }
        .btn:hover:not(:disabled) { background: #e2e6ea; border-color: #dae0e5; transform: translateY(-1px); }
        .btn:disabled { cursor: default; opacity: 0.9; }
        .btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #1e8449; font-weight: 700; }
        .btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #922b21; text-decoration: line-through; opacity: 0.7; }
        .info-box { margin-top: 25px; padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.5; display: none; animation: fadeIn 0.4s ease; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .nav-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-align: center; transition: background 0.2s; display: none; }
        .nav-btn.prev { background: var(--secondary); color: white; }
        .nav-btn.next { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .home-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .result-screen { text-align: center; padding: 20px 0; }
    </style>

, "6", "4"], "ans": 1, "type": 0, "sol": "1. Let $x$ be gallons of 5% solution.<br><br>2. Set up the mixture equation:<br>$0.05x + 5(0.40) = (x + 5)0.30$<br><br>3. Expand and simplify:<br>$0.05x + 2 = 0.30x + 1.50$<br><br>4. Solve for $x$:<br>$2 - 1.50 = 0.30x - 0.05x$<br>$0.50 = 0.25x$<br>$x = \\frac{0.50}{0.25} = 2$ gallons.", "other_defs": ""}, {"q": "3. Simplify: $(1-\\cos^{2}\theta)/\\sin\theta$", "opts": ["$\tan\theta$", "$\\cos\theta$", "$\\sin\theta$", "$1/\\sin\theta$"], "ans": 2, "type": 0, "sol": "1. Use Pythagorean identity:<br>$\\sin^2\\theta + \\cos^2\\theta = 1$<br>Therefore, $1 - \\cos^2\\theta = \\sin^2\\theta$<br><br>2. Substitute back into the expression:<br>$\\frac{\\sin^2\\theta}{\\sin\\theta}$<br><br>3. Cancel common term:<br>$\\sin\\theta$", "other_defs": ""}, {"q": "4. Get the total surface area of a cylinder with radius 8 cm and height of 15 cm.", "opts": ["754", "402.1", "1156", "973"], "ans": 2, "type": 0, "sol": "1. Total Surface Area Formula:<br>$A = 2\\pi r(r + h)$<br><br>2. Substitute $r=8$ and $h=15$:<br>$A = 2\\pi(8)(8 + 15)$<br>$A = 16\\pi(23)$<br><br>3. Calculate:<br>$A = 368\\pi \\approx 1156.1$ cm$^2$.", "other_defs": ""}, {"q": "5. An employee receives an hourly wage of $13.25 plus overtime pay of 1.5 times. If an employee works 48 hours, what is the compensation before taxes?", "opts": ["$689", "$848", "$530", "$159"], "ans": 0, "type": 0, "sol": "1. Regular pay (40 hrs):<br>$40 \\times 13.25 = 530$<br><br>2. Overtime hours:<br>$48 - 40 = 8$ hrs<br><br>3. Overtime rate:<br>$13.25 \\times 1.5 = 19.875$<br><br>4. Overtime pay:<br>$8 \\times 19.875 = 159$<br><br>5. Total Compensation:<br>$530 + 159 = 689$.", "other_defs": ""}, {"q": "6. Find the distance between the points (3,5) and (4, 2).", "opts": ["3.22", "4.55", "4.12", "3.16"], "ans": 3, "type": 0, "img": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAhgAAAF4CAYAAAAWmIDXAAAAOXRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjYuMCwgaHR0cHM6Ly9tYXRwbG90bGliLm9yZy89olMNAAAACXBIWXMAA 2h \\implies h \\approx 2.167$ m<br><br>2. Find distance from center to base corner ($r$):<br>$r = \\sqrt{(\\frac{s}{2})^2 + (\\frac{s}{2})^2} = \\sqrt{3^2 + 3^2} = \\sqrt{18} \\approx 4.243$ m<br><br>3. Calculate Lateral Edge ($L$) using Pythagorean theorem:<br>$L = \\sqrt{h^2 + r^2} = \\sqrt{2.167^2 + (\\sqrt{18})^2}$<br>$L = \\sqrt{4.696 + 18} = \\sqrt{22.696} \\approx 4.76$ m.", "other_defs": ""}, {"q": "9. Convert MMDCCCVIII to Hindu-Arabic numeral.", "opts": ["2558", "2813", "2553", "2808"], "ans": 3, "type": 0, "sol": "1. Parse the Roman Numerals:<br>$MM = 2000$<br>$D = 500$<br>$CCC = 300$<br>$VIII = 8$<br><br>2. Sum the values:<br>$2000 + 500 + 300 + 8 = 2808$.", "other_defs": ""}, {"q": "10. The x-intercept of the line $8x-4y=12$ is:", "opts": ["(2,-1)", "$(3/2, 1/2)$", "(0, -3)", "(1.5, 0)"], "ans": 3, "type": 0, "img": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAgAAAAF4CAYAAAAi4UHLAAAAOXRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjYuMCwgaHR0cHM6Ly9tYXRwbG90bGliLm9yZy89olMNAAAACXBIWXMAAA9hAAAPYQGoP6dpAAB1a0lEQVR4nO3dd1wT9/8H8NclbBkKDhyAghYUceGqE/fW1ipqbR2oqHVr1drWqlXrrNW6J9rWtmq17q04W0dxIThBFEQcoIDIzH1+f/BNfgTuWCZckns/H48+qJ9ccu/PK5fcJ3f3STjGGAMhhBBCZEUhdQGEEEIIKXk0ACCEEEJkiAYAhBBCiAzRAIAQQgiRIRoAEEIIITJEAwBCCCFEhmgAQAghhMgQDQAIIYQQGaIBACGEECJDNAAgBm/27NngOE70v4kTJ2LBggWwtbXFb7/9prf1P3z4EADw22+/wdbWFgsWLND5ut6Xn58fvLy89L6eVatWgeM4TJ48WfD2hIQEODs7w9nZGfHx8YV+XI7j8Nlnn+mqTEJIPsykLoCQwvryyy/h5OSUp71Ro0b4+++/kZKSgri4OL3XERcXh5SUFDx9+lTv6xKzfPly2NvbIyAgQJL1jxkzBjt37sSKFSvQv39/NG7cWOv2yZMn4/nz5/jrr78EnzN92bt3L27cuIHvvvsOCoVpf76RU1+JnjBCDNysWbMYAPbgwQPRZXieZ9HR0SW2/ujoaMbzvF7WVxhubm6sefPmedpbt27NPD09S6SG+/fvM2tra+bj48MyMjI07cePH2cAWN++fYv8mADYwIEDi13T4MGDGQCWmZlZ7McwFnLqK9EPGjYSk8BxHKpUqVJi66tSpQo4jiux9RmiGjVqYO7cuQgNDcXChQsBACkpKQgMDISTkxNWrVolcYWEkPzQAICYhK1bt4LjOJw8eRIAEBUVBY7jsHz5cpw6dQotW7aEjY0NypUrhyFDhiAhISHPY5w/fx5du3aFk5MT7O3t0b59e5w7dy7PcmfOnAHHcdi0aZOmTX0twvXr19GlSxfY2dmhdOnS6N27Nx4/fpznMS5duoRu3bpp1tWxY0f8+++/+Pbbb8FxHKKiogT7OWTIEHAch8ePH+PixYua6yD 2 - 4(1)(-44)}}{2} = \\frac{3 \\pm \\sqrt{185}}{2} \\approx 8.3$ hours.", "other_defs": ""}, {"q": "12. Today is Friday. After 472 days, it will be:", "opts": ["Tuesday", "Sunday", "Wednesday", "Monday"], "ans": 3, "type": 0, "sol": "1. Find full weeks by dividing by 7:<br>$472 \\div 7 = 67$ weeks with a remainder of 3.<br><br>2. 67 weeks pass (bringing us back to Friday).<br><br>3. Count the remainder (3 days) from Friday:<br>Saturday $\\rightarrow$ Sunday $\\rightarrow$ Monday.", "other_defs": ""}, {"q": "13. If $3<x<10$ and $1<y<6$, what best describes $x+y$?", "opts": ["$4<x+y<16$", "$8<x+y<20$", "$6<x+y<14$", "$3<x+y<15$"], "ans": 0, "type": 0, "sol": "1. Calculate the minimum sum:<br>$3 + 1 = 4$<br><br>2. Calculate the maximum sum:<br>$10 + 6 = 16$<br><br>3. Combine bounds:<br>$4 < x+y < 16$.", "other_defs": ""}, {"q": "14. How many ways can 7 members be selected from a group of 12 people?", "opts": ["792", "968", "252", "851"], "ans": 0, "type": 0, "sol": "1. Use Combination formula:<br>$C(n,r) = \\frac{n!}{r!(n-r)!}$<br><br>2. Substitute $n=12, r=7$:<br>$C(12,7) = \\frac{12!}{7!5!}$<br><br>3. Calculate:<br>$C(12,7) = \\frac{12 \\times 11 \\times 10 \\times 9 \\times 8}{5 \\times 4 \\times 3 \\times 2 \\times 1} = 792$.", "other_defs": ""}, {"q": "15. In complex Algebra, we use a diagram to represent a complex plane called:", "opts": ["Argand Diagram", "Voronoi diagram", "Hasse diagrams", "Venn Diagram"], "ans": 0, "type": 1, "sol": "An Argand diagram is a geometric plot of complex numbers as points $z = x + iy$ using the x-axis for the real part and y-axis for the imaginary part.", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Hasse diagrams:</strong> A visual representation of a finite partially ordered set using a graph.</li></ul>"}, {"q": "16. If $x=y$ and $y=z$, then $x=z$ is what property?", "opts": ["Symmetric Property", "Transitive Property", "Inverse Property", "Reflective Property"], "ans": 1, "type": 1, "sol": "The Transitive Property states that if two quantities are equal to the same quantity, then they are equal to each other.", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Inverse Property:</strong> Property where an element combined with its inverse results in the identity element.</li><li><strong>Reflective Property:</strong> Property of equality stating that a value is equal to itself.</li></ul>"}, {"q": "17. Pipe A can fill a tank in 14 hours, while Pipe B can fill it in 19 hours. If both open, total time?", "opts": ["7.41 hours", "8.06 hours", "6.09 hours", "7.94 hours"], "ans": 1, "type": 0, "sol": "1. Work Formula:<br>$\\frac{1}{T} = \\frac{1}{T_a} + \\frac{1}{T_b}$<br><br>2. Substitute values:<br>$\\frac{1}{T} = \\frac{1}{14} + \\frac{1}{19}$<br>$\\frac{1}{T} = \\frac{19 + 14}{14 \\times 19} = \\frac{33}{266}$<br><br>3. Solve for $T$:<br>$T = \\frac{266}{33} \\approx 8.06$ hours.", "other_defs": ""}, {"q": "18. A silver coin is 28 years older than a bronze coin. In 6 years, it will be twice as old. Ages?", "opts": ["60; 32", "50; 22", "50; 27", "70; 42"], "ans": 1, "type": 0, "sol": "1. Let $b$ = bronze age. Silver $s = b + 28$.<br><br>2. In 6 years:<br>$(s + 6) = 2(b + 6)$<br><br>3. Substitute $s$:<br>$(b + 28) + 6 = 2b + 12$<br>$b + 34 = 2b + 12$<br>$b = 22$<br><br>4. Find Silver age:<br>$s = 22 + 28 = 50$.", "other_defs": ""}, {"q": "19. Find the slope in the equation $6x+3y=21$.", "opts": ["6", "-2", "2", "3"], "ans": 1, "type": 0, "img": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAf4AAAF4CAYAAAC1hpvgAAAAOXRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjYuMCwgaHR0cHM6Ly9tYXRwbG90bGliLm9yZy89olMNAAAACXBIWXMAAA9hAAAPYQGoP6dpAABx70lEQVR4nO3deVxU1f8/8NedYYZhRzZBBETAQRYXFsu0sqy0cikrtWyz0spP+559+p asoning and arguments.", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Hypothesis:</strong> A supposition or proposed explanation made on the basis of limited evidence.</li><li><strong>Postulate:</strong> A thing suggested or assumed as true as the basis for reasoning or belief.</li></ul>"}, {"q": "23. NBA basketball volume is 449 cu. in. Determine approximate radius.", "opts": ["4.21\"", "5.66\"", "4.75\"", "5.98\""], "ans": 2, "type": 0, "sol": "1. Sphere Volume Formula:<br>$V = \\frac{4}{3}\\pi r^3$<br><br>2. Substitute $V=449$:<br>$449 = \\frac{4}{3}\\pi r^3$<br><br>3. Solve for $r^3$:<br>$r^3 = \\frac{449 \\times 3}{4\\pi} \\approx 107.19$<br><br>4. Take cube root:<br>$r = \\sqrt[3]{107.19} \\approx 4.75$ inches.", "other_defs": ""}, {"q": "24. What is the area of a rhombus with diagonal measurements of 20cm and 25 cm?", "opts": ["500 sq.cm", "225 sq.cm", "375 sq.cm", "250 sq.cm"], "ans": 3, "type": 0, "sol": "1. Area of Rhombus Formula:<br>$A = \\frac{d_1 \\times d_2}{2}$<br><br>2. Substitute diagonals:<br>$A = \\frac{20 \\times 25}{2} = \\frac{500}{2}$<br><br>3. Calculate:<br>$A = 250$ sq.cm.", "other_defs": ""}, {"q": "25. Find the area of a regular hexagon whose side length is 46 cm and whose apothem is 39.85 cm.", "opts": ["1022.2 sqcm", "916.5 sqcm", "6,334.1 sqcm", "5,499.2 sqcm"], "ans": 3, "type": 0, "sol": "1. Calculate Perimeter ($P$):<br>$P = 6 \\times 46 = 276$ cm<br><br>2. Regular Polygon Area Formula:<br>$A = \\frac{1}{2} P a$<br><br>3. Substitute values:<br>$A = \\frac{1}{2}(276)(39.85)$<br>$A \\approx 5499.3$ sq.cm.", "other_defs": ""}, {"q": "26. $y$ varies directly with $w$ and $x^2$, inversely with $z$. $y=5$ when $w=3, x=5, z=12$. Find $y$ when $w=5, x=6, z=40$.", "opts": ["5.2", "4.5", "3.8", "3.6"], "ans": 3, "type": 0, "sol": "1. Variation Equation:<br>$y = \\frac{kwx^2}{z}$<br><br>2. Find constant $k$:<br>$5 = \\frac{k(3)(5^2)}{12} \\implies 60 = 75k \\implies k = 0.8$<br><br>3. Calculate new $y$:<br>$y = \\frac{0.8(5)(6^2)}{40} = \\frac{4 \\times 36}{40} = \\frac{144}{40} = 3.6$.", "other_defs": ""}, {"q": "27. A square pyramid has a base edge of 4 ft, and a height of 18 ft. Volume?", "opts": ["91 ft\u00b3", "84 ft\u00b3", "102 ft\u00b3", "96 ft\u00b3"], "ans": 3, "type": 0, "sol": "1. Pyramid Volume Formula:<br>$V = \\frac{1}{3} s^2 h$<br><br>2. Substitute $s=4, h=18$:<br>$V = \\frac{1}{3} (4^2)(18)$<br>$V = \\frac{1}{3} (16)(18) = 16 \\times 6 = 96$ ft$^3$.", "other_defs": ""}, {"q": "28. The pressure of a gas increases as its volume decreases, assuming constant mass and temperature.", "opts": ["Charles' Law", "Boyle's Law", "Ideal Gas Law", "Gay-Lussac's Law"], "ans": 1, "type": 1, "sol": "Boyle's Law establishes the inverse relationship between the pressure and volume of a gas at a constant temperature ($P_1V_1 = P_2V_2$).", "other_defs": ""}, {"q": "29. Basement elevation 884.6 ft. Connection elevation 876.5 ft. Min slope 3/8 in/ft. Distance?", "opts": ["259.2 ft", "246.5 ft", "27.4 ft", "331.7 ft"], "ans": 0, "type": 0, "sol": "1. Calculate Fall (elevation difference):<br>$884.6 - 876.5 = 8.1$ ft<br><br>2. Convert Fall to inches:<br>$8.1 \\times 12 = 97.2$ inches<br><br>3. Distance Formula:<br>$\\text{Distance} = \\frac{\\text{Fall}}{\\text{Slope}}$<br><br>4. Calculate:<br>$\\text{Distance} = \\frac{97.2}{0.375} = 259.2$ ft.", "other_defs": ""}, {"q": "30. How many minutes after 3pm will the hands be at right angles for the first time?", "opts": ["32.72 min", "16.36 min", "31.52 min", "14.85 min"], "ans": 0, "type": 0, "sol": "1. Setup standard clock equation:<br>Minute hand speed = $6^\\circ$/min.<br>Hour hand speed = $0.5^\\circ$/min.<br>Lead rate = $5.5^\\circ$/min.<br><br>2. At 3:00, the angle is already $90^\\circ$. To be $90^\\circ$ again, the minute hand must overtake the hour hand by $180^\\circ$.<br><br>3. Calculate Time:<br>$Time = \\frac{180^\\circ}{5.5^\\circ/\\text{min}} \\approx 32.72$ min.", "other_defs": ""}, {"q": "31. Find the 5th term in the expansion $(3+y)^6$", "opts": ["$230y^4$", "$135y^4$", "$1020y^4$", "$1150y^4$"], "ans": 1, "type": 0, "sol": "1. Binomial Theorem Term Formula:<br>$T_{k+1} = \\binom{n}{k}a^{n-k}b^k$<br><br>2. For the 5th term, $k = 4$ ($n=6, a=3, b=y$):<br>$T_5 = \\binom{6}{4}(3)^{6-4}(y)^4$<br><br>3. Expand:<br>$T_5 = \\frac{6!}{4!2!} \\times (3^2) \\times y^4$<br>$T_5 = 15 \\times 9 \\times y^4 = 135y^4$.", "other_defs": ""}, {"q": "32. Pick 1 book from 5 red, 7 yellow, 12 blue. Probability it is red or blue?", "opts": ["72.53%", "70.83%", "52.66%", "61.44%"], "ans": 1, "type": 0, "sol": "1. Total items:<br>$5 + 7 + 12 = 24$<br><br>2. Favorable outcomes (red + blue):<br>$5 + 12 = 17$<br><br>3. Probability:<br>$P = \\frac{17}{24} \\approx 0.7083 \\text{ or } 70.83\\%$.", "other_defs": ""}, {"q": "33. A 50 sq.in trapezoid has bases of 12 and 10 in. Find height.", "opts": ["6.32\"", "5.52\"", "4.78\"", "4.55\""], "ans": 3, "type": 0, "sol": "1. Trapezoid Area Formula:<br>$A = \\frac{1}{2}(b_1 + b_2)h$<br><br>2. Substitute values:<br>$50 = \\frac{1}{2}(12 + 10)h$<br><br>3. Solve for $h$:<br>$50 = \\frac{1}{2}(22)h \\implies 50 = 11h$<br>$h = \\frac{50}{11} \\approx 4.55$ inches.", "other_defs": ""}, {"q": "34. Triangle semi-perimeter 26 cm, sides 10 and 20 cm. Area?", "opts": ["93.3 sqcm", "89.8 sqcm", "99.9 sqcm", "91.8 sqcm"], "ans": 2, "type": 0, "sol": "1. Semi-perimeter ($s$) is 26. Perimeter = 52.<br><br>2. Find third side ($c$):<br>$c = 52 - (10 + 20) = 22$<br><br>3. Heron's Area Formula:<br>$A = \\sqrt{s(s-a)(s-b)(s-c)}$<br><br>4. Calculate:<br>$A = \\sqrt{26(26-10)(26-20)(26-22)}$<br>$A = \\sqrt{26(16)(6)(4)} = \\sqrt{9984} \\approx 99.9$ sq.cm.", "other_defs": ""}, {"q": "35. Get interior angle B given $a=25, b=15,$ and angle $A=40^\\circ$.", "opts": ["22.69", "19.56", "27.68", "15.68"], "ans": 0, "type": 0, "sol": "1. Law of Sines:<br>$\\frac{\\sin A}{a} = \\frac{\\sin B}{b}$<br><br>2. Substitute:<br>$\\frac{\\sin 40^\\circ}{25} = \\frac{\\sin B}{15}$<br><br>3. Solve for $\\sin B$:<br>$\\sin B = \\frac{15 \\times \\sin 40^\\circ}{25} \\approx 0.3857$<br><br>4. Angle B:<br>$B = \\arcsin(0.3857) \\approx 22.69^\\circ$.", "other_defs": ""}, {"q": "36. Side $a=43, b=23,$ angle $A=40^\\circ$. Identify angle B.", "opts": ["19.22", "18.76", "23.43", "20.11"], "ans": 3, "type": 0, "sol": "1. Law of Sines:<br>$\\frac{\\sin B}{b} = \\frac{\\sin A}{a}$<br><br>2. Substitute:<br>$\\sin B = \\frac{23 \\times \\sin 40^\\circ}{43} \\approx 0.3438$<br><br>3. Angle B:<br>$B = \\arcsin(0.3438) \\approx 20.11^\\circ$.", "other_defs": ""}, {"q": "37. 1 BTU = how many kJoule?", "opts": ["1055", "0.29", "4.184", "1.055"], "ans": 3, "type": 0, "sol": "1. Standard Conversion:<br>$1 \\text{ BTU} = 1055.06 \\text{ Joules}$<br><br>2. Convert to kilojoules:<br>$1055.06 \\text{ J} \\div 1000 = 1.055 \\text{ kJ}$.", "other_defs": ""}, {"q": "38. Factor equation $3x^2+6x+4x+8$.", "opts": ["$(x+2)(3x+4)$", "$(x+7)(7x+2)$", "$(x+4)(3x+3)$", "$(x+3)(6x+3)$"], "ans": 0, "type": 0, "sol": "1. Factor by grouping:<br>$(3x^2 + 6x) + (4x + 8)$<br><br>2. Factor out common terms:<br>$3x(x + 2) + 4(x + 2)$<br><br>3. Group the common binomial:<br>$(x + 2)(3x + 4)$.", "other_defs": ""}, {"q": "39. If $\\sin(3A)=\\cos(6B)$ then:", "opts": ["$A+B=60^\\circ$", "$A+B=90^\\circ$", "$A+2B=30^\\circ$", "$A-2B=30^\\circ$"], "ans": 2, "type": 0, "sol": "1. Co-function property:<br>$\\sin X = \\cos Y \\text{ if } X + Y = 90^\\circ$<br><br>2. Apply to equation:<br>$3A + 6B = 90^\\circ$<br><br>3. Divide by 3:<br>$A + 2B = 30^\\circ$.", "other_defs": ""}, {"q": "40. If one side of a cube is 3cm, find body diagonal.", "opts": ["3.70", "4.24", "5.78", "5.20"], "ans": 3, "type": 0, "sol": "1. Body Diagonal Formula for Cube:<br>$d = s\\sqrt{3}$<br><br>2. Substitute $s=3$:<br>$d = 3\\sqrt{3} \\approx 5.196 \\text{ cm}$.", "other_defs": ""}, {"q": "41. What is the co-function identity of Tan?", "opts": ["$\\sin(90^\\circ-\theta)$", "$\\csc(90^\\circ-\theta)$", "$\\cot(90^\\circ-\theta)$", "$\\cos(90^\\circ-\theta)$"], "ans": 2, "type": 1, "sol": "Co-functions represent the relationship between complementary angles. For Tangent, its co-function is Cotangent: $\\tan(\\theta) = \\cot(90^\\circ - \\theta)$.", "other_defs": ""}, {"q": "42. 14th term of progression, 1st term 3, common ratio 5?", "opts": ["13", "146484375", "68", "3662109375"], "ans": 3, "type": 0, "sol": "1. Geometric Sequence Formula:<br>$a_n = a_1r^{n-1}$<br><br>2. Substitute values:<br>$a_{14} = 3(5)^{14-1}$<br>$a_{14} = 3(5)^{13} = 3,662,109,375$.", "other_defs": ""}, {"q": "43. Triangle angle A=23, other twice A. 3rd angle?", "opts": ["111", "121", "119", "131"], "ans": 0, "type": 0, "sol": "1. Identify angles:<br>Angle 1 = $23^\\circ$<br>Angle 2 = $23^\\circ \\times 2 = 46^\\circ$<br><br>2. Sum of triangle angles = $180^\\circ$<br>$180^\\circ - (23^\\circ + 46^\\circ) = 111^\\circ$.", "other_defs": ""}, {"q": "44. Prob pick king or queen from 52 cards?", "opts": ["2/13", "1/13", "1/169", "1/7"], "ans": 0, "type": 0, "sol": "1. Total favorable outcomes:<br>4 Kings + 4 Queens = 8<br><br>2. Total possible outcomes = 52<br><br>3. Probability:<br>$P = \\frac{8}{52} = \\frac{2}{13}$.", "other_defs": ""}, {"q": "45. % increase in rectangle area if sides increase 20%?", "opts": ["45%", "22%", "28%", "44%"], "ans": 3, "type": 0, "sol": "1. Original Area:<br>$A = L \\times W = 1$<br><br>2. New Area (increased by 20%):<br>$A_{new} = 1.2L \\times 1.2W = 1.44LW$<br><br>3. Percentage Increase:<br>$1.44 - 1.00 = 0.44 = 44\\%$.", "other_defs": ""}, {"q": "46. Louie is 30, Lia is 6. In how many years will Louie double her age?", "opts": ["16", "20", "24", "18"], "ans": 3, "type": 0, "sol": "1. Set up equation ($x$ = years):<br>$30 + x = 2(6 + x)$<br><br>2. Expand:<br>$30 + x = 12 + 2x$<br><br>3. Solve for $x$:<br>$30 - 12 = 2x - x$<br>$x = 18$ years.", "other_defs": ""}, {"q": "47. Average velocity at rest?", "opts": ["1 N/sq.m", "3.2 m/sec", "0 m/sec", "9.8 m/sec"], "ans": 2, "type": 1, "sol": "Velocity is a measure of displacement over time ($v = d/t$). If a body is at rest, its displacement is 0, making its velocity 0 m/sec.", "other_defs": ""}, {"q": "48. Sum of two numbers 189, one twice the other. Find numbers.", "opts": ["57; 114", "60; 129", "66; 123", "63; 126"], "ans": 3, "type": 0, "sol": "1. Let numbers be $x$ and $2x$.<br><br>2. Set up equation:<br>$x + 2x = 189$<br>$3x = 189$<br><br>3. Solve:<br>$x = 63$<br>Larger number = $63 \\times 2 = 126$.", "other_defs": ""}, {"q": "49. Tank 0.6m dia, 5m length. Max volume?", "opts": ["674.45 gal", "373.45 liters", "674.45 liters", "373.45 gal"], "ans": 3, "type": 0, "sol": "1. Cylinder Volume ($r=0.3m$):<br>$V = \\pi r^2 h = \\pi(0.3)^2(5) \\approx 1.4137 \\text{ m}^3$<br><br>2. Convert to Liters ($1 \\text{ m}^3 = 1000 \\text{ L}$):<br>$1413.7 \\text{ L}$<br><br>3. Convert to US Gallons ($1 \\text{ Gal} \\approx 3.785 \\text{ L}$):<br>$1413.7 \\div 3.785 \\approx 373.45 \\text{ gal}$.", "other_defs": ""}, {"q": "50. Diagonal of square side 30 cm?", "opts": ["53.22 cm", "47.65 cm", "38.76 cm", "42.43 cm"], "ans": 3, "type": 0, "sol": "1. Square Diagonal Formula:<br>$d = s\\sqrt{2}$<br><br>2. Calculate:<br>$d = 30\\sqrt{2} \\approx 42.426 \\text{ cm}$.", "other_defs": ""}];
    let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let isReviewMode = false;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');
    
    const startMenuHTML = `
        <div id="start-menu" style="text-align: center; padding: 20px 0;">
            <h2 style="color: var(--primary); margin-bottom: 30px;">Weekly Test 4 - Plumbing Arithmetic</h2>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: #e67e22;" onclick="startQuiz(true)">Start Exam Mode (60 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none; width:100%; margin-bottom:15px; background: #27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('weeklyTest4_final_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode; isReviewMode = false;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0; userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('weeklyTest4_final_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ; userAnswers = state.userAnswers;
            isExamMode = false; isReviewMode = false;
            updateScore(); loadQuestion();
        }
    }

    function saveState() {
        if (isReviewMode || isExamMode) return;
        localStorage.setItem('weeklyTest4_final_state', JSON.stringify({ currentQ, userAnswers }));
    }

    function updateScore() {
        let s = 0; questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const scoreSpan = document.querySelector('.score');
        if (isExamMode && !isReviewMode) scoreSpan.style.display = 'none';
        else { scoreSpan.style.display = 'inline'; document.getElementById('score-val').innerText = s; }
    }

    function loadQuestion() {
        const q = questionsList[currentQ];
        document.getElementById('q-counter').innerText = "Q: " + (currentQ + 1) + " / " + questionsList.length;
        document.getElementById('question-text').innerHTML = q.q;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        q.opts.forEach((opt, index) => {
            const btn = document.createElement('button'); btn.className = 'btn';
            btn.innerHTML = String.fromCharCode(65 + index) + ". " + opt;
            btn.onclick = () => checkAnswer(index, btn);
            optsContainer.appendChild(btn);
        });
        document.getElementById('info-box').style.display = 'none';
        document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (userAnswers[currentQ] !== null) {
            const buttons = document.querySelectorAll('.btn');
            const selectedIdx = userAnswers[currentQ];
            if (!isExamMode || isReviewMode) {
                buttons.forEach((b, i) => {
                    b.disabled = true;
                    if (i === q.ans) b.classList.add('correct');
                    if (i === selectedIdx && i !== q.ans) b.classList.add('wrong');
                });
                let infoHtml = q.sol;
                if (q.img) infoHtml = '<div style="text-align:center;"><img src="' + q.img + '" style="max-width:100%; height:auto; border:1px solid #ddd; margin-bottom:15px; border-radius:6px;"></div>' + infoHtml;
                document.getElementById('info-box').innerHTML = "<strong>Solution Breakdown:</strong><br><div style='margin-top:8px; line-height:1.6;'>" + infoHtml + "</div>" + (q.other_defs || "");
                document.getElementById('info-box').style.display = 'block';
            } else {
                buttons[selectedIdx].style.border = "2px solid var(--primary)";
                buttons[selectedIdx].style.background = "#eef7fd";
            }
            showNextButton();
        }
        if (window.MathJax) { MathJax.typesetPromise(); }
    }

    function checkAnswer(idx, btn) {
        if (!isExamMode || isReviewMode) { if (userAnswers[currentQ] !== null) return; }
        userAnswers[currentQ] = idx; updateScore(); saveState();
        const buttons = document.querySelectorAll('.btn');
        if (!isExamMode || isReviewMode) {
            buttons.forEach(b => b.disabled = true);
            const q = questionsList[currentQ];
            if (idx === q.ans) btn.classList.add('correct');
            else { btn.classList.add('wrong'); buttons[q.ans].classList.add('correct'); }
            let infoHtml = q.sol;
            if (q.img) infoHtml = '<div style="text-align:center;"><img src="' + q.img + '" style="max-width:100%; height:auto; border:1px solid #ddd; margin-bottom:15px; border-radius:6px;"></div>' + infoHtml;
            document.getElementById('info-box').innerHTML = "<strong>Solution Breakdown:</strong><br><div style='margin-top:8px; line-height:1.6;'>" + infoHtml + "</div>" + (q.other_defs || "");
            document.getElementById('info-box').style.display = 'block';
            if (window.MathJax) { MathJax.typesetPromise(); }
        } else {
            buttons.forEach(b => { b.style.border = "2px solid #e9ecef"; b.style.background = "#f8f9fa"; });
            btn.style.border = "2px solid var(--primary)"; btn.style.background = "#eef7fd";
        }
        showNextButton();
    }

    function showNextButton() {
        const btn = document.getElementById('next-btn');
        btn.innerText = currentQ < questionsList.length - 1 ? 'Next ➔' : 'Finish 🏆';
        btn.style.display = 'block';
    }

    function prevQuestion() { if (currentQ > 0) { currentQ--; loadQuestion(); window.scrollTo(0, 0); } }
    function nextQuestion() { if (currentQ < questionsList.length - 1) { currentQ++; loadQuestion(); window.scrollTo(0, 0); } else showResults(); }

    function showResults() {
        let s = 0; questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const p = Math.round((s / questionsList.length) * 100);
        quizContainer.innerHTML = `
            <div class="result-screen">
                <h2 style="color: var(--primary);">Quiz Complete!</h2>
                <p style="font-size: 1.2rem;">You scored <strong>${s}</strong> out of <strong>${questionsList.length}</strong> (${p}%).</p>
                <button class="nav-btn next" style="display:block; width:100%; margin-top:15px;" onclick="location.reload()">Return to Main Menu ↻</button>
            </div>
        `;
    }
</script>
</body>
</html>
