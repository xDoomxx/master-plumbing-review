<script>
    const allQuestions = [{"q": "1. Three brothers share an allowance in the ratio 1:3:4 (eldest:middle:youngest). If the youngest receives PhP 50,000, what is the middle son's share?", "opts": ["A. PhP 12,500", "B. PhP 25,000", "C. PhP 37,500", "D. PhP 35,250"], "ans": 2, "info": "<strong>Correct Answer: C. PhP 37,500</strong><br>Ratio: Eldest:Middle:Youngest = 1:3:4<br>Youngest has 4 parts = PhP 50,000<br>\\[ 1\\text{ part} = \\frac{50{,}000}{4} = 12{,}500 \\]\\[ \\text{Middle share} = 3 \\times 12{,}500 = \\mathbf{PhP\\ 37{,}500} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 12,500:</strong> This is the value of 1 part — the eldest son's share, not the middle.</li><li><strong>PhP 25,000:</strong> This would be 2 parts — neither the middle (3 parts) nor the eldest (1 part).</li><li><strong>PhP 35,250:</strong> Not a valid result from any ratio combination in this problem.</li></ul>"}, {"q": "2. Bond to which are attached coupons indicating the interest due and the date when such interest is to be paid.", "opts": ["A. Collateral Trust Bond", "B. Mortgage Bond", "C. Debenture Bond", "D. Coupon Bond"], "ans": 3, "info": "<strong>Correct Answer: D. Coupon Bond</strong><br>A Coupon Bond (also called a bearer bond) physically has detachable coupons that the holder presents to receive interest payments on specified dates.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Collateral Trust Bond:</strong> Secured by financial assets (like stocks/bonds) pledged as collateral. No detachable coupons.</li><li><strong>Mortgage Bond:</strong> Secured by real property (land, buildings). The security is physical assets, not interest coupons.</li><li><strong>Debenture Bond:</strong> An unsecured bond backed only by the issuer's creditworthiness, not collateral or coupons.</li></ul>"}, {"q": "3. PhP 200,000 was deposited on Jan. 1, 1988 at 24% compounded semi-annually. How much on Jan. 1, 1993?", "opts": ["A. PhP 632,790", "B. PhP 454,580", "C. PhP 573,860", "D. PhP 621,170"], "ans": 3, "info": "<strong>Correct Answer: D. PhP 621,170</strong><br>Compound interest formula: \\(F = P(1+i)^n\\)<br>Period: 1988 to 1993 = 5 years. Semi-annually means \\(n = 5 \\times 2 = 10\\)<br>Rate per period: \\(i = \\dfrac{0.24}{2} = 0.12\\)<br>\\[ F = 200{,}000(1.12)^{10} = 200{,}000 \\times 3.10584 \\approx \\mathbf{PhP\\ 621{,}170} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 632,790:</strong> Using i=0.13 per period instead of 0.12, or wrong number of periods.</li><li><strong>PhP 454,580:</strong> Using n=5 (annual compounding) instead of n=10 (semi-annual) periods.</li><li><strong>PhP 573,860:</strong> Using i=0.24 annually (not dividing by 2 for semi-annual) with n=10.</li></ul>"}, {"q": "4. The ratio of the change in width per unit width, to the change in length per unit length, as a result of strain.", "opts": ["A. Poisson's ratio", "B. Young's Modulus", "C. Kepler's Law", "D. Hooke's Law"], "ans": 0, "info": "<strong>Correct Answer: A. Poisson's ratio</strong><br>Poisson's ratio \\((\\nu)\\) is the negative ratio of transverse (lateral) strain to axial (longitudinal) strain: \\[ \\nu = -\\frac{\\varepsilon_\\text{transverse}}{\\varepsilon_\\text{axial}} \\]When a material is stretched, it typically gets thinner.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Young's Modulus:</strong> Measures the stiffness of a solid material — the ratio of stress to strain. Not a ratio of lateral to axial strain.</li><li><strong>Kepler's Law:</strong> Describes planetary motion (orbital periods and distances). Unrelated to material mechanics.</li><li><strong>Hooke's Law:</strong> States that stress is proportional to strain (F=kx). Not the ratio of lateral to axial strain.</li></ul>"}, {"q": "5. Calculate the current if an appliance uses 75 watts with a resistance of 20 ohms.", "opts": ["A. 1.94 amps", "B. 2.33 amps", "C. 3.29 amps", "D. 2.14 amps"], "ans": 0, "info": "<strong>Correct Answer: A. 1.94 amps</strong><br>Power formula: \\(P = I^2 \\times R\\)<br>\\[ 75 = I^2 \\times 20 \\implies I^2 = \\frac{75}{20} = 3.75 \\]\\[ I = \\sqrt{3.75} \\approx \\mathbf{1.936\\text{ amps}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>2.33 amps:</strong> Using P=I×R instead of P=I²R: I=75/20=3.75, then √3.75≈1.94, or I=75/32≈2.34.</li><li><strong>3.29 amps:</strong> Using I=P/R=75/20=3.75, forgetting to take the square root.</li><li><strong>2.14 amps:</strong> Using P=V×I and assuming V=R×I with V=35V — a misapplication of Ohm's Law.</li></ul>"}, {"q": "6. A 500 g cube of lead is heated from 25°C to 75°C. How much energy was required? (Specific heat of lead = 0.129 J/g°C)", "opts": ["A. 3225 J", "B. 3450 J", "C. 4050 J", "D. 4125 J"], "ans": 0, "info": "<strong>Correct Answer: A. 3225 J</strong><br>Heat energy formula: \\(Q = m \\cdot c \\cdot \\Delta T\\)<br>\\[ \\Delta T = 75°C - 25°C = 50°C \\]\\[ Q = 500 \\times 0.129 \\times 50 = \\mathbf{3{,}225\\text{ J}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>3450 J:</strong> Using c=0.138 instead of 0.129, or ΔT=51°C.</li><li><strong>4050 J:</strong> Using ΔT=75°C (absolute temperature, not change): 500×0.129×75≈4837, or using wrong c.</li><li><strong>4125 J:</strong> Using m=550g instead of 500g, or wrong specific heat value.</li></ul>"}, {"q": "7. Liquid assets such as cash and other assets that can be converted quickly into cash.", "opts": ["A. Current assets", "B. Non-current assets", "C. Tangible Assets", "D. Fixed assets"], "ans": 0, "info": "<strong>Correct Answer: A. Current assets</strong><br>In accounting, Current Assets are all assets expected to be converted into cash within one year (e.g., cash, accounts receivable, inventory).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Non-current assets:</strong> Assets held long-term (>1 year), like equipment and investments. Not quickly converted to cash.</li><li><strong>Tangible Assets:</strong> Physical assets with a physical form (machinery, buildings). Not all are liquid.</li><li><strong>Fixed assets:</strong> A subset of non-current assets — long-term physical property used in operations. Opposite of liquid.</li></ul>"}, {"q": "8. A gas has a volume of 6 L at 85 kPa. What is its new volume if pressure becomes 145 kPa?", "opts": ["A. 3.52 L", "B. 2.89 L", "C. 4.32 L", "D. 3.91 L"], "ans": 0, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 290 170\" style=\"width:100%;max-width:290px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"20\" y=\"40\" width=\"90\" height=\"100\" fill=\"#eef7fd\" stroke=\"#3498db\" stroke-width=\"2\" rx=\"5\"/>\n  <text x=\"65\" y=\"72\" font-size=\"11\" fill=\"#3498db\" text-anchor=\"middle\" font-weight=\"bold\">P&#x2081; = 85 kPa</text>\n  <text x=\"65\" y=\"90\" font-size=\"11\" fill=\"#3498db\" text-anchor=\"middle\">V&#x2081; = 6 L</text>\n  <text x=\"65\" y=\"125\" font-size=\"14\" fill=\"#3498db\" text-anchor=\"middle\">Low Pressure</text>\n  <text x=\"170\" y=\"96\" font-size=\"22\" fill=\"#555\" text-anchor=\"middle\">&#x2192;</text>\n  <rect x=\"200\" y=\"55\" width=\"68\" height=\"70\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"2\" rx=\"5\"/>\n  <text x=\"234\" y=\"81\" font-size=\"11\" fill=\"#e74c3c\" text-anchor=\"middle\" font-weight=\"bold\">P&#x2082; = 145 kPa</text>\n  <text x=\"234\" y=\"99\" font-size=\"11\" fill=\"#e74c3c\" text-anchor=\"middle\">V&#x2082; = ?</text>\n  <text x=\"234\" y=\"115\" font-size=\"14\" fill=\"#e74c3c\" text-anchor=\"middle\">High Pressure</text>\n  <text x=\"143\" y=\"162\" font-size=\"10\" fill=\"#2c3e50\" text-anchor=\"middle\" font-style=\"italic\">P&#x2081;V&#x2081; = P&#x2082;V&#x2082;</text></svg></div><strong>Correct Answer: A. 3.52 L</strong><br>Boyle's Law (constant temperature): \\(P_1 V_1 = P_2 V_2\\)<br>\\[ 85 \\times 6 = 145 \\times V_2 \\implies V_2 = \\frac{510}{145} \\approx \\mathbf{3.517\\text{ L}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>2.89 L:</strong> Using V₂=P₁/P₂×V₁ without the V₁ factor: 85/145≈0.586, then 0.586×5=2.93.</li><li><strong>4.32 L:</strong> Inverting the pressure ratio: V₂=(145/85)×6=10.24/... or other ratio error.</li><li><strong>3.91 L:</strong> Using P₁=80 instead of 85, or arithmetic error in cross-multiplication.</li></ul>"}, {"q": "9. Which is equal to the unit of Pascal?", "opts": ["A. Nm", "B. kgm/s²", "C. J/s", "D. N/m²"], "ans": 3, "info": "<strong>Correct Answer: D. N/m²</strong><br>A Pascal is the SI unit of pressure: \\[ 1\\text{ Pa} = 1\\ \\frac{\\text{N}}{\\text{m}^2} \\]It represents one Newton of force applied over one square meter of area.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Nm:</strong> Newton-meter = Joule (unit of energy/torque). Not a unit of pressure.</li><li><strong>kgm/s²:</strong> This equals 1 Newton (unit of force). One step away from pressure but not pressure itself.</li><li><strong>J/s:</strong> Joule per second = Watt (unit of power). Completely different physical quantity.</li></ul>"}, {"q": "10. An 800 kg car at 40 kph increases speed to 50 m/s. By how much did its kinetic energy increase?", "opts": ["A. 893.1 kJ", "B. 950.6 kJ", "C. 913.5 kJ", "D. 991.2 kJ"], "ans": 1, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 250 150\" style=\"width:100%;max-width:250px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><defs><marker id=\"a1\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#3498db\"/></marker><marker id=\"a2\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#e74c3c\"/></marker></defs>\n  <text x=\"130\" y=\"18\" font-size=\"11\" fill=\"#2c3e50\" text-anchor=\"middle\" font-weight=\"bold\">Change in Kinetic Energy</text>\n  <rect x=\"15\" y=\"35\" width=\"28\" height=\"18\" fill=\"#ccc\" stroke=\"#888\" stroke-width=\"1\" rx=\"2\"/>\n  <text x=\"29\" y=\"48\" font-size=\"8\" fill=\"#444\" text-anchor=\"middle\">Car</text>\n  <line x1=\"43\" y1=\"44\" x2=\"93\" y2=\"44\" stroke=\"#3498db\" stroke-width=\"2.5\" marker-end=\"url(#a1)\"/>\n  <text x=\"70\" y=\"38\" font-size=\"10\" fill=\"#3498db\" text-anchor=\"middle\">V&#x2081; = 11.11 m/s</text>\n  <rect x=\"15\" y=\"88\" width=\"28\" height=\"18\" fill=\"#ccc\" stroke=\"#888\" stroke-width=\"1\" rx=\"2\"/>\n  <text x=\"29\" y=\"101\" font-size=\"8\" fill=\"#444\" text-anchor=\"middle\">Car</text>\n  <line x1=\"43\" y1=\"97\" x2=\"215\" y2=\"97\" stroke=\"#e74c3c\" stroke-width=\"2.5\" marker-end=\"url(#a2)\"/>\n  <text x=\"130\" y=\"91\" font-size=\"10\" fill=\"#e74c3c\" text-anchor=\"middle\">V&#x2082; = 50 m/s</text>\n  <text x=\"130\" y=\"135\" font-size=\"10\" fill=\"#27ae60\" text-anchor=\"middle\">&#x394;KE = &#xBD;(800)(50&#xB2; &#x2212; 11.11&#xB2;) &#x2248; 950.6 kJ</text></svg></div><strong>Correct Answer: B. 950.6 kJ</strong><br>Convert: \\(V_1 = \\dfrac{40 \\times 1000}{3600} = 11.11\\text{ m/s}\\)<br>\\[ \\Delta KE = \\frac{1}{2}m(V_2^2 - V_1^2) = \\frac{1}{2}(800)(50^2 - 11.11^2) \\]\\[ = 400(2500 - 123.4) = 400 \\times 2376.6 \\approx \\mathbf{950{,}628\\text{ J} = 950.6\\text{ kJ}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>893.1 kJ:</strong> Using V₁=12 m/s (rounding 40 kph as 12) instead of the correct 11.11 m/s.</li><li><strong>913.5 kJ:</strong> Using V₁=10 m/s (rough conversion) and getting 400×(2500-100)=400×2400=960 kJ, then rounding error.</li><li><strong>991.2 kJ:</strong> Forgetting to subtract V₁² — computing ½×800×50²=1,000,000 J=1000 kJ, then slight adjustment.</li></ul>"}, {"q": "11. A 3 lb. of oxygen gas had its temperature changed from 100°F to 150°F. The specific heat is 0.157 BTU/lb-°F. Find the change in energy.", "opts": ["A. 18.67 BTU", "B. 31.34 BTU", "C. 23.55 BTU", "D. 24.56 BTU"], "ans": 2, "info": "<strong>Correct Answer: C. 23.55 BTU</strong><br>\\(Q = m \\cdot c \\cdot \\Delta T\\)<br>\\[ \\Delta T = 150°F - 100°F = 50°F \\]\\[ Q = 3 \\times 0.157 \\times 50 = \\mathbf{23.55\\text{ BTU}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>18.67 BTU:</strong> Using ΔT=40°F instead of 50°F: 3×0.157×40=18.84.</li><li><strong>31.34 BTU:</strong> Doubling the result — possibly computing Q twice or using m=6 instead of 3.</li><li><strong>24.56 BTU:</strong> Using c=0.164 instead of 0.157, or ΔT=52°F.</li></ul>"}, {"q": "12. John invests PhP 100,000 every start of the year for 3 years at 7% annual interest. What is its equivalent value at maturity?", "opts": ["A. PhP 280,810", "B. PhP 343,994", "C. PhP 282,090", "D. PhP 321,490"], "ans": 1, "info": "<strong>Correct Answer: B. PhP 343,994</strong><br>This is an <strong>Annuity Due</strong> (payments at the START of each period).<br>\\[ F = A \\times \\left[\\frac{(1+i)^n - 1}{i}\\right] \\times (1+i) \\]With \\(A=100{,}000,\\ i=0.07,\\ n=3\\):<br>\\[ F = 100{,}000 \\times \\frac{(1.07)^3-1}{0.07} \\times 1.07 = 100{,}000 \\times 3.2149 \\times 1.07 \\approx \\mathbf{PhP\\ 343{,}994} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 280,810:</strong> Using the ordinary annuity formula (end of period) without the ×(1+i) multiplier.</li><li><strong>PhP 282,090:</strong> Close to ordinary annuity result — missing the annuity due adjustment of ×1.07.</li><li><strong>PhP 321,490:</strong> Using i=0.07 but computing incorrectly: 100,000×(1.07³+1.07²+1.07)=321,491 — off by one period.</li></ul>"}, {"q": "13. The center of gravity for a two-dimensional body is the point at which the entire _____ acts regardless of orientation.", "opts": ["A. mass or weight", "B. weight", "C. mass", "D. volume"], "ans": 1, "info": "<strong>Correct Answer: B. weight</strong><br>Gravity exerts a <em>force</em> (weight) on an object. The center of gravity is the specific point where the total gravitational force is considered to be concentrated — it is a weight-based concept, not purely mass.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>mass or weight:</strong> Too broad — the precise definition specifies <em>weight</em> (gravitational force), not mass generally.</li><li><strong>mass:</strong> Center of mass and center of gravity coincide in uniform gravity, but the definition of center of gravity uses weight (force), not mass.</li><li><strong>volume:</strong> Volume is a geometric property. The center of volume is the centroid, which is different from the center of gravity.</li></ul>"}, {"q": "14. A businessman loaned P500,000 at 12% compounded semi-quarterly. How much at the end of 5 years?", "opts": ["A. PhP 800,000", "B. PhP 907,010", "C. PhP 914,860", "D. PhP 856,450"], "ans": 1, "info": "<strong>Correct Answer: B. PhP 907,010</strong><br>Semi-quarterly = twice per quarter = 8 times per year.<br>Rate per period: \\(i = \\dfrac{12\\%}{8} = 1.5\\% = 0.015\\)<br>Total periods: \\(n = 5 \\times 8 = 40\\)<br>\\[ F = 500{,}000(1.015)^{40} = 500{,}000 \\times 1.8140 \\approx \\mathbf{PhP\\ 907{,}010} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 800,000:</strong> Using simple interest or n=20 periods (quarterly, not semi-quarterly).</li><li><strong>PhP 914,860:</strong> Using n=40 but i=0.0153 (slight rate error), giving 500,000×1.8297≈914,860.</li><li><strong>PhP 856,450:</strong> Using n=40 and i=0.013 (12%/9 instead of 12%/8): 500,000×1.7129≈856,450.</li></ul>"}, {"q": "15. P150,000 was invested for 7 years at 10% simple interest. Compute the interest at the end of 7 years.", "opts": ["A. PhP 95,000", "B. PhP 110,000", "C. PhP 100,000", "D. PhP 105,000"], "ans": 3, "info": "<strong>Correct Answer: D. PhP 105,000</strong><br>Simple interest formula: \\(I = P \\times r \\times t\\)<br>\\[ I = 150{,}000 \\times 0.10 \\times 7 = \\mathbf{PhP\\ 105{,}000} \\]Note: This is only the interest, not the total future value (which would be PhP 255,000).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 95,000:</strong> Using t=6.33 years or r=0.09 — small rate/time error.</li><li><strong>PhP 110,000:</strong> Using r=0.10476 or t=7.33 — overestimate from calculation error.</li><li><strong>PhP 100,000:</strong> Using P×r×t = 150,000×0.10×6.67 (wrong years) or 142,857×0.10×7.</li></ul>"}, {"q": "16. Two resistances of 20 Ω and 40 Ω are connected in parallel, then in series with 10 Ω. What is the equivalent resistance?", "opts": ["A. 26.87 ohms", "B. 23.33 ohms", "C. 42.22 ohms", "D. 15.85 ohms"], "ans": 1, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 275 158\" style=\"width:100%;max-width:275px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><line x1=\"15\" y1=\"60\" x2=\"60\" y2=\"60\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"60\" y1=\"60\" x2=\"60\" y2=\"38\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"60\" y1=\"60\" x2=\"60\" y2=\"82\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <rect x=\"75\" y=\"28\" width=\"55\" height=\"20\" fill=\"#eef7fd\" stroke=\"#3498db\" stroke-width=\"1.5\" rx=\"3\"/>\n  <text x=\"102\" y=\"42\" font-size=\"11\" fill=\"#3498db\" text-anchor=\"middle\">20 &#x3A9;</text>\n  <rect x=\"75\" y=\"72\" width=\"55\" height=\"20\" fill=\"#eef7fd\" stroke=\"#3498db\" stroke-width=\"1.5\" rx=\"3\"/>\n  <text x=\"102\" y=\"86\" font-size=\"11\" fill=\"#3498db\" text-anchor=\"middle\">40 &#x3A9;</text>\n  <line x1=\"130\" y1=\"38\" x2=\"155\" y2=\"38\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"130\" y1=\"82\" x2=\"155\" y2=\"82\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"155\" y1=\"38\" x2=\"155\" y2=\"60\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"155\" y1=\"82\" x2=\"155\" y2=\"60\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <text x=\"102\" y=\"118\" font-size=\"10\" fill=\"#888\" text-anchor=\"middle\">R&#x2095; &#x2248; 13.33 &#x3A9;</text>\n  <line x1=\"155\" y1=\"60\" x2=\"180\" y2=\"60\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <rect x=\"180\" y=\"50\" width=\"55\" height=\"20\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\" rx=\"3\"/>\n  <text x=\"207\" y=\"64\" font-size=\"11\" fill=\"#e74c3c\" text-anchor=\"middle\">10 &#x3A9;</text>\n  <line x1=\"235\" y1=\"60\" x2=\"265\" y2=\"60\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <text x=\"207\" y=\"102\" font-size=\"10\" fill=\"#888\" text-anchor=\"middle\">Series</text>\n  <text x=\"140\" y=\"145\" font-size=\"11\" fill=\"#27ae60\" text-anchor=\"middle\">R&#x209C;&#x2092;&#x209C;&#x2090;&#x2097; = 13.33 + 10 = 23.33 &#x3A9;</text>\n  <text x=\"15\" y=\"56\" font-size=\"10\" fill=\"#555\">+</text><text x=\"257\" y=\"56\" font-size=\"10\" fill=\"#555\">&#x2212;</text></svg></div><strong>Correct Answer: B. 23.33 Ω</strong><br>Step 1 — Parallel combination:<br>\\[ R_p = \\frac{R_1 \\times R_2}{R_1 + R_2} = \\frac{20 \\times 40}{20 + 40} = \\frac{800}{60} \\approx 13.33\\ \\Omega \\]Step 2 — Add series resistance:<br>\\[ R_{total} = 13.33 + 10 = \\mathbf{23.33\\ \\Omega} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>26.87 ohms:</strong> Using wrong parallel formula: (20+40)/2+10=40; or 1/20+1/40 computed incorrectly.</li><li><strong>42.22 ohms:</strong> Adding all resistors in series: 20+40+10=70, then dividing by some factor.</li><li><strong>15.85 ohms:</strong> Treating all three as parallel: 1/R=1/20+1/40+1/10=0.125, R=8Ω — then adding an extra factor.</li></ul>"}, {"q": "17. An object has a specific gravity of 0.55. What percent of its volume will be submerged?", "opts": ["A. 45% will be submerged", "B. The entirety of the object will float", "C. The entirety of the object will be submerged", "D. 55% will be submerged"], "ans": 3, "info": "<strong>Correct Answer: D. 55% will be submerged</strong><br>Specific gravity directly equals the fraction submerged for a floating object. An object with SG = 0.55 is less dense than water (SG = 1.0), so it floats with exactly 55% of its volume below the waterline.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>45% will be submerged:</strong> Subtracting from 100%: this is the percentage above the waterline (exposed), not submerged.</li><li><strong>The entirety will float:</strong> Only possible if SG < 1 AND one assumes the object won't float at all — a contradiction. The object floats with 55% under.</li><li><strong>The entirety will be submerged:</strong> Only objects with SG ≥ 1 sink completely. SG=0.55 < 1.0, so it floats.</li></ul>"}, {"q": "18. Mark's share is twice John's. James' share is ₱20,000 more than John's. If Mark received ₱70,000, what are the total profits?", "opts": ["A. ₱170,000", "B. ₱150,000", "C. ₱160,000", "D. ₱190,000"], "ans": 2, "info": "<strong>Correct Answer: C. ₱160,000</strong><br>Mark = ₱70,000. Since Mark = 2 × John:<br>\\[ \\text{John} = \\frac{70{,}000}{2} = 35{,}000 \\]\\[ \\text{James} = 35{,}000 + 20{,}000 = 55{,}000 \\]\\[ \\text{Total} = 70{,}000 + 35{,}000 + 55{,}000 = \\mathbf{₱160{,}000} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>₱170,000:</strong> Adding an extra ₱10,000 somewhere, or computing James = John+30,000=65,000.</li><li><strong>₱150,000:</strong> Forgetting the ₱20,000 bonus for James: 70,000+35,000+45,000=150,000.</li><li><strong>₱190,000:</strong> Using James = Mark+20,000=90,000: 70,000+35,000+90,000=195,000 — misreading the problem.</li></ul>"}, {"q": "19. Find the present worth of a future payment of P1,000,000 in 10 years at 12% compounded quarterly.", "opts": ["A. PhP 284,556.68", "B. PhP 156,786.66", "C. PhP 298,889.76", "D. PhP 306,556.84"], "ans": 3, "info": "<strong>Correct Answer: D. PhP 306,556.84</strong><br>Present worth formula: \\(P = \\dfrac{F}{(1+i)^n}\\)<br>Quarterly: \\(i = \\dfrac{0.12}{4} = 0.03\\), \\(n = 10 \\times 4 = 40\\)<br>\\[ P = \\frac{1{,}000{,}000}{(1.03)^{40}} = \\frac{1{,}000{,}000}{3.2620} \\approx \\mathbf{PhP\\ 306{,}556.84} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 284,556.68:</strong> Using i=0.0315 per period (wrong rate) or n=41 periods.</li><li><strong>PhP 156,786.66:</strong> Using n=10 years annual (not quarterly n=40): P=1,000,000/(1.12)¹⁰≈321,973 — then another error.</li><li><strong>PhP 298,889.76:</strong> Using (1.03)⁴⁰=3.3448 instead of 3.2620 — a table lookup or rounding error.</li></ul>"}, {"q": "20. Gross profit (sales minus cost of goods sold) as a percentage of a sale.", "opts": ["A. Profit Margin", "B. Gross Margin", "C. Revenue", "D. Net Income"], "ans": 1, "info": "<strong>Correct Answer: B. Gross Margin</strong><br>Gross Margin = (Net Sales − Cost of Goods Sold) ÷ Net Sales × 100%. It measures how efficiently a company produces its goods.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Profit Margin:</strong> Usually refers to net profit margin (after ALL expenses, taxes, and interest), not just cost of goods.</li><li><strong>Revenue:</strong> Total sales income — before any expenses are deducted.</li><li><strong>Net Income:</strong> The final profit after ALL costs, operating expenses, taxes, and interest are deducted.</li></ul>"}, {"q": "21. A 4-m diameter pipe has a volumetric flow rate of 37.7 cu.m/s. Calculate the velocity in m/s.", "opts": ["A. 4", "B. 3", "C. 5", "D. 6"], "ans": 1, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 265 175\" style=\"width:100%;max-width:265px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"115\" cy=\"88\" r=\"60\" fill=\"#eef7fd\" stroke=\"#3498db\" stroke-width=\"2.5\"/>\n  <circle cx=\"115\" cy=\"88\" r=\"3\" fill=\"#3498db\"/>\n  <line x1=\"115\" y1=\"88\" x2=\"175\" y2=\"88\" stroke=\"#3498db\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\"/>\n  <text x=\"148\" y=\"82\" font-size=\"11\" fill=\"#3498db\">r = 2 m</text>\n  <text x=\"115\" y=\"20\" font-size=\"10\" fill=\"#888\" text-anchor=\"middle\">&#x2300; = 4 m</text>\n  <defs><marker id=\"fa\" markerWidth=\"6\" markerHeight=\"6\" refX=\"3\" refY=\"3\" orient=\"auto\"><circle cx=\"3\" cy=\"3\" r=\"2\" fill=\"#27ae60\"/></marker></defs>\n  <text x=\"200\" y=\"72\" font-size=\"11\" fill=\"#27ae60\" font-weight=\"bold\">Q = 37.7 m&#xB3;/s</text>\n  <text x=\"115\" y=\"162\" font-size=\"11\" fill=\"#e74c3c\" text-anchor=\"middle\">V = Q/A = 37.7/12.566 &#x2248; 3 m/s</text>\n  <text x=\"115\" y=\"148\" font-size=\"10\" fill=\"#888\" text-anchor=\"middle\">A = &#x3C0;(2)&#xB2; = 12.566 m&#xB2;</text></svg></div><strong>Correct Answer: B. 3 m/s</strong><br>Flow rate \\(Q = A \\times V\\)<br>\\[ A = \\pi r^2 = \\pi (2)^2 = 12.566\\text{ m}^2 \\]\\[ V = \\frac{Q}{A} = \\frac{37.7}{12.566} \\approx \\mathbf{3.0\\text{ m/s}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>4 m/s:</strong> Using diameter (not radius) in area: A=π(4)²=50.27, V=37.7/50.27≈0.75. Or just estimating without computing.</li><li><strong>5 m/s:</strong> Slight area error — using A=π(1.5)²×2 or another incorrect variant.</li><li><strong>6 m/s:</strong> Using A=π(2²)/2 (halving the area by error): V=37.7/6.28≈6.</li></ul>"}, {"q": "22. A bodybuilder lifts his 140 lbs body a distance of 0.30 m in 2 seconds. What is the power delivered?", "opts": ["A. 21 Watts", "B. 21 Kilowatts", "C. 93 Watts", "D. 93 Kilowatts"], "ans": 2, "info": "<strong>Correct Answer: C. 93 Watts</strong><br>Convert: \\(m = 140 \\times 0.4536 = 63.5\\text{ kg}\\)<br>Force: \\(F = mg = 63.5 \\times 9.81 = 622.9\\text{ N}\\)<br>Work: \\(W = F \\times d = 622.9 \\times 0.30 = 186.9\\text{ J}\\)<br>\\[ P = \\frac{W}{t} = \\frac{186.9}{2} \\approx \\mathbf{93.4\\text{ W}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>21 Watts:</strong> Using m=140 kg (not converting lbs to kg): P=140×9.81×0.30/2=206W ≠ 21; or using g=0.3.</li><li><strong>21 Kilowatts:</strong> Units error — the correct answer is 93 W (watts), not kilowatts.</li><li><strong>93 Kilowatts:</strong> Units error — the correct answer is 93 Watts, not 93 kW (which would be about 125 horsepower).</li></ul>"}, {"q": "23. 350 is to be divided between Jones and Smith so that Jones receives 25 more than Smith. How much did Jones receive?", "opts": ["A. 187.50", "B. 162.50", "C. 185.50", "D. 165.50"], "ans": 0, "info": "<strong>Correct Answer: A. 187.50</strong><br>Let \\(S\\) = Smith's share. Jones = \\(S + 25\\).<br>\\[ (S+25) + S = 350 \\implies 2S = 325 \\implies S = 162.50 \\]\\[ J = 162.50 + 25 = \\mathbf{187.50} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>162.50:</strong> This is Smith's share — the problem asks for Jones who receives 25 MORE.</li><li><strong>185.50:</strong> Off by 2 — possibly using 350-25=325, then 325/2=162.5, then 162.5+23=185.5.</li><li><strong>165.50:</strong> Error in setup: solving 2J=333 instead of 2J=375.</li></ul>"}, {"q": "24. Force A = 30N at 0°, Force B = 55N at 80°, Force C = 30N at 210°. What is the direction of the resultant?", "opts": ["A. 82.34°", "B. 70.88°", "C. 66.33°", "D. 43.58°"], "ans": 1, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 280 175\" style=\"width:100%;max-width:280px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><defs><marker id=\"va\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#3498db\"/></marker>\n  <marker id=\"vb\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#e74c3c\"/></marker>\n  <marker id=\"vc\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#e67e22\"/></marker>\n  <marker id=\"vr\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#27ae60\"/></marker></defs>\n  <line x1=\"10\" y1=\"120\" x2=\"260\" y2=\"120\" stroke=\"#bbb\" stroke-width=\"1\"/>\n  <line x1=\"130\" y1=\"165\" x2=\"130\" y2=\"10\" stroke=\"#bbb\" stroke-width=\"1\"/>\n  <text x=\"263\" y=\"123\" font-size=\"10\" fill=\"#888\">x</text><text x=\"133\" y=\"10\" font-size=\"10\" fill=\"#888\">y</text>\n  <line x1=\"130\" y1=\"120\" x2=\"195\" y2=\"120\" stroke=\"#3498db\" stroke-width=\"2.5\" marker-end=\"url(#va)\"/>\n  <text x=\"165\" y=\"113\" font-size=\"9\" fill=\"#3498db\">A: 30N (0&#xB0;)</text>\n  <line x1=\"130\" y1=\"120\" x2=\"149\" y2=\"30\" stroke=\"#e74c3c\" stroke-width=\"2.5\" marker-end=\"url(#vb)\"/>\n  <text x=\"153\" y=\"72\" font-size=\"9\" fill=\"#e74c3c\">B: 55N (80&#xB0;)</text>\n  <line x1=\"130\" y1=\"120\" x2=\"78\" y2=\"163\" stroke=\"#e67e22\" stroke-width=\"2.5\" marker-end=\"url(#vc)\"/>\n  <text x=\"55\" y=\"160\" font-size=\"9\" fill=\"#e67e22\">C: 30N (210&#xB0;)</text>\n  <line x1=\"130\" y1=\"120\" x2=\"158\" y2=\"46\" stroke=\"#27ae60\" stroke-width=\"2\" stroke-dasharray=\"5,3\" marker-end=\"url(#vr)\"/>\n  <text x=\"163\" y=\"42\" font-size=\"10\" fill=\"#27ae60\" font-weight=\"bold\">R &#x2248; 70.88&#xB0;</text></svg></div><strong>Correct Answer: B. 70.88°</strong><br>\\[ \\Sigma X = 30\\cos(0°) + 55\\cos(80°) + 30\\cos(210°) = 30 + 9.55 - 25.98 = 13.57 \\]\\[ \\Sigma Y = 30\\sin(0°) + 55\\sin(80°) + 30\\sin(210°) = 0 + 54.16 - 15 = 39.16 \\]\\[ \\theta = \\arctan\\!\\left(\\frac{39.16}{13.57}\\right) = \\arctan(2.885) \\approx \\mathbf{70.88°} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>82.34°:</strong> Using ΣX=9.55 only (forgetting Force A's component) in the arctan calculation.</li><li><strong>66.33°:</strong> Using sin(80°)=0.940 instead of 0.9848: ΣY=0+51.7-15=36.7; arctan(36.7/13.57)≈69.7°.</li><li><strong>43.58°:</strong> Using ΣX and ΣY swapped in the arctan formula.</li></ul>"}, {"q": "25. 1 bar = _____ psi", "opts": ["A. 4.79", "B. 14.70", "C. 12.89", "D. 14.50"], "ans": 3, "info": "<strong>Correct Answer: D. 14.50 psi</strong><br>\\[1\\text{ bar} \\approx 14.5038\\text{ psi}\\]Important distinction: 1 <strong>Atmosphere (atm)</strong> = 14.70 psi (different unit).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>4.79:</strong> This is roughly 1 bar in inHg (inches of mercury), not psi.</li><li><strong>14.70:</strong> This is 1 standard Atmosphere (atm), not 1 bar. 1 atm = 101.325 kPa; 1 bar = 100 kPa. Close but different.</li><li><strong>12.89:</strong> Not a standard conversion for any common pressure unit to psi.</li></ul>"}, {"q": "26. A lift station serving 500 people pumped 700 gpm of wastewater, working 12 hours/day. What is the per capita daily wastewater?", "opts": ["A. 4502 L/d", "B. 815 L/d", "C. 3810 L/d", "D. 512 L/d"], "ans": 2, "info": "<strong>Correct Answer: C. 3810 L/d</strong><br>Total flow: \\(700 \\times 60 \\times 12 = 504{,}000\\text{ gal/day}\\)<br>Per capita: \\(\\dfrac{504{,}000}{500} = 1{,}008\\text{ gal/cap/day}\\)<br>\\[ 1{,}008 \\times 3.7854 \\approx \\mathbf{3{,}815\\text{ L/cap/day}} \\approx 3{,}810\\text{ L/d} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>4502 L/d:</strong> Using 24 hours/day instead of 12: 700×60×24/500×3.785≈7,630 L — then half that for an error variant.</li><li><strong>815 L/d:</strong> Dividing by 500 before multiplying by hours: 700×3.785/500×12=... incorrect operation order.</li><li><strong>512 L/d:</strong> Using 700×12/(500×3.785)=700×12/1892.5≈4.4 gal then converting incorrectly.</li></ul>"}, {"q": "27. A formal organization of producers forming a perfect collusion to increase profit and block newcomers.", "opts": ["A. Monopoly", "B. Cartel", "C. Perfect Competition", "D. Corporation"], "ans": 1, "info": "<strong>Correct Answer: B. Cartel</strong><br>A Cartel is a formal agreement among competing firms to coordinate production, fix prices, and restrict competition — a form of perfect collusion.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Monopoly:</strong> A single firm controls an entire market. Cartels involve multiple competing firms acting together — not a single seller.</li><li><strong>Perfect Competition:</strong> A market structure with many sellers, no barriers to entry, and no price control — the opposite of a cartel.</li><li><strong>Corporation:</strong> A legal business entity. Corporations can be cartel members, but a corporation itself is not a cartel.</li></ul>"}, {"q": "28. SI unit of power", "opts": ["A. Watt", "B. Joule", "C. Erg", "D. HP"], "ans": 0, "info": "<strong>Correct Answer: A. Watt</strong><br>\\[1\\text{ W} = 1\\frac{\\text{J}}{\\text{s}} = 1\\frac{\\text{kg} \\cdot \\text{m}^2}{\\text{s}^3}\\]The Watt is the SI unit of power — the rate at which energy is transferred or work is done.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Joule:</strong> The SI unit of energy or work — not power. Power = Joules per second.</li><li><strong>Erg:</strong> A CGS (non-SI) unit of energy. 1 J = 10⁷ ergs. Not the SI unit of power.</li><li><strong>HP:</strong> Horsepower — an imperial/non-SI unit of power. 1 HP ≈ 746 W.</li></ul>"}, {"q": "29. A pipe has a diameter of 50 inches and a length of 100 m. What is its volume capacity in gallons?", "opts": ["A. 35,552 gal", "B. 33,454 gal", "C. 49,871 gal", "D. 52,568 gal"], "ans": 1, "info": "<strong>Correct Answer: B. 33,454 gal</strong><br>Convert diameter: \\(50 \\times 0.0254 = 1.27\\text{ m}\\), radius = 0.635 m<br>\\[ V = \\pi r^2 h = \\pi (0.635)^2 \\times 100 \\approx 126.68\\text{ m}^3 \\]\\[ 126.68 \\times 264.172\\text{ gal/m}^3 \\approx \\mathbf{33{,}464\\text{ gal}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>35,552 gal:</strong> Using diameter as radius: r=1.27m → V=π(1.27)²×100=507m³ → ×264=133,942/4≈33,486. Or slight r-error.</li><li><strong>49,871 gal:</strong> Using r=0.635m but converting with 1 m³=394 gal instead of 264.172.</li><li><strong>52,568 gal:</strong> Using diameter directly in the radius position: V=π(1.27)²×100=507m³, ×264=133,936. Ignoring the /4.</li></ul>"}, {"q": "30. What is the fluid density if pipe diameter = 0.6 m, velocity = 14.14 m/s, and mass flow rate = 5 kg/s?", "opts": ["A. 1.55 kg/m³", "B. 1.95 kg/m³", "C. 1.25 kg/m³", "D. 1.35 kg/m³"], "ans": 2, "info": "<strong>Correct Answer: C. 1.25 kg/m³</strong><br>Mass flow rate: \\(\\dot{m} = \\rho \\cdot A \\cdot V\\)<br>\\[ A = \\pi(0.3)^2 \\approx 0.2827\\text{ m}^2 \\]\\[ 5 = \\rho \\times 0.2827 \\times 14.14 \\implies \\rho = \\frac{5}{3.997} \\approx \\mathbf{1.25\\text{ kg/m}^3} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>1.55 kg/m³:</strong> Using A=π(0.6)²=1.131 (diameter as radius): ρ=5/(1.131×14.14)≈0.313. Or another r-error variant.</li><li><strong>1.95 kg/m³:</strong> Using V=12.14 instead of 14.14 m/s: ρ=5/(0.2827×12.14)≈1.456.</li><li><strong>1.35 kg/m³:</strong> Using A=π(0.3)²=0.2827 but V=13.14: ρ=5/(0.2827×13.14)≈1.35.</li></ul>"}, {"q": "31. Find the current of an electrical circuit with resistance of 100 Ω and voltage supply of 10 Volts.", "opts": ["A. 1 A", "B. 1000 A", "C. 10 A", "D. 0.1 A"], "ans": 3, "info": "<strong>Correct Answer: D. 0.1 A</strong><br>Ohm's Law: \\(V = I \\times R\\)<br>\\[ 10 = I \\times 100 \\implies I = \\frac{10}{100} = \\mathbf{0.1\\text{ A}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>1 A:</strong> Dividing R by V: 100/10=10, then taking reciprocal=0.1 (correct) — or using wrong formula I=V/R² = 10/100=0.1... confusingly close.</li><li><strong>1000 A:</strong> Multiplying V×R instead of dividing: 10×100=1000.</li><li><strong>10 A:</strong> Setting I=V: 10 Amps when V=10 Volts — ignoring resistance entirely.</li></ul>"}, {"q": "32. You need a 75 mm diameter pipe but only have 25 mm pipes. How many 25 mm pipes are needed?", "opts": ["A. 3", "B. 12", "C. 9", "D. 5"], "ans": 2, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 285 172\" style=\"width:100%;max-width:285px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"65\" cy=\"90\" r=\"55\" fill=\"#eef7fd\" stroke=\"#3498db\" stroke-width=\"2.5\"/>\n  <text x=\"65\" y=\"157\" font-size=\"11\" fill=\"#3498db\" text-anchor=\"middle\" font-weight=\"bold\">&#x2300; 75 mm</text>\n  <text x=\"148\" y=\"90\" font-size=\"20\" fill=\"#555\" text-anchor=\"middle\">=</text>\n  <circle cx=\"188\" cy=\"38\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"222\" cy=\"38\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"256\" cy=\"38\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"188\" cy=\"75\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"222\" cy=\"75\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"256\" cy=\"75\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"188\" cy=\"112\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"222\" cy=\"112\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <circle cx=\"256\" cy=\"112\" r=\"15\" fill=\"#fdeaea\" stroke=\"#e74c3c\" stroke-width=\"1.5\"/>\n  <text x=\"222\" y=\"147\" font-size=\"11\" fill=\"#e74c3c\" text-anchor=\"middle\" font-weight=\"bold\">9 &#xD7; &#x2300; 25 mm</text>\n  <text x=\"222\" y=\"162\" font-size=\"10\" fill=\"#27ae60\" text-anchor=\"middle\">(75/25)&#xB2; = 9 pipes</text></svg></div><strong>Correct Answer: C. 9 pipes</strong><br>Pipe capacity depends on cross-sectional <em>area</em>, not just diameter.<br>\\[ \\text{Ratio} = \\left(\\frac{75}{25}\\right)^2 = (3)^2 = \\mathbf{9} \\]It takes 9 pipes of 25 mm to equal the area of one 75 mm pipe.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>3:</strong> Simply dividing diameters without squaring: 75/25=3. Forgetting that area scales with the square of diameter.</li><li><strong>12:</strong> Using (75/25)²=9 then adding 3 more, or using area ratio with wrong π calculation.</li><li><strong>5:</strong> Confusing radius ratio with area ratio: (37.5/12.5)²=9, but using 5 from some intermediate step.</li></ul>"}, {"q": "33. Kyungsoo wants to receive PhP 2,000 at every end of the month for 5 years. Interest is 6% compounded monthly. How much to deposit today?", "opts": ["A. PhP 102,113", "B. PhP 113,002", "C. PhP 105,323", "D. PhP 103,452"], "ans": 3, "info": "<strong>Correct Answer: D. PhP 103,452</strong><br>Present Value of Ordinary Annuity:<br>\\[ P = A \\times \\left[\\frac{1-(1+i)^{-n}}{i}\\right] \\]Monthly rate: \\(i = 0.06/12 = 0.005\\), periods: \\(n = 5 \\times 12 = 60\\)<br>\\[ P = 2{,}000 \\times \\frac{1-(1.005)^{-60}}{0.005} = 2{,}000 \\times 51.726 \\approx \\mathbf{PhP\\ 103{,}452} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 102,113:</strong> Using i=0.0052 or n=59 periods — small rounding/off-by-one error in the setup.</li><li><strong>PhP 113,002:</strong> Using annuity due formula (×(1+i)) instead of ordinary annuity: 103,452×1.005²≈... different multiplier.</li><li><strong>PhP 105,323:</strong> Using (1.005)⁻⁶⁰=0.7414 instead of the correct 0.74137, slight table-lookup error.</li></ul>"}, {"q": "34. How many feet can 10 HP raise a weight of 50 lbs within one hour?", "opts": ["A. 120 feet", "B. 12,000 feet", "C. 396,000 feet", "D. 36,900 feet"], "ans": 2, "info": "<strong>Correct Answer: C. 396,000 feet</strong><br>Standard: \\(1\\text{ HP} = 33{,}000\\text{ ft-lb/min}\\)<br>Total work in 60 minutes: \\(10 \\times 33{,}000 \\times 60 = 19{,}800{,}000\\text{ ft-lb}\\)<br>\\[ d = \\frac{\\text{Work}}{\\text{Force}} = \\frac{19{,}800{,}000}{50} = \\mathbf{396{,}000\\text{ ft}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>120 feet:</strong> Using 1 HP=33,000 ft-lb/min but not multiplying by 60 minutes: 10×33,000/50=6,600 — or other error.</li><li><strong>12,000 feet:</strong> Using 1 HP=1000 ft-lb/min (wrong value): 10×1000×60/50=12,000.</li><li><strong>36,900 feet:</strong> Using 1 HP=3085 ft-lb/min (wrong): 10×3085×60/50=37,020≈36,900.</li></ul>"}, {"q": "35. Grand total of the assets and operational capability of a corporation.", "opts": ["A. Authorized capital", "B. Issued capital", "C. Subscribed capital", "D. Paid-up capital"], "ans": 0, "info": "<strong>Correct Answer: A. Authorized capital</strong><br>Authorized capital is the maximum amount of share capital that a company is authorized to issue, representing the maximum ceiling of its financial and operational capacity.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Issued capital:</strong> The portion of authorized capital that has actually been issued to shareholders. Always ≤ authorized capital.</li><li><strong>Subscribed capital:</strong> The portion of issued capital that investors have agreed (subscribed) to pay for. Always ≤ issued capital.</li><li><strong>Paid-up capital:</strong> The portion of subscribed capital that shareholders have actually paid. Always ≤ subscribed capital.</li></ul>"}, {"q": "36. An equipment costs PhP 300,000, with a salvage value of PhP 30,000. Annual depreciation is PhP 20,000. Find the useful life.", "opts": ["A. 13.5 years", "B. 14.5 years", "C. 13 years", "D. 15 years"], "ans": 0, "info": "<strong>Correct Answer: A. 13.5 years</strong><br>Straight Line Depreciation: \\(\\text{Annual Dep.} = \\dfrac{\\text{Cost} - \\text{Salvage}}{\\text{Useful Life}}\\)<br>\\[ 20{,}000 = \\frac{300{,}000 - 30{,}000}{\\text{Useful Life}} = \\frac{270{,}000}{\\text{Useful Life}} \\]\\[ \\text{Useful Life} = \\frac{270{,}000}{20{,}000} = \\mathbf{13.5\\text{ years}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>14.5 years:</strong> Using cost only without salvage: 300,000/20,000=15 — then subtracting a wrong adjustment.</li><li><strong>13 years:</strong> Rounding down from 13.5, or using salvage value of ₱40,000: 260,000/20,000=13.</li><li><strong>15 years:</strong> Using cost only without subtracting salvage: 300,000/20,000=15.</li></ul>"}, {"q": "37. Which of the following is the equivalent of 1 Ampere?", "opts": ["A. 1 Volt per Ampere", "B. 1 Coulomb per second", "C. 1 Ampere per Coulomb", "D. 1 Joule per Coulomb"], "ans": 1, "info": "<strong>Correct Answer: B. 1 Coulomb per second</strong><br>\\[1\\text{ A} = 1\\frac{\\text{C}}{\\text{s}}\\]An Ampere is the base SI unit of electric current, defined as the flow of 1 Coulomb of charge per second.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>1 Volt per Ampere:</strong> V/A = Ohm (Ω) — the unit of electrical resistance, not current.</li><li><strong>1 Ampere per Coulomb:</strong> A/C has no standard meaning in SI. An Ampere is defined as C/s, not A/C.</li><li><strong>1 Joule per Coulomb:</strong> J/C = Volt (V) — the unit of electric potential or voltage, not current.</li></ul>"}, {"q": "38. A truck was bought for PhP 2,500,000. Salvage value after 10 years is PhP 500,000. Find the book value after 3 years (Straight Line Method).", "opts": ["A. PhP 1,720,000", "B. PhP 600,000", "C. PhP 1,900,000", "D. PhP 1,850,000"], "ans": 2, "info": "<strong>Correct Answer: C. PhP 1,900,000</strong><br>Annual depreciation: \\(\\dfrac{2{,}500{,}000 - 500{,}000}{10} = 200{,}000\\text{/year}\\)<br>After 3 years: Total depreciation \\(= 3 \\times 200{,}000 = 600{,}000\\)<br>\\[ \\text{Book Value} = 2{,}500{,}000 - 600{,}000 = \\mathbf{PhP\\ 1{,}900{,}000} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PhP 1,720,000:</strong> Using n=4 years: 2,500,000-4×200,000=1,700,000. Or wrong annual depreciation.</li><li><strong>PhP 600,000:</strong> This is the accumulated depreciation after 3 years — not the book value.</li><li><strong>PhP 1,850,000:</strong> Using annual depreciation of ₱216,667 (3-year useful life): 2,500,000/3×... misreading the problem.</li></ul>"}, {"q": "39. James runs at 4 m/s and Carl at 2.5 m/s. Carl starts 15 m ahead. After how many seconds will James catch up?", "opts": ["A. 15 seconds", "B. 20 seconds", "C. 12 seconds", "D. 10 seconds"], "ans": 3, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 265 175\" style=\"width:100%;max-width:265px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><line x1=\"20\" y1=\"100\" x2=\"255\" y2=\"100\" stroke=\"#bbb\" stroke-width=\"2\"/>\n  <circle cx=\"60\" cy=\"100\" r=\"9\" fill=\"#3498db\"/><text x=\"60\" y=\"88\" font-size=\"10\" fill=\"#3498db\" text-anchor=\"middle\">James</text>\n  <text x=\"60\" y=\"120\" font-size=\"9\" fill=\"#3498db\" text-anchor=\"middle\">4 m/s &#x2192;</text>\n  <circle cx=\"130\" cy=\"100\" r=\"9\" fill=\"#e74c3c\"/><text x=\"130\" y=\"88\" font-size=\"10\" fill=\"#e74c3c\" text-anchor=\"middle\">Carl</text>\n  <text x=\"130\" y=\"120\" font-size=\"9\" fill=\"#e74c3c\" text-anchor=\"middle\">2.5 m/s &#x2192;</text>\n  <line x1=\"69\" y1=\"100\" x2=\"121\" y2=\"100\" stroke=\"#888\" stroke-width=\"1.5\" stroke-dasharray=\"4,2\"/>\n  <text x=\"95\" y=\"94\" font-size=\"10\" fill=\"#555\" text-anchor=\"middle\">15 m</text>\n  <circle cx=\"195\" cy=\"100\" r=\"7\" fill=\"#27ae60\"/>\n  <text x=\"195\" y=\"80\" font-size=\"11\" fill=\"#27ae60\" text-anchor=\"middle\" font-weight=\"bold\">Meet!</text>\n  <text x=\"195\" y=\"68\" font-size=\"9\" fill=\"#27ae60\" text-anchor=\"middle\">t = 10 s</text>\n  <text x=\"137\" y=\"150\" font-size=\"10\" fill=\"#2c3e50\" text-anchor=\"middle\">Rel. speed = 4 &#x2212; 2.5 = 1.5 m/s</text>\n  <text x=\"137\" y=\"163\" font-size=\"10\" fill=\"#2c3e50\" text-anchor=\"middle\">Time = 15 m &#xF7; 1.5 m/s = 10 s</text></svg></div><strong>Correct Answer: D. 10 seconds</strong><br>Relative closing speed: \\(4 - 2.5 = 1.5\\text{ m/s}\\)<br>\\[ t = \\frac{\\text{head start}}{\\text{relative speed}} = \\frac{15}{1.5} = \\mathbf{10\\text{ seconds}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>15 seconds:</strong> Dividing head start by James's speed only: 15/1=15. Not accounting for Carl still moving.</li><li><strong>20 seconds:</strong> Dividing 15 by 0.75 (average of the two speeds) or using another wrong denominator.</li><li><strong>12 seconds:</strong> Using relative speed = 4-2.5=1.25 (rounding error): 15/1.25=12.</li></ul>"}, {"q": "40. Two events are _____ if the occurrence of one does not affect the probability of the other.", "opts": ["A. Independent", "B. Dependent", "C. Factorial", "D. Probable"], "ans": 0, "info": "<strong>Correct Answer: A. Independent</strong><br>Independent events: the outcome of the first event has zero mathematical impact on the probability of the second. Example: flipping a coin and rolling a die.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Dependent:</strong> Events where one outcome affects the probability of the other. Example: drawing cards without replacement.</li><li><strong>Factorial:</strong> A mathematical operation (n!) — not a type of event relationship.</li><li><strong>Probable:</strong> Means having probability of occurrence — describes a likelihood, not the relationship between events.</li></ul>"}, {"q": "41. A series of regular payments made at the end of each period, such as monthly or quarterly.", "opts": ["A. Annuity Due", "B. Perpetuity annuity", "C. Ordinary annuity", "D. Deferred annuity"], "ans": 2, "info": "<strong>Correct Answer: C. Ordinary annuity</strong><br>An ordinary annuity has payments at the END of each period (like a standard mortgage). If payments were at the START, it would be an Annuity Due.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Annuity Due:</strong> Payments at the BEGINNING of each period (e.g., rent paid at the start of the month). Opposite of ordinary annuity.</li><li><strong>Perpetuity annuity:</strong> Payments that continue forever with no end date — different from a finite ordinary annuity.</li><li><strong>Deferred annuity:</strong> An annuity where payments begin at some future date (delayed start), not at the current period.</li></ul>"}, {"q": "42. Kinematic viscosity in SI derivative units is described as _____.", "opts": ["A. Watt meter Kelvin", "B. Newton meter", "C. Square meter per second", "D. Pascal second"], "ans": 2, "info": "<strong>Correct Answer: C. Square meter per second (m²/s)</strong><br>Kinematic viscosity \\((\\nu)\\) = Dynamic viscosity ÷ Density. In SI: \\[\\nu = \\frac{\\mu}{\\rho} \\implies \\frac{\\text{Pa}\\cdot\\text{s}}{\\text{kg/m}^3} = \\frac{\\text{m}^2}{\\text{s}}\\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Watt meter Kelvin:</strong> W·m·K — a unit of thermal conductivity. Unrelated to viscosity.</li><li><strong>Newton meter:</strong> N·m = Joule (energy/torque). Not a unit of viscosity.</li><li><strong>Pascal second:</strong> Pa·s = N·s/m² — this is the unit of dynamic viscosity (μ), not kinematic viscosity (ν).</li></ul>"}, {"q": "43. PhP 50,000 invested at 5% compounded continuously for 5 years. What is the amount after 5 years?", "opts": ["A. 72,554", "B. 65,207", "C. 64,201", "D. 76,887"], "ans": 2, "info": "<strong>Correct Answer: C. PhP 64,201</strong><br>Continuous compounding: \\(F = Pe^{rt}\\)<br>With \\(P=50{,}000,\\ r=0.05,\\ t=5\\):<br>\\[ F = 50{,}000 \\times e^{0.05 \\times 5} = 50{,}000 \\times e^{0.25} \\approx 50{,}000 \\times 1.2840 = \\mathbf{PhP\\ 64{,}201} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>72,554:</strong> Using e^(0.05×7)=e^0.35≈1.419: 50,000×1.419=70,982. Or using r=0.07.</li><li><strong>65,207:</strong> Using e^(0.05×5)=e^0.26≈1.297 (wrong e^0.25 value) or r=0.052.</li><li><strong>76,887:</strong> Using r=0.08 or t=7 in the continuous compounding formula.</li></ul>"}, {"q": "44. Section A of a pipe is 3\" diameter, water flow velocity = 4 m/s. In Section B, velocity is doubled. Find the area of pipe in Section B.", "opts": ["A. 2.46 sq.in", "B. 3.53 sq.in", "C. 5.66 sq.in", "D. 7.45 sq.in"], "ans": 1, "info": "<strong>Correct Answer: B. 3.53 sq.in</strong><br>Continuity equation: \\(A_1 V_1 = A_2 V_2\\)<br>If \\(V_2 = 2V_1\\), then \\(A_2 = A_1/2\\)<br>\\[ A_1 = \\pi r^2 = \\pi (1.5)^2 = 7.069\\text{ sq.in} \\]\\[ A_2 = \\frac{7.069}{2} \\approx \\mathbf{3.53\\text{ sq.in}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>2.46 sq.in:</strong> Halving the diameter instead of the area: new d=1.5\", r=0.75\", A=π(0.75)²=1.77 sq.in.</li><li><strong>5.66 sq.in:</strong> Using diameter 3\" but r=1.5 with ×(some factor): π(1.5)²×0.8=5.65.</li><li><strong>7.45 sq.in:</strong> Using the original area of Section A — forgetting that velocity doubled means area must halve.</li></ul>"}, {"q": "45. A 300 kN force is directed 30° North of East. Find its x and y components.", "opts": ["A. 273.2 kN; 144 kN", "B. 266.2 kN; 121 kN", "C. 259.8 kN; 150 kN", "D. 259.3 kN; 139 kN"], "ans": 2, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 265 175\" style=\"width:100%;max-width:265px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><defs><marker id=\"cx\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#3498db\"/></marker>\n  <marker id=\"cy\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#27ae60\"/></marker>\n  <marker id=\"cf\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#e74c3c\"/></marker></defs>\n  <line x1=\"25\" y1=\"145\" x2=\"250\" y2=\"145\" stroke=\"#bbb\" stroke-width=\"1.5\"/>\n  <line x1=\"25\" y1=\"145\" x2=\"25\" y2=\"15\" stroke=\"#bbb\" stroke-width=\"1.5\"/>\n  <text x=\"253\" y=\"148\" font-size=\"10\" fill=\"#888\">x</text><text x=\"28\" y=\"12\" font-size=\"10\" fill=\"#888\">y</text>\n  <line x1=\"25\" y1=\"145\" x2=\"215\" y2=\"145\" stroke=\"#3498db\" stroke-width=\"2.5\" marker-end=\"url(#cx)\"/>\n  <text x=\"120\" y=\"162\" font-size=\"11\" fill=\"#3498db\" text-anchor=\"middle\" font-weight=\"bold\">X = 259.8 kN</text>\n  <line x1=\"215\" y1=\"145\" x2=\"215\" y2=\"55\" stroke=\"#27ae60\" stroke-width=\"2.5\" marker-end=\"url(#cy)\"/>\n  <text x=\"240\" y=\"105\" font-size=\"10\" fill=\"#27ae60\">Y = 150 kN</text>\n  <line x1=\"25\" y1=\"145\" x2=\"215\" y2=\"55\" stroke=\"#e74c3c\" stroke-width=\"2.5\" marker-end=\"url(#cf)\"/>\n  <text x=\"92\" y=\"87\" font-size=\"11\" fill=\"#e74c3c\" font-weight=\"bold\">300 kN</text>\n  <path d=\"M 68 145 A 43 43 0 0 1 62 108\" fill=\"none\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"78\" y=\"128\" font-size=\"10\" fill=\"#555\">30&#xB0;</text></svg></div><strong>Correct Answer: C. 259.8 kN; 150 kN</strong><br>\\[ X = 300\\cos(30°) = 300 \\times 0.866 = \\mathbf{259.8\\text{ kN}} \\]\\[ Y = 300\\sin(30°) = 300 \\times 0.5 = \\mathbf{150\\text{ kN}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>273.2 kN; 144 kN:</strong> Using cos(30°)=0.9107 and sin(30°)=0.48 — incorrect trig values.</li><li><strong>266.2 kN; 121 kN:</strong> Using cos(27°)≈0.891 and sin(27°)≈0.454 — wrong angle.</li><li><strong>259.3 kN; 139 kN:</strong> Using 30° but sin(30°)=0.463 — rounding error on the sine value.</li></ul>"}, {"q": "46. A car has constant acceleration of 4 m/s², starting from rest. How far has it traveled after 5 seconds?", "opts": ["A. 60 m", "B. 80 m", "C. 70 m", "D. 50 m"], "ans": 3, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 265 175\" style=\"width:100%;max-width:265px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"15\" y=\"80\" width=\"75\" height=\"65\" fill=\"#d6eaf8\" stroke=\"#3498db\" stroke-width=\"2\" rx=\"3\"/>\n  <text x=\"52\" y=\"108\" font-size=\"10\" fill=\"#3498db\" text-anchor=\"middle\">Reservoir</text>\n  <text x=\"52\" y=\"122\" font-size=\"9\" fill=\"#3498db\" text-anchor=\"middle\">depth = 20 m</text>\n  <line x1=\"90\" y1=\"105\" x2=\"135\" y2=\"105\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <rect x=\"135\" y=\"93\" width=\"30\" height=\"24\" fill=\"#f39c12\" stroke=\"#e67e22\" stroke-width=\"2\" rx=\"3\"/>\n  <text x=\"150\" y=\"108\" font-size=\"8\" fill=\"#fff\" text-anchor=\"middle\" font-weight=\"bold\">PUMP</text>\n  <line x1=\"165\" y1=\"105\" x2=\"205\" y2=\"105\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"205\" y1=\"105\" x2=\"205\" y2=\"35\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"205\" y1=\"35\" x2=\"250\" y2=\"35\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"200\" y1=\"105\" x2=\"210\" y2=\"105\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"200\" y1=\"35\" x2=\"210\" y2=\"35\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"207\" y1=\"35\" x2=\"207\" y2=\"105\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"3,2\"/>\n  <text x=\"218\" y=\"74\" font-size=\"10\" fill=\"#e74c3c\">H = 25 m</text>\n  <text x=\"218\" y=\"87\" font-size=\"9\" fill=\"#888\">(20+5 m)</text>\n  <text x=\"137\" y=\"148\" font-size=\"10\" fill=\"#27ae60\" text-anchor=\"middle\">P = &#x3C1;gQH/&#x3B7; &#x2248; 10.51 kW</text>\n  <text x=\"137\" y=\"163\" font-size=\"9\" fill=\"#888\" text-anchor=\"middle\">Q=0.03 m&#xB3;/s, &#x3B7;=70%</text></svg></div><strong>Correct Answer: D. 50 m</strong><br>Kinematics formula (starting from rest, \\(v_0=0\\)):<br>\\[ d = \\frac{1}{2}at^2 = \\frac{1}{2} \\times 4 \\times (5)^2 = 2 \\times 25 = \\mathbf{50\\text{ m}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>60 m:</strong> Using d=at²/2 but with t²=30 instead of 25, or a=4.8.</li><li><strong>80 m:</strong> Forgetting the ½ factor: d=a×t²=4×25=100, then half=50. Or d=4×5²=100/... error.</li><li><strong>70 m:</strong> Using d=v×t with v=a×t=20 m/s: d=20×5=100 — or d=(0+20)/2×7=70.</li></ul>"}, {"q": "47. What is the pipe diameter if the mass flow rate is 3,992 kg/s and the flow velocity is 3 m/s? (Water density = 1000 kg/m³)", "opts": ["A. 1.303 m", "B. 1.343 m", "C. 1.272 m", "D. 1.434 m"], "ans": 0, "info": "<strong>Correct Answer: A. 1.303 m</strong><br>\\(\\dot{m} = \\rho \\cdot A \\cdot V\\)<br>\\[ 3{,}992 = 1000 \\times A \\times 3 \\implies A = \\frac{3{,}992}{3{,}000} \\approx 1.3307\\text{ m}^2 \\]Solve for diameter using \\(A = \\dfrac{\\pi d^2}{4}\\):<br>\\[ d = \\sqrt{\\frac{4A}{\\pi}} = \\sqrt{\\frac{4 \\times 1.3307}{\\pi}} = \\sqrt{1.694} \\approx \\mathbf{1.303\\text{ m}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>1.343 m:</strong> Solving d=√(A/π): √(1.3307/3.1416)=√0.4236=0.651m × 2 = 1.302... rounding to 1.343 — wrong formula.</li><li><strong>1.272 m:</strong> Using A=1.2732: d=√(4×1.2732/π)=√1.622≈1.274 — slight mass flow error.</li><li><strong>1.434 m:</strong> Using velocity=2.5 m/s instead of 3: A=3992/2500=1.597, d=√(4×1.597/π)=√2.034≈1.426.</li></ul>"}, {"q": "48. A submersible pump drains 30 L/s from a 20 m reservoir. Friction losses = 5 m. Pump efficiency = 70%. What is the required motor power?", "opts": ["A. 11.30 kW", "B. 8.17 kW", "C. 10.51 kW", "D. 12.11 kW"], "ans": 2, "info": "<div style=\"text-align:center;margin:10px 0\"><svg viewBox=\"0 0 265 175\" style=\"width:100%;max-width:265px;border-radius:8px;background:#fff;border:1px solid #e0e0e0\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"15\" y=\"80\" width=\"75\" height=\"65\" fill=\"#d6eaf8\" stroke=\"#3498db\" stroke-width=\"2\" rx=\"3\"/>\n  <text x=\"52\" y=\"108\" font-size=\"10\" fill=\"#3498db\" text-anchor=\"middle\">Reservoir</text>\n  <text x=\"52\" y=\"122\" font-size=\"9\" fill=\"#3498db\" text-anchor=\"middle\">depth = 20 m</text>\n  <line x1=\"90\" y1=\"105\" x2=\"135\" y2=\"105\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <rect x=\"135\" y=\"93\" width=\"30\" height=\"24\" fill=\"#f39c12\" stroke=\"#e67e22\" stroke-width=\"2\" rx=\"3\"/>\n  <text x=\"150\" y=\"108\" font-size=\"8\" fill=\"#fff\" text-anchor=\"middle\" font-weight=\"bold\">PUMP</text>\n  <line x1=\"165\" y1=\"105\" x2=\"205\" y2=\"105\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"205\" y1=\"105\" x2=\"205\" y2=\"35\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"205\" y1=\"35\" x2=\"250\" y2=\"35\" stroke=\"#2c3e50\" stroke-width=\"2\"/>\n  <line x1=\"200\" y1=\"105\" x2=\"210\" y2=\"105\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"200\" y1=\"35\" x2=\"210\" y2=\"35\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"207\" y1=\"35\" x2=\"207\" y2=\"105\" stroke=\"#555\" stroke-width=\"1\" stroke-dasharray=\"3,2\"/>\n  <text x=\"218\" y=\"74\" font-size=\"10\" fill=\"#e74c3c\">H = 25 m</text>\n  <text x=\"218\" y=\"87\" font-size=\"9\" fill=\"#888\">(20+5 m)</text>\n  <text x=\"137\" y=\"148\" font-size=\"10\" fill=\"#27ae60\" text-anchor=\"middle\">P = &#x3C1;gQH/&#x3B7; &#x2248; 10.51 kW</text>\n  <text x=\"137\" y=\"163\" font-size=\"9\" fill=\"#888\" text-anchor=\"middle\">Q=0.03 m&#xB3;/s, &#x3B7;=70%</text></svg></div><strong>Correct Answer: C. 10.51 kW</strong><br>Total head: \\(H = 20 + 5 = 25\\text{ m}\\)<br>Flow rate: \\(Q = 30\\text{ L/s} = 0.03\\text{ m}^3/\\text{s}\\)<br>Water power: \\(P_{water} = \\rho g Q H = 1000 \\times 9.81 \\times 0.03 \\times 25 = 7{,}357.5\\text{ W}\\)<br>\\[ P_{motor} = \\frac{P_{water}}{\\eta} = \\frac{7{,}357.5}{0.70} \\approx \\mathbf{10{,}511\\text{ W} = 10.51\\text{ kW}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>11.30 kW:</strong> Using H=27 m (adding extra loss) or efficiency=65%: 7357.5/0.65≈11,319.</li><li><strong>8.17 kW:</strong> Using H=20 m only (ignoring friction losses): 1000×9.81×0.03×20/0.70=8,409W.</li><li><strong>12.11 kW:</strong> Using efficiency=60.7%: 7357.5/0.607≈12,121W — wrong efficiency value.</li></ul>"}, {"q": "49. A car starts from rest with constant acceleration of 3 fps². Find the average velocity during the first 10 seconds.", "opts": ["A. 18 fps", "B. 7 fps", "C. 15 fps", "D. 12 fps"], "ans": 2, "info": "<strong>Correct Answer: C. 15 fps</strong><br>Final velocity: \\(V_f = a \\times t = 3 \\times 10 = 30\\text{ fps}\\)<br>Starting from rest: \\(V_0 = 0\\)<br>\\[ V_{avg} = \\frac{V_0 + V_f}{2} = \\frac{0 + 30}{2} = \\mathbf{15\\text{ fps}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>18 fps:</strong> Using Vavg=a×t×0.6=3×10×0.6=18 — incorrect weighting factor.</li><li><strong>7 fps:</strong> Using Vavg=a×t/4=30/4=7.5≈7 — wrong divisor.</li><li><strong>12 fps:</strong> Using Vavg=a×t/2.5=30/2.5=12 — incorrect denominator.</li></ul>"}, {"q": "50. A certain equipment exerted 900 W while doing 17,000 J of work. How long did it operate?", "opts": ["A. 19.3 s", "B. 21.2 s", "C. 17.2 s", "D. 18.9 s"], "ans": 3, "info": "<strong>Correct Answer: D. 18.9 s</strong><br>Power formula: \\(\\text{Power} = \\dfrac{\\text{Work}}{\\text{Time}}\\)<br>\\[ t = \\frac{\\text{Work}}{\\text{Power}} = \\frac{17{,}000}{900} \\approx \\mathbf{18.89\\text{ s} \\approx 18.9\\text{ s}} \\]", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Why Others Are Wrong:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>19.3 s:</strong> Using Work=17,400 J or Power=900/1.02: slight numerator/denominator error.</li><li><strong>21.2 s:</strong> Dividing Power by Work: 900/17,000×... or using t=W/P with W=19,000.</li><li><strong>17.2 s:</strong> Using Power=990 W: 17,000/990=17.17≈17.2 — wrong power value.</li></ul>"}];

    let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let timerInterval = null;
    let timeLeft = 0;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');

    const startMenuHTML = `
        <div id="start-menu" style="text-align:center;padding:20px 0;">
            <h2 style="color:var(--primary);margin-bottom:10px;">Weekly Test 5</h2>
            <p style="color:#7f8c8d;margin-bottom:30px;font-size:0.95rem;">Advanced Fluid Mechanics, Economics &amp; Computations</p>
            <button class="nav-btn next" style="display:block;width:100%;margin-bottom:15px;background:var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block;width:100%;margin-bottom:15px;background:#e67e22;" onclick="startQuiz(true)">Start Exam Mode (60 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none;width:100%;margin-bottom:15px;background:#27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('weeklyTest5_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    const header = document.querySelector('.header');
    header.insertAdjacentHTML('afterend', '<div id="timer-display" style="display:none;text-align:center;font-size:1.5rem;font-weight:bold;color:#e74c3c;margin-bottom:15px;"></div>');

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0;
        userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
            startTimer(60 * 60);
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('weeklyTest5_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ;
            userAnswers = state.userAnswers;
            isExamMode = false;
            updateScore(); loadQuestion();
        }
    }

    function startTimer(seconds) {
        timeLeft = seconds;
        document.getElementById('timer-display').style.display = 'block';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); showResults(true); }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = 'Time: ' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
    }

    function saveState() {
        if (isExamMode) return;
        localStorage.setItem('weeklyTest5_state', JSON.stringify({ currentQ, userAnswers }));
    }

    function updateScore() {
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const scoreSpan = document.querySelector('.score');
        if (isExamMode) scoreSpan.style.display = 'none';
        else { scoreSpan.style.display = 'inline'; document.getElementById('score-val').innerText = s; }
    }

    function typesetInfoBox() {
        const box = document.getElementById('info-box');
        if (window.MathJax && box) MathJax.typesetPromise([box]).catch(console.error);
    }

    function loadQuestion() {
        const q = questionsList[currentQ];
        document.getElementById('q-counter').innerText = 'Q: ' + (currentQ+1) + ' / ' + questionsList.length;
        let qText = q.q;
        if (isExamMode) qText = qText.replace(/^\d+\.\s*/, '');
        document.getElementById('question-text').innerHTML = qText;
        if (window.MathJax) MathJax.typesetPromise([document.getElementById('question-text')]).catch(console.error);
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        let displayOpts = q.opts.map((text, index) => ({ text, index }));
        if (isExamMode) {
            if (!q.shuffledOrder) {
                for (let i = displayOpts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [displayOpts[i], displayOpts[j]] = [displayOpts[j], displayOpts[i]];
                }
                q.shuffledOrder = displayOpts.map(o => o.index);
            } else {
                displayOpts = q.shuffledOrder.map(idx => ({ text: q.opts[idx], index: idx }));
            }
        }
        displayOpts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = String.fromCharCode(65+i) + '. ' + opt.text.replace(/^[A-D]\.\s*/, '');
            btn.onclick = () => checkAnswer(opt.index, btn, displayOpts);
            optsContainer.appendChild(btn);
        });
        document.getElementById('info-box').style.display = 'none';
        document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (userAnswers[currentQ] !== null) {
            const buttons = document.querySelectorAll('.btn');
            const selectedIdx = userAnswers[currentQ];
            displayOpts.forEach((opt, btnIdx) => {
                const btn = buttons[btnIdx];
                if (isExamMode) {
                    if (opt.index === selectedIdx) { btn.style.border='2px solid var(--primary)'; btn.style.background='#eef7fd'; }
                } else {
                    btn.disabled = true;
                    if (opt.index === selectedIdx) btn.classList.add(opt.index === q.ans ? 'correct' : 'wrong');
                    if (opt.index === q.ans) btn.classList.add('correct');
                }
            });
            if (!isExamMode) {
                document.getElementById('info-box').innerHTML = q.info + (q.other_defs || '');
                document.getElementById('info-box').style.display = 'block';
                typesetInfoBox();
            }
            showNextButton();
        }
    }

    function checkAnswer(idx, btn, displayOpts) {
        if (!isExamMode && userAnswers[currentQ] !== null) return;
        userAnswers[currentQ] = idx;
        updateScore(); saveState();
        const buttons = document.querySelectorAll('.btn');
        const q = questionsList[currentQ];
        if (!isExamMode) {
            buttons.forEach(b => b.disabled = true);
            btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
            if (idx !== q.ans) {
                displayOpts.forEach((opt, bi) => {
                    if (opt.index === q.ans) buttons[bi].classList.add('correct');
                });
            }
            document.getElementById('info-box').innerHTML = q.info + (q.other_defs || '');
            document.getElementById('info-box').style.display = 'block';
            typesetInfoBox();
        } else {
            buttons.forEach(b => { b.style.border='2px solid #e9ecef'; b.style.background='#f8f9fa'; });
            btn.style.border='2px solid var(--primary)'; btn.style.background='#eef7fd';
        }
        showNextButton();
    }

    function showNextButton() {
        const btn = document.getElementById('next-btn');
        btn.innerText = currentQ < questionsList.length-1 ? 'Next \u27a1' : 'Finish \ud83c\udfc6';
        btn.style.display = 'block';
    }

    function prevQuestion() { if (currentQ > 0) { currentQ--; loadQuestion(); window.scrollTo(0,0); } }
    function nextQuestion() {
        if (currentQ < questionsList.length-1) { currentQ++; loadQuestion(); window.scrollTo(0,0); }
        else showResults();
    }

    function showResults(timesUp) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer-display').style.display = 'none';
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const p = Math.round((s/questionsList.length)*100);
        let msg = p >= 80 ? 'Excellent work!' : (p >= 60 ? 'Good job!' : 'Keep studying!');
        if (timesUp) msg = "Time's up! " + msg;
        quizContainer.innerHTML =
            '<div class="result-screen">' +
            '<h2 style="color:var(--primary);">Quiz Complete!</h2>' +
            '<p style="font-size:1.2rem;">You scored <strong>' + s + '</strong> out of <strong>' + questionsList.length + '</strong> (' + p + '%).</p>' +
            '<p>' + msg + '</p>' +
            '<button class="nav-btn next" style="display:block;width:100%;margin-top:15px;background:#f39c12;" onclick="showReview()">Review All Answers</button>' +
            '<button class="nav-btn next" style="display:block;width:100%;margin-top:15px;" onclick="location.reload()">Return to Main Menu</button>' +
            '</div>';
    }

    function showReview() {
        let reviewHTML = '<div style="text-align:left;"><h2 style="color:var(--primary);text-align:center;">Exam Review</h2><p style="text-align:center;margin-bottom:20px;">Correct answers in green. Your wrong choices in red.</p>';
        questionsList.forEach(function(q, i) {
            var uAns = userAnswers[i];
            var isCorrect = uAns === q.ans;
            var unanswered = uAns === null || uAns === undefined;
            var qStatus = isCorrect
                ? '<span style="color:var(--correct);font-weight:bold;float:right;">Correct</span>'
                : (unanswered ? '<span style="color:#f39c12;font-weight:bold;float:right;">Unanswered</span>'
                              : '<span style="color:var(--wrong);font-weight:bold;float:right;">Incorrect</span>');
            var borderColor = isCorrect ? 'var(--correct)' : (unanswered ? '#f39c12' : 'var(--wrong)');
            var qTextClean = q.q.replace(/^\d+\.\s*/, '');
            reviewHTML += '<div style="margin-bottom:30px;padding:20px;border:2px solid ' + borderColor + ';border-radius:12px;background:#fff;box-shadow:0 4px 6px rgba(0,0,0,0.05);">';
            reviewHTML += '<div style="font-weight:600;font-size:1.05rem;margin-bottom:15px;color:var(--text);">' + qStatus + (i+1) + '. ' + qTextClean + '</div>';
            reviewHTML += '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:15px;">';
            q.opts.forEach(function(opt, optIdx) {
                var cleanOpt = opt.replace(/^[A-D]\.\s*/, '');
                var style = 'padding:12px;border-radius:8px;border:1px solid #e9ecef;background:#f8f9fa;color:var(--text);';
                var label = String.fromCharCode(65+optIdx) + '. ' + cleanOpt;
                if (optIdx === q.ans) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--correct);background:var(--correct-bg);color:#1e8449;font-weight:700;';
                    label += ' (Correct Answer)';
                } else if (optIdx === uAns && !isCorrect) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--wrong);background:var(--wrong-bg);color:#922b21;text-decoration:line-through;opacity:0.8;';
                    label += ' (Your Choice)';
                } else if (optIdx === uAns && isCorrect) {
                    label += ' (Your Choice)';
                }
                reviewHTML += '<div style="' + style + '">' + label + '</div>';
            });
            reviewHTML += '</div>';
            reviewHTML += '<div style="padding:15px;background:var(--info-bg);border-left:5px solid var(--info-border);border-radius:6px;font-size:0.9rem;line-height:1.7;">' + q.info + (q.other_defs||'') + '</div>';
            reviewHTML += '</div>';
        });
        reviewHTML += '<button class="nav-btn next" style="display:block;width:100%;margin-top:25px;background:var(--primary);" onclick="location.reload()">Return to Main Menu</button></div>';
        quizContainer.innerHTML = reviewHTML;
        window.scrollTo(0,0);
        if (window.MathJax) MathJax.typesetPromise([quizContainer]).catch(console.error);
    }

</script>
</body>
</html>
