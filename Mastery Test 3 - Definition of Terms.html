<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastery Test 3 - Definition of Terms</title>
    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #2c3e50; --primary: #3498db; --primary-hover: #2980b9;
            --correct: #2ecc71; --correct-bg: #e8f8f5; --wrong: #e74c3c; --wrong-bg: #fdedec;
            --info-border: #f39c12; --info-bg: #fef9e7; --secondary: #95a5a6; --secondary-hover: #7f8c8d;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #app { background: var(--card-bg); width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 25px; color: #7f8c8d; }
        .score { color: var(--primary); }
        .question { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; text-align: left; background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s ease; outline: none; }
        .btn:hover:not(:disabled) { background: #e2e6ea; border-color: #dae0e5; transform: translateY(-1px); }
        .btn:disabled { cursor: default; opacity: 0.9; }
        .btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #1e8449; font-weight: 700; }
        .btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #922b21; text-decoration: line-through; opacity: 0.7; }
        .info-box { margin-top: 25px; padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.5; display: none; animation: fadeIn 0.4s ease; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .nav-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-align: center; transition: background 0.2s; display: none; }
        .nav-btn.prev { background: var(--secondary); color: white; }
        .nav-btn.next { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .home-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .result-screen { text-align: center; padding: 20px 0; }
        [data-theme="dark"] {
            --bg: #0d1117; --card-bg: #161b22; --text: #e6edf3;
            --primary: #58a6ff; --primary-hover: #79b8ff;
            --correct: #3fb950; --correct-bg: rgba(63,185,80,0.15);
            --wrong: #f85149; --wrong-bg: rgba(248,81,73,0.15);
            --info-border: #d29922; --info-bg: rgba(210,153,34,0.1);
            --secondary: #30363d; --secondary-hover: #3c444d;
        }
        [data-theme="dark"] .header { border-bottom-color: #30363d; color: #8b949e; }
        [data-theme="dark"] .btn { background: #1c2128; border-color: #30363d; }
        [data-theme="dark"] .btn:hover:not(:disabled) { background: #262c36; border-color: #484f58; }
        [data-theme="dark"] #app { box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>

<script>
    const allQuestions = [{"q": "1. A water basin used for swimming designed to accommodate many bathers at a time and properly connected to a disposal system, fills and draws water supply or provided with approved water purification and recirculation system.", "opts": ["Reservoir", "Public Bath", "Swimming Pool", "Pool"], "ans": 2, "info": "Correct Answer: C. Swimming Pool", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Reservoir:</strong> A receptacle or basin, either natural or artificial, for storing water.</li><li><strong>Public Bath:</strong> A bathhouse or bathing place intended to be used by the public.</li><li><strong>Pool:</strong> A small body of standing water; a swimming pool.</li></ul>"}, {"q": "2. A plumbing fixture used for washing the middle private part of the body, especially the genitals.", "opts": ["Bidet", "Water Closet", "Handheld Spray", "Bathtub"], "ans": 0, "info": "Correct Answer: A. Bidet", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Closet:</strong> A fixture with a water-containing receptor which receives liquid and solid body waste.</li><li><strong>Handheld Spray:</strong> A flexible hose shower head attachment.</li><li><strong>Bathtub:</strong> A plumbing fixture for bathing.</li></ul>"}, {"q": "3. Shall mean direct access without the necessity of removing any panel, door or similar obstruction.", "opts": ["Accessible", "Common", "Readily Accessible", "Approved"], "ans": 2, "info": "Correct Answer: C. Readily Accessible", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Accessible:</strong> Having access thereto but which first may require the removal of an access panel, door, or similar obstruction.</li><li><strong>Common:</strong> That part of a plumbing system designed and installed to serve more than one appliance, fixture, building or system.</li><li><strong>Approved:</strong> Accepted or acceptable under an applicable specification or standard.</li></ul>"}, {"q": "4. The extended portion of a pipe that is closed at one end to which no connections are made on the extended portion, thus permitting the stagnation of liquid or air therein.", "opts": ["Cap", "Dead end", "Hub", "Dead Leg"], "ans": 1, "info": "Correct Answer: B. Dead end", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Cap:</strong> A fitting, screwed or caulked over the end of a pipe for closing the pipe end.</li><li><strong>Hub:</strong> That portion of a pipe which is sufficiently enlarged to receive the end of another pipe.</li><li><strong>Dead Leg:</strong> An extension of pipe leading nowhere, allowing water to stagnate.</li></ul>"}, {"q": "5. The pipe from the street water main or other sources of water supply to the building served.", "opts": ["Service Pipe", "Fixture Supply", "Building Supply", "Water Distributing Pipe"], "ans": 0, "info": "Correct Answer: A. Service Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Fixture Supply:</strong> A water supply pipe connecting the fixture with the fixture branch.</li><li><strong>Building Supply:</strong> The pipe carrying potable water from the water meter or other source of water supply to a building.</li><li><strong>Water Distributing Pipe:</strong> A pipe which conveys potable water from the building supply pipe to the plumbing fixtures.</li></ul>"}, {"q": "6. An arrangement of venting so installed that one vent pipe will serve two (2) traps.", "opts": ["Duo Vent", "Branch Vent", "Unit Vent", "Group Vent"], "ans": 2, "info": "Correct Answer: C. Unit Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Duo Vent:</strong> An arrangement of venting so installed that one vent pipe will serve two traps.</li><li><strong>Branch Vent:</strong> A horizontal vent connecting one or more individual vertical back vents.</li><li><strong>Group Vent:</strong> A branch vent that performs its functions for two or more traps.</li></ul>"}, {"q": "7. Also called domestic sewage.", "opts": ["Sewage", "Solid Waste", "Sanitary Sewage", "Liquid Waste"], "ans": 2, "info": "Correct Answer: C. Sanitary Sewage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Sewage:</strong> Any liquid waste containing animal or vegetable matter in suspension or solution.</li><li><strong>Solid Waste:</strong> Solid refuse or matter.</li><li><strong>Liquid Waste:</strong> The discharge from any fixture, appliance, or appurtenance that does not receive fecal matter.</li></ul>"}, {"q": "8. ___________ is the nominal diameter as designated commercially. I. D. denotes inside diameter of pipe and O.D.<br><br>denotes outside diameter of tube.", "opts": ["Diameter", "Developed Length", "Iron Pipe Size", "Annulus"], "ans": 0, "info": "Correct Answer: A. Diameter", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Developed Length:</strong> The length of a pipe along its centerline and fittings.</li><li><strong>Iron Pipe Size:</strong> I.P.S.</li><li><strong>Annulus:</strong> The space between a pipe and its sleeve.</li></ul>"}, {"q": "9. It is that part of a plumbing system extending from the house drain at a point 0.60 meters from the outside face of the foundation wall of a building to the junction with the street sewer or to any point of discharge, and conveying the drainage of one building site.", "opts": ["Building Sewer", "House Sewer", "House Drain", "Primary Sewer"], "ans": 1, "info": "Correct Answer: B. House Sewer", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building Sewer:</strong> That part of the horizontal piping of a drainage system extending from the end of the building drain.</li><li><strong>House Drain:</strong> That part of the lowest horizontal piping of a drainage system which receives the discharge from soil, waste, etc.</li><li><strong>Primary Sewer:</strong> A main sewer line.</li></ul>"}, {"q": "10. Equipment or materials included in a LIST published by a listing agency that maintains periodic inspection on current production of listed equipment or materials and whose listing state either that the equipment or materials complied with approved standards or have been tested and found suitable for use in specified manners.", "opts": ["Certified", "Listed Agency", "Listed", "Approved"], "ans": 2, "info": "Correct Answer: C. Listed", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Certified:</strong> Documented as passing a specific test or standard.</li><li><strong>Listed Agency:</strong> An agency accepted by the Administrative Authority in the business of listing or labeling.</li><li><strong>Approved:</strong> Accepted or acceptable under an applicable specification or standard.</li></ul>"}, {"q": "11. A standpipe having no permanent water inside the pipe.", "opts": ["Standpipe", "Automatic Standpipe System", "Dry Standpipe", "Wet Standpipe"], "ans": 2, "info": "Correct Answer: C. Dry Standpipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Standpipe:</strong> A vertical pipe, or a reservoir, into which water is pumped to give it a head.</li><li><strong>Automatic Standpipe System:</strong> A standpipe that operates automatically by opening a hose valve.</li><li><strong>Wet Standpipe:</strong> A standpipe where water pressure is maintained at all times.</li></ul>"}, {"q": "12. It is integrated within an air accumulator vessel which is designed to discharge a predetermined quantity of water into fixtures for flushing purposes.", "opts": ["Flushometer Tank", "Flush Valve", "Flushometer Valve", "Flush Tank"], "ans": 0, "info": "Correct Answer: A. Flushometer Tank", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flush Valve:</strong> A device located at the bottom of the tank for the purpose of flushing water closets.</li><li><strong>Flushometer Valve:</strong> A device which discharges a predetermined quantity of water into fixtures for flushing.</li><li><strong>Flush Tank:</strong> A tank located above or integral with a water closet for flushing.</li></ul>"}, {"q": "13. That portion of a pipe which, for a short distance, is sufficiently enlarged to receive the end of another pipe of the same diameter for the purpose of making it caulked or push-on joint.", "opts": ["Flange", "Cap", "Bell or Hub", "Spigot"], "ans": 2, "info": "Correct Answer: C. Bell or Hub", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flange:</strong> A projecting rim or collar on a pipe.</li><li><strong>Cap:</strong> A fitting, screwed or caulked over the end of a pipe for closing the pipe end.</li><li><strong>Spigot:</strong> The end of a pipe which fits into a bell.</li></ul>"}, {"q": "14. A comprehensive term, including all constructions for collection, transportation, pumping, treatment and final disposition of sewage.", "opts": ["Dump", "Septic System", "Drainage System", "Sewerage"], "ans": 3, "info": "Correct Answer: D. Sewerage", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Dump:</strong> A site for depositing rubbish.</li><li><strong>Septic System:</strong> A private sewage disposal system.</li><li><strong>Drainage System:</strong> Includes all pipings within public or private premises which convey sewage.</li></ul>"}, {"q": "15. A minimum standard quantity of plumbing fixtures that discharge wastes into a plumbing installation including one (1) water meter, one (1) water closet, one (1) lavatory, one (1) shower head and drain for a bathtub or shower stall, one (1) kitchen sink, one (1) Laundry tray and three (3) floor drains and four (4) faucets/hose bibb.", "opts": ["Water Supply Fixture Unit", "Plumbing Unit", "Bathroom", "Fixture Unit"], "ans": 1, "info": "Correct Answer: B. Plumbing Unit", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Supply Fixture Unit:</strong> A measure of the probable discharge into the drainage system by various types of plumbing fixtures.</li><li><strong>Bathroom:</strong> A room equipped with a shower stall or bathtub.</li><li><strong>Fixture Unit:</strong> A quantity in terms of which the load-producing effects on the plumbing system of different fixtures are expressed.</li></ul>"}, {"q": "16. That part of a plumbing system designed and installed to serve more than one (1) appliance, fixture, building, or system.", "opts": ["Group", "Branch", "Battery of Fixtures", "Common"], "ans": 3, "info": "Correct Answer: D. Common", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Group:</strong> A set of fixtures.</li><li><strong>Branch:</strong> Any part of the piping system other than a main, riser, or stack.</li><li><strong>Battery of Fixtures:</strong> Any of two or more similar adjacent fixtures that discharge into a common horizontal soil or waste branch.</li></ul>"}, {"q": "17. A group vent pipe that starts in front of the extreme fixture connection on a horizontal branch and connects to the vent stack.", "opts": ["Chicago Loop", "Loop Vent", "Circuit Vent", "Island Fixture Vent"], "ans": 2, "info": "Correct Answer: C. Circuit Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Chicago Loop:</strong> A type of loop vent.</li><li><strong>Loop Vent:</strong> A circuit vent which loops back.</li><li><strong>Island Fixture Vent:</strong> A vent for an island sink.</li></ul>"}, {"q": "18. Water satisfactory for drinking, culinary and domestic purposes and meets the requirements of the Philippine National Standards for Drinking Water.", "opts": ["Potable Water", "Neutral", "Clean Water", "Acidic"], "ans": 0, "info": "Correct Answer: A. Potable Water", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Neutral:</strong> Having a pH of 7.</li><li><strong>Clean Water:</strong> Water free of impurities.</li><li><strong>Acidic:</strong> Having a pH less than 7.</li></ul>"}, {"q": "19. An organization primarily established for purposes of testing to approve standards and approved by the Administrative Authority.", "opts": ["Bureau of Philippine Standards", "Approved Testing Agency", "Administrative Authority", "American National Standards Institute"], "ans": 1, "info": "Correct Answer: B. Approved Testing Agency", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Bureau of Philippine Standards:</strong> The national standards body of the Philippines.</li><li><strong>Administrative Authority:</strong> The authority having jurisdiction.</li><li><strong>American National Standards Institute:</strong> ANSI.</li></ul>"}, {"q": "20. ______________ on a backflow prevention device or vacuum breaker is a point conforming to approved standards and established by the testing laboratory (usually stamped on the device by the manufacturer) which determines the minimum elevation above the flood level rim of the fixture or receptacle served where the device may be installed.<br><br>When a backflow prevention device does not bear a critical level marking, the bottom of the vacuum breaker, combination valve, or the bottom of any such approved device shall constitutes the critical level.", "opts": ["Critical Level", "Flood Level Rim", "Rim", "Overflow"], "ans": 0, "info": "Correct Answer: A. Critical Level", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Flood Level Rim:</strong> The top edge of a receptacle from where water overflows.</li><li><strong>Rim:</strong> An unobstructed top open edge of a fixture.</li><li><strong>Overflow:</strong> An opening to prevent flooding.</li></ul>"}, {"q": "21. An approved tank or pit which receives sewage or wastewater and is located below the normal grade of the gravity system and must be emptied by mechanical means.", "opts": ["Shaft", "Chase", "Cistern", "Sump"], "ans": 3, "info": "Correct Answer: D. Sump", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Shaft:</strong> A vertical opening through a building.</li><li><strong>Chase:</strong> A vertical shaft for the installation of different pipe stacks.</li><li><strong>Cistern:</strong> A receptacle for holding water or other liquid.</li></ul>"}, {"q": "22. A structure which any part of its structural framework will ignite and burn at a temperature of 756 degrees centigrade or less.", "opts": ["Heavyweight Construction", "Lightweight Construction", "Combustible Construction", "Noncombustible Construction"], "ans": 2, "info": "Correct Answer: C. Combustible Construction", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Heavyweight Construction:</strong> Construction with heavy materials.</li><li><strong>Lightweight Construction:</strong> Construction with light materials.</li><li><strong>Noncombustible Construction:</strong> A structure made of noncombustible materials.</li></ul>"}, {"q": "23. The end of a pipe which fits into a bell. Also a word used synonymously with faucet.", "opts": ["Spigot", "Gooseneck", "Spout", "Hub"], "ans": 0, "info": "Correct Answer: A. Spigot", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Gooseneck:</strong> A return bend of small-sized pipe, one end of which is about 30 cm long.</li><li><strong>Spout:</strong> A projecting tube or lip for pouring liquids.</li><li><strong>Hub:</strong> That portion of a pipe which is sufficiently enlarged to receive the end of another pipe.</li></ul>"}, {"q": "24. A fixture designed for the washing of the hands or face. Sometimes called a wash basin.", "opts": ["Vanity", "Lavatory", "Font", "Kitchen Sink"], "ans": 1, "info": "Correct Answer: B. Lavatory", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Vanity:</strong> A bathroom cabinet containing a sink.</li><li><strong>Font:</strong> A receptacle for water.</li><li><strong>Kitchen Sink:</strong> A sink used in a kitchen.</li></ul>"}, {"q": "25. A standpipe that is controlled by a remote control device at each hose station.", "opts": ["Automatic Standpipe System", "Wet Standpipe", "Standpipe", "Manually-Operated Standpipe System"], "ans": 3, "info": "Correct Answer: D. Manually-Operated Standpipe System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Automatic Standpipe System:</strong> A standpipe that operates automatically by opening a hose valve.</li><li><strong>Wet Standpipe:</strong> A standpipe where water pressure is maintained at all times.</li><li><strong>Standpipe:</strong> A vertical pipe, or a reservoir, into which water is pumped to give it a head.</li></ul>"}, {"q": "26. A stop valve placed at the connection of the water service pipe to the water main.", "opts": ["Water Meter", "Curb Stop", "Gate Valve", "Corporation Cock"], "ans": 3, "info": "Correct Answer: D. Corporation Cock", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Water Meter:</strong> A device for measuring the volume of water passing through a pipe.</li><li><strong>Curb Stop:</strong> A control valve for the water supply of a building.</li><li><strong>Gate Valve:</strong> A valve in which the flow of water is cut off by means of a circular disc.</li></ul>"}, {"q": "27. A standpipe where water pressure is maintained at all times.", "opts": ["Wet Standpipe", "Automatic Standpipe System", "Standpipe", "Manually-Operated Standpipe System"], "ans": 0, "info": "Correct Answer: A. Wet Standpipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Automatic Standpipe System:</strong> A standpipe that operates automatically by opening a hose valve.</li><li><strong>Standpipe:</strong> A vertical pipe, or a reservoir, into which water is pumped to give it a head.</li><li><strong>Manually-Operated Standpipe System:</strong> A standpipe that is controlled by a remote control device at each hose station.</li></ul>"}, {"q": "28. It is commonly used as a faucet for a pantry sink", "opts": ["Center Set", "Lavatory", "Gooseneck", "Hose Bibb"], "ans": 2, "info": "Correct Answer: C. Gooseneck", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Center Set:</strong> A type of faucet.</li><li><strong>Lavatory:</strong> A fixture designed for the washing of the hands or face.</li><li><strong>Hose Bibb:</strong> A faucet to which a hose may be attached.</li></ul>"}, {"q": "29. A vertical pipe, or a reservoir, into which water is pumped to give it at a head.", "opts": ["Manually-Operated Standpipe System", "Standpipe", "Automatic Standpipe System", "Wet Standpipe"], "ans": 1, "info": "Correct Answer: B. Standpipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Manually-Operated Standpipe System:</strong> A standpipe that is controlled by a remote control device at each hose station.</li><li><strong>Automatic Standpipe System:</strong> A standpipe that operates automatically by opening a hose valve.</li><li><strong>Wet Standpipe:</strong> A standpipe where water pressure is maintained at all times.</li></ul>"}, {"q": "30. Brazed Joint is any joint obtained by joining of metal parts with alloys which melt at temperatures ______ degrees centigrade, but lower than the melting temperature of the parts to be joined.", "opts": ["higher than 449 degrees", "lower than 449 degrees", "lower than 459 degrees", "higher than 459 degrees"], "ans": 0, "info": "Correct Answer: A. higher than 449 degrees", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>lower than 449 degrees:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>lower than 459 degrees:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>higher than 459 degrees:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "31. A sole proprietorship or corporation composed of Registered and Licensed Master Plumbers together with allied professionals, with the Master Plumbers composing the majority of the membership, incorporators, directors and/or executive officers and Licensed Master Plumber only render work and services within the cognizance of a Registered Master Plumber and members of the allied professions also only render work and services within the cognizance of their respective professions.", "opts": ["Unit", "Individual", "Proprietor", "Plumbing Firm"], "ans": 3, "info": "Correct Answer: D. Plumbing Firm", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Unit:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Individual:</strong> A single person.</li><li><strong>Proprietor:</strong> An owner of a business.</li></ul>"}, {"q": "32. It is a drain pipe extending laterally from a soil or waste stack or building drain with or without vertical sections or branches, which receives the discharge from one or more fixture drains and conducts it to the soil or waste stack or to the building drain.", "opts": ["Horizontal Pipe", "Primary Branch", "House Drain", "Horizontal Branch"], "ans": 3, "info": "Correct Answer: D. Horizontal Branch", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Horizontal Pipe:</strong> Any pipe installed horizontally.</li><li><strong>Primary Branch:</strong> The single sloping drain from the base of a stack.</li><li><strong>House Drain:</strong> That part of the lowest horizontal piping of a drainage system which receives the discharge from soil, waste, etc.</li></ul>"}, {"q": "33. Minimum Branch Interval", "opts": ["2.40", "1.20", "2.43", "2.73"], "ans": 2, "info": "Correct Answer: C. 2.43", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>2.40:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>1.20:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>2.73:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "34. That part of the lowest horizontal piping of a drainage system which receives the discharge from soil, waste, and other drainage pipes inside the walls of the building and conveys it to the building sewer beginning 0.6 meter outside the building wall.", "opts": ["Building Subdrain", "Building Sewer", "House Drain", "Building Drain"], "ans": 3, "info": "Correct Answer: D. Building Drain", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building Subdrain:</strong> That portion of an underground system, which cannot drain by gravity into the building sewer.</li><li><strong>Building Sewer:</strong> That part of the horizontal piping of a drainage system extending from the end of the building drain.</li><li><strong>House Drain:</strong> That part of the lowest horizontal piping of a drainage system which receives the discharge from soil, waste, etc.</li></ul>"}, {"q": "35. A Yoke Vent is a type of a _____", "opts": ["Group Vent", "Relief Vent", "Branch Vent", "Individual Vent"], "ans": 1, "info": "Correct Answer: B. Relief Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Group Vent:</strong> A branch vent that performs its functions for two or more traps.</li><li><strong>Branch Vent:</strong> A horizontal vent connecting one or more individual vertical back vents.</li><li><strong>Individual Vent:</strong> A pipe installed to vent a fixture trap that connects with the vent system above the fixture.</li></ul>"}, {"q": "36. Occurs due to an increased reverse pressure above the supply pressure.<br><br>This may be due to pumps, boilers, gravity, or other sources of pressure.", "opts": ["Backpressure Backflow", "Backflow Connection", "Back-Siphonage", "Backflow"], "ans": 0, "info": "Correct Answer: A. Backpressure Backflow", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Backflow Connection:</strong> Condition or arrangement whereby reverse flow can occur.</li><li><strong>Back-Siphonage:</strong> The flowing back of used water into a water supply pipe due to negative pressure.</li><li><strong>Backflow:</strong> The reverse flow of water or liquids into the distributing pipes.</li></ul>"}, {"q": "37. ____________ is a vertical vent that is a continuation of the drain to which the vent connects.", "opts": ["Combination Waste & Vent System", "Continuous Waste", "Continuous Vent", "Wet Vent"], "ans": 2, "info": "Correct Answer: C. Continuous Vent", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Combination Waste & Vent System:</strong> A specially designed system of waste piping embodying horizontal wet venting.</li><li><strong>Continuous Waste:</strong> A drain connecting the compartments of a set of fixtures to a trap.</li><li><strong>Wet Vent:</strong> That portion of a vent pipe through where wastewater also flows.</li></ul>"}, {"q": "38. A vertical soil pipe conveying fecal matter and wastewater.", "opts": ["Drain", "Soil Stack Pipe", "Soil Pipe", "Stack"], "ans": 1, "info": "Correct Answer: B. Soil Stack Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Drain:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Soil Pipe:</strong> Any pipe which conveys the discharge of water closets.</li><li><strong>Stack:</strong> The vertical main of a system of soil, waste or vent piping.</li></ul>"}, {"q": "39. A valved outlet of a boiler that permits the discharge of accumulated sediment.", "opts": ["Boiler Blow-Off", "Angle Valve", "Backflow Preventer", "Blow-off"], "ans": 0, "info": "Correct Answer: A. Boiler Blow-Off", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Angle Valve:</strong> A valve with its outlet at right angles to the inlet.</li><li><strong>Backflow Preventer:</strong> Device to prevent reverse flow.</li><li><strong>Blow-off:</strong> A controlled outlet of a pipeline to discharge liquid.</li></ul>"}, {"q": "40. The area included within surrounding walls of a building (or portion thereof), exclusive of vent shafts and courts.", "opts": ["Building", "Floor Area", "Yard", "Footprint"], "ans": 1, "info": "Correct Answer: B. Floor Area", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building:</strong> A structure built for the housing, shelter, enclosure, or support of persons, animals, or property.</li><li><strong>Yard:</strong> An open, unoccupied space.</li><li><strong>Footprint:</strong> The area on a project site used by the building structure.</li></ul>"}, {"q": "41. A person who specializes in the welding of pipes and holds a valid certificate of competency from a recognized testing agency, based on the requirements of the regulating authority.", "opts": ["Journeyman", "Pipeline Welder", "Pipefitter", "Steamfitter"], "ans": 1, "info": "Correct Answer: B. Pipeline Welder", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Journeyman:</strong> A worker who has learned a trade and works for another person.</li><li><strong>Pipefitter:</strong> A person who installs and repairs piping systems.</li><li><strong>Steamfitter:</strong> A person who installs piping for heating and cooling systems.</li></ul>"}, {"q": "42. A non-watertight lined excavation in the ground which receives the discharge of a sanitary drainage system or part thereof, designed to retain the organic matter and solids discharging therefrom, but permitting the liquid to seep through the bottom and sides of the cesspool.", "opts": ["Cesspool", "Septic Vault", "Septic Tank", "Seepage Pit"], "ans": 0, "info": "Correct Answer: A. Cesspool", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Septic Vault:</strong> A watertight receptacle for sewage.</li><li><strong>Septic Tank:</strong> A watertight receptacle which receives the discharge of a plumbing system.</li><li><strong>Seepage Pit:</strong> A loosely lined excavation in the ground which receives the discharge of a septic tank.</li></ul>"}, {"q": "43. The installation of all pipings and fitting parts of the plumbing system, which can be completed prior to the installation of fixtures and accessories.<br><br>These include sanitary and storm drainage, tap, hot and chilled water supplies, gas pipings, vent pipings and the necessary fixture supports.", "opts": ["Existing Work", "Staking", "Roughing-in", "Trim-out"], "ans": 2, "info": "Correct Answer: C. Roughing-in", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Existing Work:</strong> The on-going installation of the plumbing system prior to the effectivity of this Code.</li><li><strong>Staking:</strong> Marking the location of the structure.</li><li><strong>Trim-out:</strong> The final stage of plumbing installation.</li></ul>"}, {"q": "44. When applied to a fixture, connection, appliance, or equipment, shall mean having access thereto, but which may require prior removal of an access panel, door, or similar obstruction.", "opts": ["Common", "Readily Accessible", "Accessible", "Approved"], "ans": 2, "info": "Correct Answer: C. Accessible", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Common:</strong> That part of a plumbing system designed and installed to serve more than one appliance, fixture, building or system.</li><li><strong>Readily Accessible:</strong> Direct access without the necessity of removing any panel, door or similar obstruction.</li><li><strong>Approved:</strong> Accepted or acceptable under an applicable specification or standard.</li></ul>"}, {"q": "45. The pressure available at the fixture or water outlet;<br><br>allowance is made for pressure drop due to friction loss, head, meter and other losses in the system during maximum demand period.", "opts": ["Residual Pressure", "Pressure", "Static Pressure", "Pressure Relief"], "ans": 0, "info": "Correct Answer: A. Residual Pressure", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Pressure:</strong> The normal force exerted by a liquid or gas.</li><li><strong>Static Pressure:</strong> The pressure existing without any flow motion.</li><li><strong>Pressure Relief:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "46. A single area of land legally recorded or validated by other means acceptable to the Administrative Authority where a building is situated or site of any work regulated by this Code, together with the yard, court, and unoccupied space legally required for the building or works;<br><br>and which is owned by or in the lawful possession of the owner of the building or works.", "opts": ["Lot", "Site", "Station", "Locality"], "ans": 0, "info": "Correct Answer: A. Lot", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Site:</strong> The area where a building or work is located.</li><li><strong>Station:</strong> A specific location.</li><li><strong>Locality:</strong> A neighborhood or area.</li></ul>"}, {"q": "47. A term used to describe soil or waste system where all pipings are of threaded pipe, tubing, or other such rigid construction using recessed drainage fittings to correspond to the types of piping.", "opts": ["Drainage System", "Durham System", "Combination Waste and Vent System", "Plumbing System"], "ans": 1, "info": "Correct Answer: B. Durham System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Drainage System:</strong> Includes all pipings within public or private premises which convey sewage.</li><li><strong>Combination Waste and Vent System:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Plumbing System:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "48. A fitting, screwed, or caulked over the end of a pipe for closing the pipe end.", "opts": ["Gasket", "Plug", "Cap", "Bushing"], "ans": 2, "info": "Correct Answer: C. Cap", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Gasket:</strong> A shaped piece or ring of rubber or other material sealing the junction between two surfaces.</li><li><strong>Plug:</strong> A fitting used to close the end of a pipe.</li><li><strong>Bushing:</strong> A pipe fitting used to reduce the size of an opening.</li></ul>"}, {"q": "49. That portion of an underground system, which cannot drain by gravity into the building sewer.", "opts": ["Building Drain", "Building Sewer", "Subsoil Drain", "Building Subdrain"], "ans": 3, "info": "Correct Answer: D. Building Subdrain", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Building Drain:</strong> That part of the lowest horizontal piping of a drainage system.</li><li><strong>Building Sewer:</strong> That part of the horizontal piping of a drainage system extending from the end of the building drain.</li><li><strong>Subsoil Drain:</strong> An underground drainpipe that receives only subsurface or seepage water.</li></ul>"}, {"q": "50. In Plumbing Code, referred to as Revent Pipe.", "opts": ["Group Vent", "Bypass Vent", "Backvent Pipe", "Relief Vent"], "ans": 2, "info": "Correct Answer: C. Backvent Pipe", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Group Vent:</strong> A branch vent that performs its functions for two or more traps.</li><li><strong>Bypass Vent:</strong> A vent used in specific applications.</li><li><strong>Relief Vent:</strong> A vertical vent line providing additional circulation of air.</li></ul>"}, {"q": "51. A water supply pipe connecting the fixture with the fixture branch.", "opts": ["Riser", "Faucet", "Fixture Supply", "Service Pipe"], "ans": 2, "info": "Correct Answer: C. Fixture Supply", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Riser:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Faucet:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Service Pipe:</strong> The pipe from the street water main or other sources of water supply to the building served.</li></ul>"}, {"q": "52. Confined Space - A room or space having a volume of less than 1.4 cu.<br><br>m with ____ kilogram calorie of the aggregate input rating of all fuel-burning appliances installed in that space.", "opts": ["240 kilogram calorie", "250 kilogram calorie", "230 kilogram calorie", "220 kilogram calorie"], "ans": 1, "info": "Correct Answer: B. 250 kilogram calorie", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>240 kilogram calorie:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>230 kilogram calorie:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>220 kilogram calorie:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "53. A large opening in a sewer line or part of a plumbing system constructed with sufficient size for a man to gain access therein for maintenance purposes and facility for changes of line and/or grade of pipeline.", "opts": ["Culvert", "Handhole", "Manhole", "Combination Sewer"], "ans": 2, "info": "Correct Answer: C. Manhole", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Culvert:</strong> A tunnel carrying a stream or open drain under a road or railway.</li><li><strong>Handhole:</strong> An opening in a part of a system, large enough for a hand to be inserted.</li><li><strong>Combination Sewer:</strong> A sewer receiving both surface runoff and sewage.</li></ul>"}, {"q": "54. An approved plumbing fixture or device of such materials, shape and capacity to Adequately receives the discharge from indirect waste pipes, constructed and located to be readily cleaned.", "opts": ["Plumbing Appliance", "Appurtenance", "Fixture", "Receptor"], "ans": 3, "info": "Correct Answer: D. Receptor", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Appliance:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Appurtenance:</strong> A manufactured device to perform a special plumbing function.</li><li><strong>Fixture:</strong> A receptacle attached to a plumbing system.</li></ul>"}, {"q": "55. Per Plumbing Code, Potable PVC water pipings are colored _____.", "opts": ["White", "Blue", "All of these", "Green"], "ans": 1, "info": "Correct Answer: B. Blue", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>White:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>All of these:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Green:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "56. A pipe fitting of three branches that form the letter \u201cWye\u201d", "opts": ["Yoke", "Siamese Connection", "Wye", "Ell"], "ans": 2, "info": "Correct Answer: C. Wye", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Yoke:</strong> A connecting structure.</li><li><strong>Siamese Connection:</strong> A hose fitting with clapper valves for combining the flow from two or more lines of hose.</li><li><strong>Ell:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "57. One person living alone or in a group living together, whether related to each other by birth or not.", "opts": ["Family", "Person", "Unit", "Individual"], "ans": 0, "info": "Correct Answer: A. Family", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Person:</strong> A natural person, his heirs, executors, administrators or assigns.</li><li><strong>Unit:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Individual:</strong> A single person.</li></ul>"}, {"q": "58. Includes all the pipings within public or private premises which convey sewage or other liquid wastes to a legal point of disposal but does not include the mains of a public sewer system or a public sewage treatment or disposal plant.", "opts": ["Drainage System", "Plumbing System", "Combination Waste and Vent System", "Durham System"], "ans": 0, "info": "Correct Answer: A. Drainage System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing System:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Combination Waste and Vent System:</strong> Defined under the National Plumbing Code of the Philippines.</li><li><strong>Durham Sys rmit"], "ans": 1, "info": "Correct Answer: B. Occupancy", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Plumbing Permit:</strong> A permit to do plumbing work.</li><li><strong>Building:</strong> A structure built for the housing, shelter, enclosure, or support of persons, animals, or property.</li><li><strong>Building Permit:</strong> A permit for construction.</li></ul>"}, {"q": "86. A septic tank with the effluent discharging into a subsurface disposal field, into one or more seepage pits or into a combination of subsurface disposal field and seepage pit or of such other facilities as may be permitted under the procedures set forth elsewhere in this Code.", "opts": ["Sewage Disposal System", "Private Sewer", "Public Sewer", "Private Sewage Disposal System"], "ans": 3, "info": "Correct Answer: D. Private Sewage Disposal System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Sewage Disposal System:</strong> A system for disposing of sewage.</li><li><strong>Private Sewer:</strong> A privately owned sewer.</li><li><strong>Public Sewer:</strong> A publicly owned sewer.</li></ul>"}, {"q": "87. An approved elastomeric sealing gasket with an approved outer shield and a tightening mechanism.", "opts": ["Coupling", "Shielded Coupling", "Nipple", "Dielectric Union"], "ans": 1, "info": "Correct Answer: B. Shielded Coupling", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Coupling:</strong> A fitting that joins two pipes.</li><li><strong>Nipple:</strong> A short length of pipe with threads at both ends.</li><li><strong>Dielectric Union:</strong> A union used to join two dissimilar metals.</li></ul>"}, {"q": "88. The maximum vertical depth of liquid that a trap will retain, measured between the crown weir and the top of the dip of the trap.", "opts": ["Seal", "Trap Seal", "Trap", "Air Gap"], "ans": 1, "info": "Correct Answer: B. Trap Seal", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Seal:</strong> The vertical distance between the dip and the crown weir of a trap.</li><li><strong>Trap:</strong> A fitting or device designed to provide a liquid seal.</li><li><strong>Air Gap:</strong> Defined under the National Plumbing Code of the Philippines.</li></ul>"}, {"q": "89. NAMPAP", "opts": ["National Master Plumbing Association of the Philippines", "Philippine National Master Plumbers Association", "National Master Plumber's Association of the Philippines", "National Master Plumbers Association of the Philippines"], "ans": 3, "info": "Correct Answer: D. National Master Plumbers Association of the Philippines", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>National Master Plumbing Association of the Philippines:</strong> Incorrectly spelled NAMPAP.</li><li><strong>Philippine National Master Plumbers Association:</strong> Incorrectly spelled NAMPAP.</li><li><strong>National Master Plumber's Association of the Philippines:</strong> Incorrectly spelled NAMPAP.</li></ul>"}, {"q": "90. A standpipe that operates automatically by opening a hose valve.", "opts": ["Standpipe", "Automatic Standpipe System", "Manually-Operated Standpipe System", "Wet Standpipe"], "ans": 1, "info": "Correct Answer: B. Automatic Standpipe System", "other_defs": "<hr style=\"border: 0; border-top: 1px solid #e1e8ed; margin: 15px 0;\"><strong>Other Options:</strong><ul style=\"margin-top: 5px; padding-left: 20px; font-size: 0.9rem;\"><li><strong>Standpipe:</strong> A vertical pipe, or a reservoir, into which water is pumped to give it a head.</li><li><strong>Manually-Operated Standpipe System:</strong> A standpipe that is controlled by a remote control device at each hose station.</li><li><strong>Wet Standpipe:</strong> A standpipe where water pressure is maintained at all times.</li></ul>"}];
    let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let timerInterval = null;
    let timeLeft = 0;
    let isReviewMode = false;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');
    
    const startMenuHTML = `
        <div id="start-menu" style="text-align: center; padding: 20px 0;">
            <h2 style="color: var(--primary); margin-bottom: 30px;">Mastery Test 3 - Definition of Terms</h2>
            <button class="nav-btn" style="display:block; width:100%; margin-bottom:15px; background: var(--secondary); color:white; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer;" onclick="goBackToPortal()">&#8592; Back to Portal</button>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block; width:100%; margin-bottom:15px; background: #e67e22;" onclick="startQuiz(true)">Start Exam Mode (60 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none; width:100%; margin-bottom:15px; background: #27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('masteryTest3_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    const header = document.querySelector('.header');
    header.insertAdjacentHTML('afterend', '<div id="timer-display" style="display:none; text-align:center; font-size:1.5rem; font-weight:bold; color:#e74c3c; margin-bottom:15px;"></div>');

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode; isReviewMode = false;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0; userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
            startTimer(60 * 60); 
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('masteryTest3_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ; userAnswers = state.userAnswers;
            isExamMode = false; isReviewMode = false;
            updateScore(); loadQuestion();
        }
    }

    function startReviewMode() {
        isReviewMode = true;
        let reviewHTML = '<div class="result-screen" style="text-align:left;"><h2 style="color: var(--primary); text-align:center;">Exam Review</h2><p style="text-align:center; margin-bottom:20px;">Review your answers below. Correct answers are highlighted in green, and your incorrect choices in red.</p>';
        
        questionsList.forEach((q, i) => {
            let uAns = userAnswers[i];
            let isCorrect = uAns === q.ans;
            let qStatus = isCorrect ? '<span style="color:var(--correct); font-weight:bold; float:right;">Correct ✓</span>' : '<span style="color:var(--wrong); font-weight:bold; float:right;">Incorrect ✗</span>';
            let unanswered = uAns === null || uAns === undefined;
            if (unanswered) qStatus = '<span style="color:#f39c12; font-weight:bold; float:right;">Unanswered ⚠</span>';
            
            reviewHTML += `<div style="margin-bottom: 30px; padding: 20px; border: 2px solid ${isCorrect ? 'var(--correct)' : (unanswered ? '#f39c12' : 'var(--wrong)')}; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">`;
            
            let qTextClean = q.q.replace(/^\d+\.\s*/, '');
            reviewHTML += `<div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; color: var(--text);">${qStatus} ${i + 1}. ${qTextClean}</div>`;
            
            reviewHTML += `<div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">`;
            q.opts.forEach((opt, optIdx) => {
                let btnStyle = "padding: 12px; border-radius: 8px; border: 1px solid #e9ecef; background: #f8f9fa; color: var(--text);";
                let label = String.fromCharCode(65 + optIdx) + ". " + opt;
                
                if (optIdx === q.ans) {
                    btnStyle = "padding: 12px; border-radius: 8px; border: 2px solid var(--correct); background: var(--correct-bg); color: #1e8449; font-weight: 700;";
                    label += " (Correct Answer)";
                } else if (optIdx === uAns && !isCorrect) {
                    btnStyle = "padding: 12px; border-radius: 8px; border: 2px solid var(--wrong); background: var(--wrong-bg); color: #922b21; text-decoration: line-through; opacity: 0.8;";
                    label += " (Your Choice)";
                } else if (optIdx === uAns && isCorrect) {
                     label += " (Your Choice)";
                }
                
                reviewHTML += `<div style="${btnStyle}">${label}</div>`;
            });
            reviewHTML += `</div>`;
            
            let info = q.info || "";
            let other = q.other_defs || "";
            if (info || other) {
                reviewHTML += `<div style="padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.5;">${info}${other}</div>`;
            }
            
            reviewHTML += `</div>`;
        });

        reviewHTML += `<button class="nav-btn next" style="display:block; width:100%; margin-top:25px; background: var(--primary);" onclick="location.reload()">Return to Main Menu ↻</button></div>`;
        
        quizContainer.innerHTML = reviewHTML;
        window.scrollTo(0, 0);
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function startTimer(seconds) {
        timeLeft = seconds; document.getElementById('timer-display').style.display = 'block';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--; updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); showResults(true); }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `Time: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function saveState() {
        if (isReviewMode || isExamMode) return;
        localStorage.setItem('masteryTest3_state', JSON.stringify({ currentQ, userAnswers }));
    }

    function updateScore() {
        let s = 0; questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const scoreSpan = document.querySelector('.score');
        if (isExamMode && !isReviewMode) scoreSpan.style.display = 'none';
        else { scoreSpan.style.display = 'inline'; document.getElementById('score-val').innerText = s; }
    }

    function loadQuestion() {
        const q = questionsList[currentQ];
        document.getElementById('q-counter').innerText = "Q: " + (currentQ + 1) + " / " + questionsList.length + (isReviewMode ? " (Review)" : "");
        let qText = q.q;
        if (isExamMode) qText = qText.replace(/^\d+\.\s*/, '');
        document.getElementById('question-text').innerHTML = qText;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        let displayOpts = q.opts.map((text, index) => ({ text, index }));
        if (isExamMode && !isReviewMode) {
            if (!q.shuffledOrder) {
                for (let i = displayOpts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [displayOpts[i], displayOpts[j]] = [displayOpts[j], displayOpts[i]];
                }
                q.shuffledOrder = displayOpts.map(o => o.index);
            } else displayOpts = q.shuffledOrder.map(idx => ({ text: q.opts[idx], index: idx }));
        }
        displayOpts.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'btn';
            btn.innerHTML = String.fromCharCode(65 + i) + ". " + opt.text.replace(/^[A-D]\.\s*/, '');
            btn.onclick = () => checkAnswer(opt.index, btn);
            optsContainer.appendChild(btn);
        });
        document.getElementById('info-box').style.display = 'none';
        document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (userAnswers[currentQ] !== null) {
            const buttons = document.querySelectorAll('.btn');
            const selectedIdx = userAnswers[currentQ];
            displayOpts.forEach((opt, btnIdx) => {
                const btn = buttons[btnIdx];
                if (isExamMode && !isReviewMode) {
                    if (opt.index === selectedIdx) { btn.style.border = "2px solid var(--primary)"; btn.style.background = "#eef7fd"; }
                } else {
                    btn.disabled = true;
                    if (opt.index === selectedIdx) btn.classList.add(opt.index === q.ans ? 'correct' : 'wrong');
                    if (opt.index === q.ans) btn.classList.add('correct');
                }
            });
            if (!isExamMode || isReviewMode) {
                document.getElementById('info-box').innerHTML = "<strong>Review Note:</strong> " + q.info + (q.other_defs || "");
                document.getElementById('info-box').style.display = 'block';
            }
            showNextButton();
        }
    }

    function checkAnswer(idx, btn) {
        if (!isExamMode || isReviewMode) { if (userAnswers[currentQ] !== null) return; }
        userAnswers[currentQ] = idx; updateScore(); saveState();
        const buttons = document.querySelectorAll('.btn');
        if (!isExamMode || isReviewMode) {
            buttons.forEach(b => b.disabled = true);
            const q = questionsList[currentQ];
            btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
            if (idx !== q.ans) buttons[q.ans].classList.add('correct');
            document.getElementById('info-box').innerHTML = "<strong>Review Note:</strong> " + q.info + (q.other_defs || "");
            document.getElementById('info-box').style.display = 'block';
        } else {
            buttons.forEach(b => { b.style.border = "2px solid #e9ecef"; b.style.background = "#f8f9fa"; });
            btn.style.border = "2px solid var(--primary)"; btn.style.background = "#eef7fd";
        }
        showNextButton();
    }

    function showNextButton() {
        const btn = document.getElementById('next-btn');
        btn.innerText = currentQ < questionsList.length - 1 ? 'Next ➔' : 'Finish 🏆';
        btn.style.display = 'block';
    }

    function prevQuestion() { if (currentQ > 0) { currentQ--; loadQuestion(); window.scrollTo(0, 0); } }
    function nextQuestion() { if (currentQ < questionsList.length - 1) { currentQ++; loadQuestion(); window.scrollTo(0, 0); } else showResults(); }

    function showResults(timesUp) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer-display').style.display = 'none';
        let s = 0; questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const p = Math.round((s / questionsList.length) * 100);
        let msg = p >= 80 ? "Excellent work!" : (p >= 60 ? "Good job!" : "Keep studying!");
        if (timesUp) msg = "Time's up! " + msg;
        let reviewBtn = (s < questionsList.length) ? `<button class="nav-btn next" style="display:block; width:100%; margin-top:15px; background: #f39c12;" onclick="startReviewMode()">Review Mistakes (${questionsList.length - s})</button>` : "";
        quizContainer.innerHTML = `
            <div class="result-screen">
                <h2 style="color: var(--primary);">${isReviewMode ? "Review Complete!" : "Quiz Complete!"}</h2>
                <p style="font-size: 1.2rem;">You scored <strong>${s}</strong> out of <strong>${questionsList.length}</strong> (${p}%).</p>
                <p>${msg}</p>${reviewBtn}
                <button class="nav-btn next" style="display:block; width:100%; margin-top:15px;" onclick="location.reload()">Return to Main Menu ↻</button>
            </div>
        `;
    }

    /* ── Dark mode & portal navigation ── */
    (function() {
        var THEME_KEY = 'mp_portal_theme';
        function applyTheme(isDark) {
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            var btn = document.getElementById('themeBtn');
            if (btn) btn.innerHTML = isDark ? '&#9728;&#65039;' : '&#127769;';
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        }
        window.toggleTheme = function() { applyTheme(document.body.getAttribute('data-theme') !== 'dark'); };
        window.goBackToPortal = function() { window.location.href = 'Review Portal.html'; };
        var saved = localStorage.getItem(THEME_KEY);
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(saved ? saved === 'dark' : prefersDark);
    })();
</script>
</body>
</html>
