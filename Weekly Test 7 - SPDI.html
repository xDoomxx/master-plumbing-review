<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekly Test 7 - SPDI</title>
    <style>
        :root {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #2c3e50; --primary: #3498db;
            --correct: #2ecc71; --correct-bg: #e8f8f5; --wrong: #e74c3c; --wrong-bg: #fdedec;
            --info-border: #f39c12; --info-bg: #fef9e7; --secondary: #95a5a6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #app { background: var(--card-bg); width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 25px; color: #7f8c8d; }
        .score { color: var(--primary); }
        .question { font-size: 1.2rem; font-weight: 600; line-height: 1.55; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; text-align: left; background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s ease; outline: none; }
        .btn:hover:not(:disabled) { background: #e2e6ea; border-color: #dae0e5; transform: translateY(-1px); }
        .btn:disabled { cursor: default; opacity: 0.9; }
        .btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #1e8449; font-weight: 700; }
        .btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #922b21; text-decoration: line-through; opacity: 0.7; }
        .info-box { margin-top: 25px; padding: 15px; background: var(--info-bg); border-left: 5px solid var(--info-border); border-radius: 6px; font-size: 0.95rem; line-height: 1.6; display: none; animation: fadeIn 0.4s ease; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .nav-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-align: center; transition: background 0.2s; display: none; }
        .nav-btn.prev { background: var(--secondary); color: white; }
        .nav-btn.next { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(52,152,219,0.3); }
        .home-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .result-screen { text-align: center; padding: 20px 0; }
        [data-theme="dark"] {
            --bg: #0d1117; --card-bg: #161b22; --text: #e6edf3;
            --primary: #58a6ff; --primary-hover: #79b8ff;
            --correct: #3fb950; --correct-bg: #1a2e1a; --wrong: #f85149; --wrong-bg: #2e1a1a;
            --info-border: #d29922; --info-bg: #2e2a1a;
            --secondary: #30363d; --secondary-hover: #3c444d;
        }
        [data-theme="dark"] .header { border-bottom-color: #30363d; color: #8b949e; }
        [data-theme="dark"] .btn { background: #1c2128; border-color: #30363d; }
        [data-theme="dark"] .btn:hover:not(:disabled) { background: #262c36; border-color: #484f58; }
        [data-theme="dark"] #app { box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

<script>
    const allQuestions = [{"q": "When installing _____, the authority having jurisdiction shall require evidence of the competency of the installers.", "opts": ["potable water piping", "plumbing appurtenance", "medical gas piping", "fuel gas piping"], "ans": 2, "info": "Correct Answer: medical gas piping. Medical gas systems (oxygen, nitrous oxide, vacuum, etc.) are life-safety-critical, so the authority having jurisdiction requires proof of installer competency/certification before work proceeds.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>potable water piping:</strong> Important, but standard plumbing licensing covers it; it doesn't carry the special competency-certification requirement medical gas does.</li><li><strong>plumbing appurtenance:</strong> A general term for accessory devices (e.g., backflow preventers). Not the item singled out for installer certification.</li><li><strong>fuel gas piping:</strong> Regulated and hazardous, but the code provision about requiring evidence of installer competency specifically targets medical gas piping.</li></ul>"}, {"q": "Fire extinguisher used for Class D fires", "opts": ["Dry Powder Extinguisher", "Foam Extinguisher", "Wet Chemical Extinguisher", "Water Extinguisher"], "ans": 0, "info": "Correct Answer: Dry Powder Extinguisher. Class D fires involve combustible metals (magnesium, sodium, titanium). Special dry powder agents smother the metal and absorb heat without reacting.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Foam Extinguisher:</strong> For Class A and B fires. Water-based foam reacts violently with burning metals — dangerous on Class D.</li><li><strong>Wet Chemical Extinguisher:</strong> Designed for Class K/F (cooking oils and fats), not combustible metals.</li><li><strong>Water Extinguisher:</strong> For Class A only. Water on burning metal can cause explosive reactions.</li></ul>"}, {"q": "Pipe material used for LPG", "opts": ["PE", "PEX", "ABS", "LDPE"], "ans": 0, "info": "Correct Answer: PE. Polyethylene (PE) pipe is the standard material for underground LPG and gas distribution lines — corrosion-resistant, flexible, and approved for buried fuel-gas service.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>PEX:</strong> Cross-linked polyethylene used for hot/cold potable water distribution, not fuel gas.</li><li><strong>ABS:</strong> Acrylonitrile butadiene styrene — a DWV (drainage) pipe material, not for gas.</li><li><strong>LDPE:</strong> Low-density polyethylene is too soft/low-strength; gas service uses medium- or high-density PE rated for the application.</li></ul>"}, {"q": "Discharge pipes from pressure tanks shall extend _____ from and into the bottom of such tanks.", "opts": ["5 cm", "10 cm", "2.5 cm", "4 cm"], "ans": 0, "info": "Correct Answer: 5 cm. Per the plumbing code, discharge pipes from pressure tanks shall extend 5 cm from and into the bottom of the tank to ensure proper draw and sediment clearance.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>10 cm:</strong> Exceeds the code-specified extension distance.</li><li><strong>2.5 cm:</strong> Too short to meet the required 5 cm extension.</li><li><strong>4 cm:</strong> Close, but the code specifies 5 cm, not 4 cm.</li></ul>"}, {"q": "Property of a fluid whereby its own molecules are united or attracted to each other.", "opts": ["Ideal Fluid", "Cohesion", "Capillary Action", "Adhesion"], "ans": 1, "info": "Correct Answer: Cohesion. Cohesion is the attraction between molecules of the same substance (e.g., water-to-water), which is what holds a liquid together and forms droplets.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Ideal Fluid:</strong> A theoretical fluid with no viscosity or compressibility — not a molecular attraction property.</li><li><strong>Capillary Action:</strong> The rise/fall of liquid in a narrow tube — a result of cohesion AND adhesion working together, not the attraction itself.</li><li><strong>Adhesion:</strong> Attraction between molecules of DIFFERENT substances (e.g., water sticking to glass) — the opposite scope of cohesion.</li></ul>"}, {"q": "A liquid drain cleaner has a pH Level categorized as _____.", "opts": ["Acidic", "Neutral", "Basic", "None of the choices"], "ans": 2, "info": "Correct Answer: Basic. Liquid drain cleaners typically contain sodium hydroxide (lye), which is strongly alkaline (basic), with a high pH that dissolves grease and organic clogs.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Acidic:</strong> Some specialty drain cleaners are acidic, but the common liquid lye-based cleaners are basic/alkaline.</li><li><strong>Neutral:</strong> A pH of 7 (like pure water) has no cleaning action on grease clogs.</li><li><strong>None of the choices:</strong> Incorrect — basic/alkaline correctly describes lye-based drain cleaner.</li></ul>"}, {"q": "It spatters or scatters the effluent in drops or small blobs wherein they are mixed with the air", "opts": ["Wet Vent", "Aerator", "Dry Vent", "Deaerator"], "ans": 1, "info": "Correct Answer: Aerator. An aerator scatters the effluent into small drops or blobs and mixes it with air, increasing oxygen contact for treatment.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Wet Vent:</strong> A pipe that serves as both a vent and a drain for fixtures — not an aeration device.</li><li><strong>Dry Vent:</strong> A vent pipe carrying no liquid — provides air circulation but does not scatter effluent.</li><li><strong>Deaerator:</strong> Does the opposite — it removes dissolved air/gases from the liquid.</li></ul>"}, {"q": "A type of Globe valve which has a wide bearing surface producing good resistance to the cutting effects of scale, dirt, and other kinds of foreign matter found inside the pipe", "opts": ["Plug Type", "Conventional Disc", "Composition Disc", "Solid Wedge"], "ans": 0, "info": "Correct Answer: Plug Type. The plug-type globe valve disc has a wide, tapered bearing surface that resists the cutting/erosion effects of scale, dirt, and foreign matter in the line.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Conventional Disc:</strong> A flat disc with a narrow seating contact — more prone to cutting from debris than the plug type.</li><li><strong>Composition Disc:</strong> Uses a soft renewable insert (rubber/composition); good for tight shutoff but not for resisting abrasive scale.</li><li><strong>Solid Wedge:</strong> This is a gate-valve closure type, not a globe-valve disc.</li></ul>"}, {"q": "Diameter of dry standpipe if the highest outlet is 23 m or less", "opts": ["127 mm", "102 mm", "153 mm", "175 mm"], "ans": 1, "info": "Correct Answer: 102 mm. For a dry standpipe whose highest outlet is 23 m or less, the minimum pipe diameter is 102 mm (4 inches).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>127 mm:</strong> Larger than required for this height range (5-inch size).</li><li><strong>153 mm:</strong> A 6-inch size — used for taller systems, not the minimum here.</li><li><strong>175 mm:</strong> Oversized for a dry standpipe with the highest outlet at 23 m or less.</li></ul>"}, {"q": "The maximum gradient of ramps for disabled-persons must be:", "opts": ["1:8", "1:12", "1:10", "1:15"], "ans": 1, "info": "Correct Answer: 1:12. Per BP 344 (Accessibility Law), the maximum ramp gradient for persons with disabilities is 1:12 — for every 1 unit of rise, 12 units of run.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>1:8:</strong> Far too steep — unsafe and non-compliant for wheelchair use.</li><li><strong>1:10:</strong> Steeper than the 1:12 maximum allowed by BP 344.</li><li><strong>1:15:</strong> Gentler than required — acceptable in practice, but 1:12 is the maximum (steepest) the code permits.</li></ul>"}, {"q": "11. Identify this valve:<img alt='valve cutaway diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4QBoRXhpZgAASUkqAAgAAAACADEBAgAHAAAAJgAAAGmHBAABAAAALgAAAAAAAABQaWNhc2EAAAIAAJAHAAQAAAAwMjIwA5ACABQAAABMAAAAAAAAADIwMjI6MTE6MjAgMTM6MzE6MjgA/+IL+ElDQ19QUk9GSUxFAAEBAAAL6AAAAAACAAAAbW50clJHQiBYWVogB9kAAwAbABUAJAAfYWNzcAAAAAAAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAPbWAAEAAAAA0y0AAAAAKfg93q/yVa54QvrkyoM5DQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQZGVzYwAAAUQAAAB5YlhZWgAAAcAAAAAUYlRSQwAAAdQAAAgMZG1kZAAACeAAAACIZ1hZWgAACmgAAAAUZ1RSQwAAAdQAAAgMbHVtaQAACnwAAAAUbWVhcwAACpAAAAAkYmtwdAAACrQAAAAUclhZWgAACsgAAAAUclRSQwAAAdQAAAgMdGVjaAAACtwAAAAMdnVlZAAACugAAACHd3RwdAAAC3AAAAAUY3BydAAAC4QAAAA3Y2hhZAAAC7wAAAAsZGVzYwAAAAAAAAAfc1JHQiBJRUM2MTk2Ni0yLTEgYmxhY2sgc2NhbGVkAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA REQEREBERAREQEREBERAREQEREBERAREQFxSt81yrjlB6IKsZZXrjYD1XIgterHUzTza0+sBcjgqoPlOFxf2cf+Rv2LhdhsN7dlH/kb9i+9ULUHwDAoB/uYtf8AA37Ff8iQ/wBjF/ps+xfRED19i5kHXNy9Tg37GK/0bfsVIcKhPKGMW/wM+xfYziub8uivbHbkg+R9JGP92z/I37FzwxNto0D1ABcrowUAQUACvVpHgqoKoiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICoFVEFFVEQUKBVRAREQUCqiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiIg//2Q==' style='display:block;margin:14px auto 4px;max-width:100%;width:300px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;padding:6px'>", "opts": ["Plug Type Valve", "Split Wedge Design", "Composition Disc Valve", "Conventional Disc Valve"], "ans": 2, "info": "Correct Answer: Composition Disc Valve. The composition-disc globe valve uses a renewable soft disc insert that seats against the port for tight shutoff.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Plug Type Valve:</strong> Has a wide tapered plug bearing surface — a different globe-valve disc design.</li><li><strong>Split Wedge Design:</strong> A gate-valve closure type (a two-piece wedge), not a globe-valve disc.</li><li><strong>Conventional Disc Valve:</strong> Uses a one-piece flat metal disc rather than a renewable composition insert.</li></ul>"}, {"q": "What is the reason why level landings are required in ramps?", "opts": ["to increase aesthetic of the ramp", "to reduce slope length", "to improve structural strength of the ramp", "to allow rest of the users"], "ans": 3, "info": "Correct Answer: to allow rest of the users. Level landings on long ramps give wheelchair users and others a flat area to pause and rest, and a safe place to maneuver or change direction.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>to increase aesthetic of the ramp:</strong> Landings are a safety/accessibility requirement, not a decorative feature.</li><li><strong>to reduce slope length:</strong> Landings break up the run but their purpose is rest and maneuvering, not shortening slope.</li><li><strong>to improve structural strength of the ramp:</strong> Not their function — they serve the user, not the structure.</li></ul>"}, {"q": "A pump has a 900 revolutions per minute. After the maintenance, the rate of revolution increased to 950. Calculate the new head pressure if the original head pressure is 100 ft.", "opts": ["102 ft", "113 ft", "106 ft", "112 ft"], "ans": 3, "info": "Correct Answer: 112 ft. By the pump affinity laws, head varies with the square of speed: H₂ = H₁ × (N₂/N₁)² = 100 × (950/900)² = 100 × 1.114 ≈ 111.4 ≈ 112 ft.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>102 ft:</strong> Would result from scaling head linearly with speed (×950/900) instead of with the square.</li><li><strong>113 ft:</strong> Slight over-rounding; the precise value is ≈111.4, which rounds to 112.</li><li><strong>106 ft:</strong> An intermediate miscalculation — does not match (950/900)² × 100.</li></ul>"}, {"q": "For a building that requires recirculation of hot water, which type of pump will you use for the recirculation?", "opts": ["Plunger Pump", "Diaphragm pump", "Jet pump", "Centrifugal Pump"], "ans": 3, "info": "Correct Answer: Centrifugal Pump. Centrifugal pumps are the standard choice for hot-water recirculation loops — quiet, continuous, low-maintenance, and well-suited to moving water against modest head.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Plunger Pump:</strong> A high-pressure positive-displacement pump for dosing/metering, not continuous circulation.</li><li><strong>Diaphragm pump:</strong> Positive-displacement; used for chemical dosing or fluids with solids, not hot-water loops.</li><li><strong>Jet pump:</strong> Used to lift water from wells (suction lift), not to recirculate hot water in a building loop.</li></ul>"}, {"q": "It injects large quantities of fresh air into this compartment to mix the compartment’s entire contents and to provide oxygen for the aerobic digester process.", "opts": ["UV Injecter", "Filtration", "Ozone", "Aerator"], "ans": 3, "info": "Correct Answer: Aerator. The aerator injects large volumes of fresh air into the compartment, mixing the contents and supplying oxygen for the aerobic digestion process.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>UV Injecter:</strong> UV is a disinfection method (kills pathogens with ultraviolet light); it adds no air or oxygen.</li><li><strong>Filtration:</strong> Physically strains solids from the liquid — does not provide oxygen for digestion.</li><li><strong>Ozone:</strong> An oxidizing disinfectant; it treats water but is not the aeration/mixing device described.</li></ul>"}, {"q": "The pipe connection in which a ball is held in a cup-like that allows movement in every direction.", "opts": ["Universal Joint", "Needle Joint", "Ball Joint", "Caulked Joint"], "ans": 2, "info": "Correct Answer: Ball Joint. A ball joint holds a ball within a cup-like socket, allowing the connected pipe to move and rotate in every direction (flexible angular movement).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Universal Joint:</strong> Transmits rotary motion between shafts at an angle — a mechanical coupling, not a flexible pipe socket.</li><li><strong>Needle Joint:</strong> Not a standard pipe-connection term.</li><li><strong>Caulked Joint:</strong> A rigid joint sealed with lead/oakum (older cast-iron work) — it does not allow movement.</li></ul>"}, {"q": "A full-way valve used to regulate a fluid flow in which a threaded stem raises", "opts": ["Angle Valve", "Disk Valve", "Globe Valve", "Gate Valve"], "ans": 3, "info": "Correct Answer: Gate Valve. A gate (full-way) valve uses a threaded stem to raise and lower a wedge-shaped disk/gate, giving full unobstructed flow when open.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Angle Valve:</strong> Changes flow direction by 90°; uses a globe-type disc, not a wedge gate.</li><li><strong>Disk Valve:</strong> Not the standard term for this wedge-stem full-way valve.</li><li><strong>Globe Valve:</strong> Regulates/throttles flow with a disc against a seat — not a full-way wedge gate.</li></ul>"}, {"q": "Fire service connection in street front for Dry Standpipe shall be _____.", "opts": ["61 to 122 cm", "91 to 182 cm", "46 to 122 cm", "30 to 120 cm"], "ans": 2, "info": "Correct Answer: 46 to 122 cm. Fire department (siamese) connections for a dry standpipe at the street front are located 46 to 122 cm above grade for firefighter access.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>61 to 122 cm:</strong> Close, but the code-specified lower bound is 46 cm, not 61 cm.</li><li><strong>91 to 182 cm:</strong> Too high — exceeds the accessible mounting range for fire connections.</li><li><strong>30 to 120 cm:</strong> The lower bound is too low and the upper bound doesn't match the specified 122 cm.</li></ul>"}, {"q": "An electrically controlled valve that allows or prevents media flow through it", "opts": ["Solenoid Valve", "Electric Field Valve", "Jockey Valve", "Plug Valve"], "ans": 0, "info": "Correct Answer: Solenoid Valve. A solenoid valve is opened or closed electrically — energizing the coil moves a plunger that allows or blocks media flow.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Electric Field Valve:</strong> Not a standard valve type/term.</li><li><strong>Jockey Valve:</strong> Not a valve type — a jockey PUMP maintains pressure in fire systems, but that's a pump.</li><li><strong>Plug Valve:</strong> A quarter-turn valve operated manually (or by actuator), not inherently an electrically controlled valve.</li></ul>"}, {"q": "A nipple installed where fittings or valves are to be very close to each other", "opts": ["Shoulder Nipple", "Close Nipple", "Short Nipple", "Long Nipple"], "ans": 1, "info": "Correct Answer: Close Nipple. A close nipple is the shortest nipple — threaded along its entire length with no unthreaded middle — used where two fittings/valves must sit very close together.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Shoulder Nipple:</strong> Has an unthreaded shoulder/section in the middle — longer than a close nipple.</li><li><strong>Short Nipple:</strong> Slightly longer, with a short unthreaded band between the threads.</li><li><strong>Long Nipple:</strong> Has a long unthreaded center section — used to span distance, the opposite of 'very close together.'</li></ul>"}, {"q": "All interior wet standpipes shall be connected to a street main not less than ___ in diameter.", "opts": ["4\"", "6\"", "5\"", "2\""], "ans": 0, "info": "Correct Answer: 4\". All interior wet standpipes shall connect to a street main not less than 4 inches (102 mm) in diameter to ensure adequate firefighting water supply.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>6\":</strong> Larger than the minimum required; 4\" is the code minimum.</li><li><strong>5\":</strong> Not the specified minimum size.</li><li><strong>2\":</strong> Far too small to deliver adequate firefighting flow.</li></ul>"}, {"q": "The stage of fire where it is the hardest to suppress.", "opts": ["Fully developed", "Decay", "Flashover", "Flash Point"], "ans": 0, "info": "Correct Answer: Fully developed. In the fully developed stage, all combustible materials are burning, heat release is at its peak, and the fire is most intense and hardest to suppress.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Decay:</strong> The final stage where fuel is consumed and the fire weakens — easier to control, not hardest.</li><li><strong>Flashover:</strong> The rapid transition INTO full involvement — a critical moment, but the peak intensity is the fully developed stage that follows.</li><li><strong>Flash Point:</strong> The lowest temperature at which a substance gives off ignitable vapor — a property, not a fire stage.</li></ul>"}, {"q": "The minimum diameter of a dry standpipe requiring a 3-way siamese connection", "opts": ["100 mm", "175 mm", "125 mm", "150 mm"], "ans": 2, "info": "Correct Answer: 125 mm. A dry standpipe of 125 mm (5 inches) diameter requires a 3-way siamese (fire department) connection to supply sufficient water.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>100 mm:</strong> A 4-inch standpipe typically uses a 2-way siamese connection, not 3-way.</li><li><strong>175 mm:</strong> Larger than the threshold; the minimum requiring a 3-way connection is 125 mm.</li><li><strong>150 mm:</strong> A 6-inch size — above the minimum diameter that first requires the 3-way connection.</li></ul>"}, {"q": "The minimum size of a fire hose outlet of an interior wet standpipe.", "opts": ["1 1/2\"", "2 1/2\"", "2\"", "3\""], "ans": 0, "info": "Correct Answer: 1 1/2\". The minimum fire hose outlet size for an interior wet standpipe (occupant-use hose station) is 1½ inches.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>2 1/2\":</strong> The size for fire-department hose connections (Class I), not the interior occupant-use outlet.</li><li><strong>2\":</strong> Not the specified minimum for an interior wet standpipe outlet.</li><li><strong>3\":</strong> Far larger than the required minimum.</li></ul>"}, {"q": "A fitting that is used to close an open fitting.", "opts": ["bushing", "plug", "cap", "unions"], "ans": 1, "info": "Correct Answer: plug. A plug is a male-threaded fitting screwed INTO the open (female) end of another fitting to close it off.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>bushing:</strong> Reduces a fitting from a larger to a smaller size — it adapts, it doesn't close.</li><li><strong>cap:</strong> Closes the end of a PIPE (fits OVER the male pipe end), whereas a plug closes an open FITTING (fits INTO it).</li><li><strong>unions:</strong> Connects two pipes so they can be disconnected easily — it joins, it doesn't close.</li></ul>"}, {"q": "Standard for the Fire Protection of Telecommunications Facilities", "opts": ["NFPA 76", "NFPA 99", "NFPA 72", "NFPA 58"], "ans": 0, "info": "Correct Answer: NFPA 76. NFPA 76 is the Standard for the Fire Protection of Telecommunications Facilities.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>NFPA 99:</strong> Health Care Facilities Code (covers medical gas, etc.).</li><li><strong>NFPA 72:</strong> National Fire Alarm and Signaling Code.</li><li><strong>NFPA 58:</strong> Liquefied Petroleum Gas (LPG) Code.</li></ul>"}, {"q": "A Positive Displacement Pump wherein the high-pressure seal reciprocates with the piston", "opts": ["Plunger Pump", "Piston Pump", "Gear Pump", "Screw Pump"], "ans": 1, "info": "Correct Answer: Piston Pump. In a piston pump, the high-pressure seal (packing) reciprocates together with the piston inside the cylinder.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Plunger Pump:</strong> Here the seal is stationary and the smooth plunger slides through it — the opposite of a piston pump's moving seal.</li><li><strong>Gear Pump:</strong> A rotary positive-displacement pump using meshing gears — no reciprocating piston or seal.</li><li><strong>Screw Pump:</strong> Uses rotating screws to move fluid axially — also rotary, not reciprocating.</li></ul>"}, {"q": "Standard Specification for Poly(Vinyl Chloride) (PVC) Plastic Pipe", "opts": ["ASTM D1785", "ASTM D3350", "ASTM B88", "ASTM F2389"], "ans": 0, "info": "Correct Answer: ASTM D1785. ASTM D1785 is the Standard Specification for Poly(Vinyl Chloride) (PVC) Plastic Pipe, Schedules 40, 80, and 120.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>ASTM D3350:</strong> Standard for polyethylene (PE) plastics pipe materials, not PVC.</li><li><strong>ASTM B88:</strong> Standard for seamless copper water tube — a copper standard, not PVC.</li><li><strong>ASTM F2389:</strong> Standard for polypropylene (PP-R) piping systems, not PVC.</li></ul>"}, {"q": "Which is typically not found on a pump curve?", "opts": ["net positive suction head", "efficiency contour", "flow rate", "pipe diameter"], "ans": 3, "info": "Correct Answer: pipe diameter. A pump performance curve plots head, flow rate, efficiency, power, and NPSH — but pipe diameter is a SYSTEM parameter, not a property of the pump curve.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>net positive suction head:</strong> NPSH-required is plotted on the pump curve to prevent cavitation.</li><li><strong>efficiency contour:</strong> Efficiency islands/contours are a standard part of a pump curve.</li><li><strong>flow rate:</strong> The horizontal axis of every pump performance curve.</li></ul>"}, {"q": "Maximum height of water closet according to BP 344", "opts": ["0.45 m", "0.33 m", "0.38 m", "0.48 m"], "ans": 0, "info": "Correct Answer: 0.45 m. Per BP 344, the maximum height of the water closet (seat) for accessibility is 0.45 m (450 mm) from the floor.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>0.33 m:</strong> Too low — below the accessible seat-height requirement.</li><li><strong>0.38 m:</strong> Still below the 0.45 m maximum specified.</li><li><strong>0.48 m:</strong> Exceeds the 0.45 m maximum set by BP 344.</li></ul>"}, {"q": "This new concept in plumbing has almost completely eliminated the vent stack and other forms of ventilation, but still attained the desired functions and effectiveness.", "opts": ["Traditional One Line Drainage System", "Durham System", "Sovent System", "Traditional Two Line Drainage System"], "ans": 2, "info": "Correct Answer: Sovent System. The Sovent single-stack system uses special aerator and deaerator fittings so one stack handles both drainage and venting, nearly eliminating the separate vent stack.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Traditional One Line Drainage System:</strong> A conventional single-stack approach without the Sovent aerator/deaerator fittings.</li><li><strong>Durham System:</strong> A threaded, rigid drainage system using recessed fittings — still requires conventional venting.</li><li><strong>Traditional Two Line Drainage System:</strong> Uses separate soil and waste stacks plus full venting — the opposite of eliminating the vent stack.</li></ul>"}, {"q": "In an ordinary hazard, the coverage of 1 sprinkler head is _____.", "opts": ["10 sqm", "14 sqm", "12 sqm", "18 sqm"], "ans": 2, "info": "Correct Answer: 12 sqm. For an ordinary-hazard occupancy, the maximum coverage area per sprinkler head is about 12 m² (≈130 sq ft).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>10 sqm:</strong> Closer to extra-hazard spacing, which is tighter than ordinary hazard.</li><li><strong>14 sqm:</strong> Between standard values; ordinary hazard is specified at about 12 m².</li><li><strong>18 sqm:</strong> Closer to light-hazard coverage (≈20 m²/200 sq ft), which is wider than ordinary hazard.</li></ul>"}, {"q": "A pipe installed in buildings not as part of the water supply or disposal system, but primarily for use as water conveyance in case of fire", "opts": ["Siamese", "Standpipe", "Fire Hose", "Spinkler"], "ans": 1, "info": "Correct Answer: Standpipe. A standpipe is a fixed piping system installed in a building solely to convey water for firefighting — not part of the regular water supply or drainage.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Siamese:</strong> The twin/multiple inlet fitting where the fire department pumps water IN — a connection, not the pipe system itself.</li><li><strong>Fire Hose:</strong> The flexible hose attached at outlets — not the fixed building pipe.</li><li><strong>Sprinkler:</strong> An automatic discharge head/system; the question describes the conveyance pipe (standpipe) for fire hoses.</li></ul>"}, {"q": "Which type of fire line installation has become obsolete and seldom installed?", "opts": ["Local Vent", "Wet Standpipe with Siamese Connection", "Wet Standpipe", "Dry Standpipe"], "ans": 3, "info": "Correct Answer: Dry Standpipe. Dry standpipes (empty until the fire department charges them) have become largely obsolete and are seldom installed in favor of more reliable wet systems.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Local Vent:</strong> A venting feature for fixtures — not a fire-line installation type.</li><li><strong>Wet Standpipe with Siamese Connection:</strong> Still widely used — kept charged with water plus a fire-department inlet.</li><li><strong>Wet Standpipe:</strong> The current standard; always charged and ready, so it's not the obsolete type.</li></ul>"}, {"q": "How do you connect PPR?", "opts": ["Solvent Welding", "Coupling", "Crimping", "Fusion Welding"], "ans": 3, "info": "Correct Answer: Fusion Welding. PPR (polypropylene random copolymer) pipes are joined by heat fusion — the pipe and fitting are heated and fused into a single homogeneous joint.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Solvent Welding:</strong> Used for PVC/CPVC (chemical cement) — it doesn't work on polypropylene, which must be heat-fused.</li><li><strong>Coupling:</strong> A fitting, not a joining method; PPR couplings themselves are heat-fused.</li><li><strong>Crimping:</strong> Used for PEX with metal rings — not the method for PPR.</li></ul>"}, {"q": "A Flow Meter that measures an induced voltage generated by the fluid as it flows through a pipe.", "opts": ["Positive Displacement Meter", "Velocity Meter", "Turbine Flow Meter", "Electromagnetic Flow Meter"], "ans": 3, "info": "Correct Answer: Electromagnetic Flow Meter. It measures the voltage induced as a conductive fluid moves through a magnetic field (Faraday's law); the induced voltage is proportional to velocity.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Positive Displacement Meter:</strong> Measures flow by trapping and counting fixed volumes of fluid — mechanical, not voltage-based.</li><li><strong>Velocity Meter:</strong> A general category (e.g., turbine, propeller) based on moving parts, not induced voltage.</li><li><strong>Turbine Flow Meter:</strong> Counts the spin of a rotor in the flow — mechanical, not electromagnetic induction.</li></ul>"}, {"q": "What is the possible problem, if the water meter shows no movement in the reading, but water is still being supplied to the property?", "opts": ["Meter is oversized.", "Meter is clogged.", "Excessive water pressure cannot be handled by the meter.", "Flow rate is too low."], "ans": 1, "info": "Correct Answer: Meter is clogged. If water is clearly being supplied yet the meter does not register, the measuring mechanism is likely clogged/jammed, preventing it from turning.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Meter is oversized:</strong> An oversized meter under-registers very low flows, but the symptom described (water flowing, zero movement) points to a clog/jam.</li><li><strong>Excessive water pressure cannot be handled by the meter:</strong> High pressure doesn't stop a meter from registering flow.</li><li><strong>Flow rate is too low:</strong> Very low flow can slip past, but with water actively supplied and no movement at all, a clog is the more direct cause.</li></ul>"}, {"q": "If the bell has hammer, the buzzer has _____.", "opts": ["step-down transformer", "gong", "metal strip", "striker"], "ans": 2, "info": "Correct Answer: metal strip. A buzzer makes its sound from a rapidly vibrating armature/metal strip; the analogous striking part in a bell is the hammer.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>step-down transformer:</strong> Supplies low-voltage power to the circuit — not the sound-producing element.</li><li><strong>gong:</strong> The bell's resonating cup that the hammer strikes — not the buzzer's vibrating element.</li><li><strong>striker:</strong> Another term associated with a bell's hammer action, not the buzzer's vibrating metal strip.</li></ul>"}, {"q": "All fire service connections shall be located on a street front not less than ______.", "opts": ["91 cm", "61 cm", "46 cm", "76 cm"], "ans": 2, "info": "Correct Answer: 46 cm. All fire service connections shall be located on a street front not less than 46 cm (18 inches) above grade for accessibility.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>91 cm:</strong> Above the minimum; the code-specified minimum is 46 cm.</li><li><strong>61 cm:</strong> A common figure for some connections, but the specified minimum here is 46 cm.</li><li><strong>76 cm:</strong> Higher than the required 46 cm minimum.</li></ul>"}, {"q": "Total head at the pump discharge minus suction head or plus suction lift.", "opts": ["Total Discharge Head", "Total Head", "Static Head", "Velocity Head"], "ans": 1, "info": "Correct Answer: Total Head. Total head (total dynamic head) = head at the pump discharge minus the suction head (or plus the suction lift) — the net energy the pump adds.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Total Discharge Head:</strong> Only the head measured at the discharge side — it ignores the suction-side contribution.</li><li><strong>Static Head:</strong> The vertical elevation difference only, excluding friction and velocity components.</li><li><strong>Velocity Head:</strong> The kinetic-energy component (v²/2g) only — one part of total head, not the whole.</li></ul>"}, {"q": "41. Identify this valve:<img alt='valve cutaway diagram' src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4QBoRXhpZgAASUkqAAgAAAACADEBAgAHAAAAJgAAAGmHBAABAAAALgAAAAAAAABQaWNhc2EAAAIAAJAHAAQAAAAwMjIwA5ACABQAAABMAAAAAAAAADIwMjI6MTE6MjAgMTM6Mzc6MzMA/+IL+ElDQ19QUk9GSUxFAAEBAAAL6AAAAAACAAAAbW50clJHQiBYWVogB9kAAwAbABUAJAAfYWNzcAAAAAAAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAPbWAAEAAAAA0y0AAAAAKfg93q/yVa54QvrkyoM5DQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQZGVzYwAAAUQAAAB5YlhZWgAAAcAAAAAUYlRSQwAAAdQAAAgMZG1kZAAACeAAAACIZ1hZWgAACmgAAAAUZ1RSQwAAAdQAAAgMbHVtaQAACnwAAAAUbWVhcwAACpAAAAAkYmtwdAAACrQAAAAUclhZWgAACsgAAAAUclRSQwAAAdQAAAgMdGVjaAAACtwAAAAMdnVlZAAACugAAACHd3RwdAAAC3AAAAAUY3BydAAAC4QAAAA3Y2hhZAAAC7wAAAAsZGVzYwAAAA , "opts": ["Float Valve", "Pressure Regulating Valve", "Check Valve", "Foot Valve"], "ans": 0, "info": "Correct Answer: Float Valve. A float valve automatically opens to refill a tank after discharge and shuts off completely once the float rises to the full level.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Pressure Regulating Valve:</strong> Maintains a set downstream pressure — it doesn't sense tank level.</li><li><strong>Check Valve:</strong> Prevents reverse flow only; it has no fill/shutoff-by-level function.</li><li><strong>Foot Valve:</strong> A check valve at a pump suction inlet to keep it primed — not a tank-fill control.</li></ul>"}, {"q": "Standard for Installation of Sprinkler Systems", "opts": ["NFPA 72", "NFPA 14", "NFPA 13", "NFPA 10"], "ans": 2, "info": "Correct Answer: NFPA 13. NFPA 13 is the Standard for the Installation of Sprinkler Systems.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>NFPA 72:</strong> National Fire Alarm and Signaling Code.</li><li><strong>NFPA 14:</strong> Standard for the Installation of Standpipe and Hose Systems.</li><li><strong>NFPA 10:</strong> Standard for Portable Fire Extinguishers.</li></ul>"}, {"q": "What is the standard specification for seamless copper water tube?", "opts": ["ASTM B88", "ASTM B888", "ASTM A888", "ASTM A88"], "ans": 0, "info": "Correct Answer: ASTM B88. ASTM B88 is the Standard Specification for Seamless Copper Water Tube (Types K, L, M).", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>ASTM B888:</strong> Not the seamless copper water tube standard.</li><li><strong>ASTM A888:</strong> Covers hubless cast-iron soil pipe and fittings — not copper.</li><li><strong>ASTM A88:</strong> Not the applicable copper water tube specification.</li></ul>"}, {"q": "Which component has a possible defect, if water is leaking around the pump shaft?", "opts": ["Volute Casing", "Coupling", "Mechanical Seal", "Impeller"], "ans": 2, "info": "Correct Answer: Mechanical Seal. The mechanical seal seals the rotating shaft where it exits the casing; if it fails, water leaks around the pump shaft.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Volute Casing:</strong> The spiral housing that channels flow; a casing crack leaks from the body, not specifically around the shaft.</li><li><strong>Coupling:</strong> Connects the pump shaft to the motor — its failure causes vibration/misalignment, not shaft leakage.</li><li><strong>Impeller:</strong> Moves the fluid; impeller damage reduces performance but doesn't cause leakage at the shaft.</li></ul>"}, {"q": "Diameter of Class I System hose", "opts": ["64 mm", "102 mm", "152 mm", "38 mm"], "ans": 0, "info": "Correct Answer: 64 mm. A Class I standpipe system provides 64 mm (2½-inch) hose connections intended for fire-department use.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>102 mm:</strong> A 4-inch size — that's a standpipe riser size, not the hose connection.</li><li><strong>152 mm:</strong> A 6-inch size — far larger than a hose outlet.</li><li><strong>38 mm:</strong> 1½ inches — that's the Class II (occupant-use) hose size, not Class I.</li></ul>"}, {"q": "Which of the following is not a quarter-turn valve?", "opts": ["Neddle Valves", "Plug Valves", "Butterfly Valves", "Ball Valves"], "ans": 0, "info": "Correct Answer: Needle Valves. A needle valve uses a fine threaded stem requiring MANY turns for precise throttling — it is a multi-turn valve, not a quarter-turn valve.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Plug Valves:</strong> Quarter-turn — a 90° rotation of the tapered plug opens or closes it.</li><li><strong>Butterfly Valves:</strong> Quarter-turn — a 90° rotation of the disc controls flow.</li><li><strong>Ball Valves:</strong> Quarter-turn — a 90° rotation of the bored ball opens or closes flow.</li></ul>"}, {"q": "What Fire Extinguisher is least compatible for Class B Fires?", "opts": ["Foam", "Carbon Dioxide", "Dry Powder", "Wet Chemical"], "ans": 3, "info": "Correct Answer: Wet Chemical. Wet chemical extinguishers are designed for Class K/F (cooking oils and fats); they are the least compatible choice for Class B flammable-liquid fires.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Foam:</strong> Effective on Class B — it forms a film that smothers the flammable liquid.</li><li><strong>Carbon Dioxide:</strong> Effective on Class B — displaces oxygen and leaves no residue.</li><li><strong>Dry Powder:</strong> ABC dry chemical is effective on Class B fires.</li></ul>"}, {"q": "What is the importance of priming of a pump?", "opts": ["it lubricates the coupling and shaft", "it helps increase the speed of impeller", "it removes air from the suction line and casing", "it increases the required NPSH"], "ans": 2, "info": "Correct Answer: it removes air from the suction line and casing. Priming fills the pump casing and suction line with liquid, removing air so the (centrifugal) pump can develop suction and move fluid.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>it lubricates the coupling and shaft:</strong> Lubrication is a separate maintenance function, unrelated to priming.</li><li><strong>it helps increase the speed of impeller:</strong> Impeller speed is set by the motor, not by priming.</li><li><strong>it increases the required NPSH:</strong> Priming helps AVOID cavitation; it doesn't raise the required NPSH.</li></ul>"}, {"q": "An alarming device that produces a buzzing sound which is caused by the rapid vibration of armature.", "opts": ["Siren", "Bell", "Buzzer", "Single-Stroke Bells"], "ans": 2, "info": "Correct Answer: Buzzer. A buzzer produces a continuous buzzing sound from the rapid vibration of its armature — distinct from a bell, which uses a hammer striking a gong.", "other_defs": "<hr style=\"border:0;border-top:1px solid #e1e8ed;margin:12px 0;\"><strong>Other Options:</strong><ul style=\"margin-top:5px;padding-left:20px;font-size:0.9rem;\"><li><strong>Siren:</strong> Produces a rising/falling wail, usually from a rotating/electronic mechanism — not a buzzing armature.</li><li><strong>Bell:</strong> Sounds via a hammer striking a gong, producing a ringing tone, not a buzz.</li><li><strong>Single-Stroke Bells:</strong> Give one strike per signal — a single 'ding,' not a continuous buzz.</li></ul>"}];

    let questionsList = [];
    let currentQ = 0;
    let userAnswers = [];
    let isExamMode = false;
    let timerInterval = null;
    let timeLeft = 0;

    const quizContainer = document.getElementById('quiz-container');
    const appContainer = document.getElementById('app');

    const startMenuHTML = `
        <div id="start-menu" style="text-align:center;padding:20px 0;">
            <h2 style="color:var(--primary);margin-bottom:10px;">Weekly Test 7</h2>
            <p style="color:#7f8c8d;margin-bottom:30px;font-size:0.95rem;">Sanitation, Plumbing Design &amp; Installation (SPDI)</p>
            <button class="nav-btn" style="display:block;width:100%;margin-bottom:15px;background:var(--secondary);color:white;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;" onclick="goBackToPortal()">&#8592; Back to Portal</button>
            <button class="nav-btn next" style="display:block;width:100%;margin-bottom:15px;background:var(--primary);" onclick="startQuiz(false)">Start Practice Mode</button>
            <button class="nav-btn next" style="display:block;width:100%;margin-bottom:15px;background:#e67e22;" onclick="startQuiz(true)">Start Exam Mode (50 mins)</button>
            <button id="resume-btn" class="nav-btn next" style="display:none;width:100%;margin-bottom:15px;background:#27ae60;" onclick="resumeQuiz()">Resume Saved Practice</button>
        </div>
    `;
    quizContainer.style.display = 'none';
    appContainer.insertAdjacentHTML('afterbegin', startMenuHTML);
    const savedState = localStorage.getItem('weeklyTest7_state');
    if (savedState) document.getElementById('resume-btn').style.display = 'block';

    const header = document.querySelector('.header');
    header.insertAdjacentHTML('afterend', '<div id="timer-display" style="display:none;text-align:center;font-size:1.5rem;font-weight:bold;color:#e74c3c;margin-bottom:15px;"></div>');

    function startQuiz(examMode) {
        document.getElementById('start-menu').style.display = 'none';
        quizContainer.style.display = 'block';
        isExamMode = examMode;
        questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
        currentQ = 0;
        userAnswers = new Array(questionsList.length).fill(null);
        if (isExamMode) {
            for (let i = questionsList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionsList[i], questionsList[j]] = [questionsList[j], questionsList[i]];
            }
            startTimer(50 * 60);
        }
        updateScore(); saveState(); loadQuestion();
    }

    function resumeQuiz() {
        const state = JSON.parse(localStorage.getItem('weeklyTest7_state'));
        if (state) {
            document.getElementById('start-menu').style.display = 'none';
            quizContainer.style.display = 'block';
            questionsList = allQuestions.map(q => ({...q, shuffledOrder: null}));
            currentQ = state.currentQ;
            userAnswers = state.userAnswers;
            isExamMode = false;
            updateScore(); loadQuestion();
        }
    }

    function startTimer(seconds) {
        timeLeft = seconds;
        document.getElementById('timer-display').style.display = 'block';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); showResults(true); }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = 'Time: ' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
    }

    function saveState() {
        if (isExamMode) return;
        localStorage.setItem('weeklyTest7_state', JSON.stringify({ currentQ, userAnswers }));
    }

    function updateScore() {
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const scoreSpan = document.querySelector('.score');
        if (isExamMode) scoreSpan.style.display = 'none';
        else { scoreSpan.style.display = 'inline'; document.getElementById('score-val').innerText = s; }
    }

    function loadQuestion() {
        const q = questionsList[currentQ];
        document.getElementById('q-counter').innerText = 'Q: ' + (currentQ+1) + ' / ' + questionsList.length;
        let qText = q.q;
        if (isExamMode) qText = qText.replace(/^\d+\.\s*/, '');
        document.getElementById('question-text').innerHTML = qText;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        let displayOpts = q.opts.map((text, index) => ({ text, index }));
        if (isExamMode) {
            if (!q.shuffledOrder) {
                for (let i = displayOpts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [displayOpts[i], displayOpts[j]] = [displayOpts[j], displayOpts[i]];
                }
                q.shuffledOrder = displayOpts.map(o => o.index);
            } else {
                displayOpts = q.shuffledOrder.map(idx => ({ text: q.opts[idx], index: idx }));
            }
        }
        displayOpts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = String.fromCharCode(65+i) + '. ' + opt.text;
            btn.onclick = () => checkAnswer(opt.index, btn, displayOpts);
            optsContainer.appendChild(btn);
        });
        document.getElementById('info-box').style.display = 'none';
        document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (userAnswers[currentQ] !== null) {
            const buttons = document.querySelectorAll('.btn');
            const selectedIdx = userAnswers[currentQ];
            displayOpts.forEach((opt, btnIdx) => {
                const btn = buttons[btnIdx];
                if (isExamMode) {
                    if (opt.index === selectedIdx) { btn.style.border='2px solid var(--primary)'; btn.style.background='#eef7fd'; }
                } else {
                    btn.disabled = true;
                    if (opt.index === selectedIdx) btn.classList.add(opt.index === q.ans ? 'correct' : 'wrong');
                    if (opt.index === q.ans) btn.classList.add('correct');
                }
            });
            if (!isExamMode) {
                document.getElementById('info-box').innerHTML = '<strong>Review Note:</strong> ' + q.info + (q.other_defs || '');
                document.getElementById('info-box').style.display = 'block';
            }
            showNextButton();
        }
    }

    function checkAnswer(idx, btn, displayOpts) {
        if (!isExamMode && userAnswers[currentQ] !== null) return;
        userAnswers[currentQ] = idx;
        updateScore(); saveState();
        const buttons = document.querySelectorAll('.btn');
        const q = questionsList[currentQ];
        if (!isExamMode) {
            buttons.forEach(b => b.disabled = true);
            btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
            if (idx !== q.ans) {
                displayOpts.forEach((opt, bi) => {
                    if (opt.index === q.ans) buttons[bi].classList.add('correct');
                });
            }
            document.getElementById('info-box').innerHTML = '<strong>Review Note:</strong> ' + q.info + (q.other_defs || '');
            document.getElementById('info-box').style.display = 'block';
        } else {
            buttons.forEach(b => { b.style.border='2px solid #e9ecef'; b.style.background='#f8f9fa'; });
            btn.style.border='2px solid var(--primary)'; btn.style.background='#eef7fd';
        }
        showNextButton();
    }

    function showNextButton() {
        const btn = document.getElementById('next-btn');
        btn.innerText = currentQ < questionsList.length-1 ? 'Next \u27a1' : 'Finish \ud83c\udfc6';
        btn.style.display = 'block';
    }

    function prevQuestion() { if (currentQ > 0) { currentQ--; loadQuestion(); window.scrollTo(0,0); } }
    function nextQuestion() {
        if (currentQ < questionsList.length-1) { currentQ++; loadQuestion(); window.scrollTo(0,0); }
        else showResults();
    }

    function showResults(timesUp) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer-display').style.display = 'none';
        let s = 0;
        questionsList.forEach((q, i) => { if (userAnswers[i] === q.ans) s++; });
        const p = Math.round((s/questionsList.length)*100);
        let msg = p >= 80 ? 'Excellent work!' : (p >= 60 ? 'Good job! Keep it up.' : 'Keep studying! You got this.');
        if (timesUp) msg = "Time's up! " + msg;
        quizContainer.innerHTML =
            '<div class="result-screen">' +
            '<h2 style="color:var(--primary);">Quiz Complete!</h2>' +
            '<p style="font-size:1.2rem;">You scored <strong>' + s + '</strong> out of <strong>' + questionsList.length + '</strong> (' + p + '%).</p>' +
            '<p>' + msg + '</p>' +
            '<button class="nav-btn next" style="display:block;width:100%;margin-top:15px;background:#f39c12;" onclick="showReview()">Review All Answers</button>' +
            '<button class="nav-btn next" style="display:block;width:100%;margin-top:15px;" onclick="location.reload()">Return to Main Menu</button>' +
            '</div>';
    }

    function showReview() {
        let reviewHTML = '<div style="text-align:left;"><h2 style="color:var(--primary);text-align:center;">Exam Review</h2><p style="text-align:center;margin-bottom:20px;">Correct answers in green. Your wrong choices in red.</p>';
        questionsList.forEach(function(q, i) {
            var uAns = userAnswers[i];
            var isCorrect = uAns === q.ans;
            var unanswered = uAns === null || uAns === undefined;
            var qStatus = isCorrect
                ? '<span style="color:var(--correct);font-weight:bold;float:right;">Correct</span>'
                : (unanswered ? '<span style="color:#f39c12;font-weight:bold;float:right;">Unanswered</span>'
                              : '<span style="color:var(--wrong);font-weight:bold;float:right;">Incorrect</span>');
            var borderColor = isCorrect ? 'var(--correct)' : (unanswered ? '#f39c12' : 'var(--wrong)');
            var qTextClean = q.q.replace(/^\d+\.\s*/, '');
            reviewHTML += '<div style="margin-bottom:30px;padding:20px;border:2px solid ' + borderColor + ';border-radius:12px;background:#fff;box-shadow:0 4px 6px rgba(0,0,0,0.05);">';
            reviewHTML += '<div style="font-weight:600;font-size:1.05rem;margin-bottom:15px;color:var(--text);">' + qStatus + (i+1) + '. ' + qTextClean + '</div>';
            reviewHTML += '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:15px;">';
            q.opts.forEach(function(opt, optIdx) {
                var style = 'padding:12px;border-radius:8px;border:1px solid #e9ecef;background:#f8f9fa;color:var(--text);';
                var label = String.fromCharCode(65+optIdx) + '. ' + opt;
                if (optIdx === q.ans) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--correct);background:var(--correct-bg);color:#1e8449;font-weight:700;';
                    label += ' (Correct Answer)';
                } else if (optIdx === uAns && !isCorrect) {
                    style = 'padding:12px;border-radius:8px;border:2px solid var(--wrong);background:var(--wrong-bg);color:#922b21;text-decoration:line-through;opacity:0.8;';
                    label += ' (Your Choice)';
                } else if (optIdx === uAns && isCorrect) {
                    label += ' (Your Choice)';
                }
                reviewHTML += '<div style="' + style + '">' + label + '</div>';
            });
            reviewHTML += '</div>';
            reviewHTML += '<div style="padding:15px;background:var(--info-bg);border-left:5px solid var(--info-border);border-radius:6px;font-size:0.9rem;line-height:1.6;"><strong>Review Note:</strong> ' + q.info + (q.other_defs||'') + '</div>';
            reviewHTML += '</div>';
        });
        reviewHTML += '<button class="nav-btn next" style="display:block;width:100%;margin-top:25px;background:var(--primary);" onclick="location.reload()">Return to Main Menu</button></div>';
        quizContainer.innerHTML = reviewHTML;
        window.scrollTo(0,0);
    }

    /* ── Dark mode & portal navigation ── */
    (function() {
        var THEME_KEY = 'mp_portal_theme';
        function applyTheme(isDark) {
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            var btn = document.getElementById('themeBtn');
            if (btn) btn.innerHTML = isDark ? '&#9728;&#65039;' : '&#127769;';
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        }
        window.toggleTheme = function() { applyTheme(document.body.getAttribute('data-theme') !== 'dark'); };
        window.goBackToPortal = function() { window.location.href = 'Review Portal.html'; };
        var saved = localStorage.getItem(THEME_KEY);
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(saved ? saved === 'dark' : prefersDark);
    })();
</script>
</body>
</html>
